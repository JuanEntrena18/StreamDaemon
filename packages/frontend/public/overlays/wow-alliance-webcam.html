<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Webcam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.4);
  }

  #cam-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 640px; height: 480px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid rgba(200,212,232,0.2);
    box-shadow: 0 0 60px rgba(43,95,200,0.2), inset 0 0 80px rgba(0,0,0,0.4);
    background: var(--navy);
  }
  #cam-frame::before {
    content: '';
    position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
    border-radius: 19px;
    background: linear-gradient(135deg, var(--blue), var(--gold), var(--silver), var(--lblue), var(--blue));
    background-size: 400% 400%;
    z-index: 0;
    animation: border-shimmer 6s ease infinite;
    opacity: 0.7;
  }
  @keyframes border-shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #cam-frame video {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── Inner glow overlay ── */
  #inner-glow {
    position: absolute; inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(43,95,200,0.15) 100%);
    mix-blend-mode: screen;
  }

  /* ── Shield decorations INSIDE frame ── */
  .shield-inner {
    position: absolute;
    z-index: 3;
    width: 70px; height: 78px;
    opacity: 0.20;
    filter: drop-shadow(0 0 8px var(--glow));
  }
  .shield-inner svg { width: 100%; height: 100%; }
  .shield-inner-tl { top: 6px; left: 6px; }
  .shield-inner-tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .shield-inner-bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .shield-inner-br { bottom: 6px; right: 6px; transform: scale(-1, -1); }

  /* ── Corner runes inside frame ── */
  .rune {
    position: absolute;
    z-index: 3;
    font-family: 'Uncial Antiqua', serif;
    font-size: 1.2rem;
    color: var(--gold);
    opacity: 0.15;
    text-shadow: 0 0 12px var(--glow-gold);
  }
  .rune-tl { top: 50px; left: 14px; transform: rotate(-15deg); }
  .rune-tr { top: 50px; right: 14px; transform: rotate(15deg); }
  .rune-bl { bottom: 50px; left: 14px; transform: rotate(15deg); }
  .rune-br { bottom: 50px; right: 14px; transform: rotate(-15deg); }

  /* ── Crown ── */
  #crown {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 1.6rem;
    filter: drop-shadow(0 0 20px var(--glow-gold));
    animation: crown-glow 2s ease-in-out infinite alternate;
  }
  @keyframes crown-glow {
    0% { filter: drop-shadow(0 0 15px var(--glow-gold)); opacity: 0.5; }
    100% { filter: drop-shadow(0 0 30px var(--glow-gold)); opacity: 0.9; }
  }

  /* ── Username ── */
  #username {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--silver);
    text-shadow: 0 0 25px var(--glow), 0 2px 8px rgba(0,0,0,0.9);
    letter-spacing: 0.15em;
    white-space: nowrap;
    padding: 5px 22px;
    border-radius: 99px;
    background: linear-gradient(135deg, rgba(10,14,39,0.7), rgba(43,95,200,0.2));
    border: 1px solid rgba(200,212,232,0.15);
    backdrop-filter: blur(8px);
  }

  /* ── Divine light streak (animated) ── */
  #light-streak {
    position: absolute;
    top: -50%; left: -20%;
    width: 40%; height: 200%;
    z-index: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(200,212,232,0.04) 40%, rgba(255,200,0,0.06) 50%, rgba(200,212,232,0.04) 60%, transparent 100%);
    transform: rotate(25deg);
    animation: streak-sweep 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes streak-sweep {
    0% { left: -30%; }
    50% { left: 110%; }
    100% { left: -30%; }
  }
</style>
</head>
<body>
  <div id="cam-frame">
    <div id="light-streak"></div>
    <div class="shield-inner shield-inner-tl">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2b5fc8"/><stop offset="50%" stop-color="#8ab4ff"/><stop offset="100%" stop-color="#c8d4e8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg1)" stroke-width="2.5"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.8"/><path d="M50 22 L63 37 L55 42 L50 55 L45 42 L37 37 Z" fill="none" stroke="url(#sg1)" stroke-width="1.2"/></svg>
    </div>
    <div class="shield-inner shield-inner-tr">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c8d4e8"/><stop offset="50%" stop-color="#ffc800"/><stop offset="100%" stop-color="#2b5fc8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg2)" stroke-width="2.5"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.8"/><path d="M50 22 L63 37 L55 42 L50 55 L45 42 L37 37 Z" fill="none" stroke="url(#sg2)" stroke-width="1.2"/></svg>
    </div>
    <div class="shield-inner shield-inner-bl">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg3" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2b5fc8"/><stop offset="50%" stop-color="#8ab4ff"/><stop offset="100%" stop-color="#c8d4e8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg3)" stroke-width="2.5"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.8"/></svg>
    </div>
    <div class="shield-inner shield-inner-br">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg4" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c8d4e8"/><stop offset="50%" stop-color="#ffc800"/><stop offset="100%" stop-color="#2b5fc8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg4)" stroke-width="2.5"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.8"/></svg>
    </div>

    <div class="rune rune-tl">ᚱ</div>
    <div class="rune rune-tr">ᚨ</div>
    <div class="rune rune-bl">ᛚ</div>
    <div class="rune rune-br">ᛖ</div>

    <div id="crown">👑</div>
    <div id="username"><span id="name-text">Alianza</span></div>

    <video id="webcam" autoplay muted playsinline></video>
    <div id="inner-glow"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Alianza Webcam · ${username}`;

    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        document.getElementById('webcam').srcObject = stream;
      }).catch(() => {});
    }
  </script>
</body>
</html>
