<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Etiquetas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Inter', sans-serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.3);
  }

  .corner-label {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
    padding: 12px 22px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(10,14,39,0.5), rgba(10,14,39,0.35));
    border: 1px solid rgba(200,212,232,0.08);
    box-shadow: inset 0 1px 0 rgba(200,212,232,0.04), 0 4px 20px rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    min-width: 100px;
  }
  .corner-label::before {
    content: '';
    position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--blue), transparent 50%, var(--gold));
    opacity: 0.25;
    z-index: -1;
  }
  .corner-label .ico { font-size: 1.1rem; }
  .corner-label .val { font-size: 1.4rem; font-weight: 800; letter-spacing: 0.03em; text-shadow: 0 0 15px currentColor; }
  .corner-label .lbl { font-size: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(200,212,232,0.3); font-family: 'Cinzel', serif; }
  .corner-label.cl-tl { top: 30px; left: 30px; }
  .corner-label.cl-tr { top: 30px; right: 30px; }
  .corner-label.cl-bl { bottom: 30px; left: 30px; }
  .corner-label.cl-br { bottom: 30px; right: 30px; }
  .corner-label:nth-child(1) .val { color: var(--lblue); }
  .corner-label:nth-child(2) .val { color: var(--gold); }
  .corner-label:nth-child(3) .val { color: var(--blue); }
  .corner-label:nth-child(4) .val { color: var(--silver); }

  /* ── Central watermark ── */
  #watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 330px;
    opacity: 0.03;
    pointer-events: none;
  }
  #watermark svg { width: 100%; height: 100%; }

  /* ── Rune decorations ── */
  .rune-deco {
    position: absolute;
    font-family: 'Uncial Antiqua', serif;
    font-size: 1.5rem;
    color: var(--gold);
    opacity: 0.06;
    text-shadow: 0 0 15px var(--glow-gold);
  }
  .rune-deco-tl { top: 12px; left: 50%; transform: translateX(-50%) rotate(0deg); }
  .rune-deco-bl { bottom: 12px; left: 50%; transform: translateX(-50%) rotate(0deg); }

  /* ── Shimmer ── */
  #shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(200,212,232,0.015) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer-sweep 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shimmer-sweep {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>
  <div id="shimmer"></div>
  <div class="rune-deco rune-deco-tl">ᚨ ᛚ ᛁ ᚨ ᚾ ᛉ</div>
  <div class="rune-deco rune-deco-bl">ᛗ ᛟ ᚱ ᛏ ᛖ</div>

  <div id="watermark">
    <svg viewBox="0 0 100 110"><defs><linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2b5fc8"/><stop offset="50%" stop-color="#ffc800"/><stop offset="100%" stop-color="#c8d4e8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#wg)" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/><path d="M50 22 L63 37 L55 42 L50 55 L45 42 L37 37 Z" fill="none" stroke="url(#wg)" stroke-width="1"/></svg>
  </div>

  <div class="corner-label cl-tl">
    <span class="ico">📺</span>
    <span class="val" id="followers">0</span>
    <span class="lbl">Seguidores</span>
  </div>
  <div class="corner-label cl-tr">
    <span class="ico">⭐</span>
    <span class="val" id="subs">0</span>
    <span class="lbl">Suscriptores</span>
  </div>
  <div class="corner-label cl-bl">
    <span class="ico">💰</span>
    <span class="val" id="donations">$0</span>
    <span class="lbl">Donaciones</span>
  </div>
  <div class="corner-label cl-br">
    <span class="ico">🎯</span>
    <span class="val" id="bits">0</span>
    <span class="lbl">Cheers</span>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.title = `StreamForge – WoW Alianza Etiquetas · ${username}`;

    function applyHud(d) {
      if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
    }

    function initSocket() {
      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        if (!CHANNEL) return;
        socket.emit('join:channel', CHANNEL);
        fetch(BACKEND_URL + '/hud/' + CHANNEL)
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) applyHud(d); })
          .catch(() => {});
        fetch(BACKEND_URL + '/hud/start-poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: CHANNEL, interval: 10 })
        }).catch(() => {});
      });
      socket.on('hud:update', (d) => applyHud(d));
      socket.on('channel:follow', () => {
        const el = document.getElementById('followers');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:subscribe', () => {
        const el = document.getElementById('subs');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:cheer', (d) => {
        const el = document.getElementById('bits');
        el.textContent = parseInt(el.textContent) + (d.bits || 0);
      });
      socket.on('channel:redemption', (d) => {
        if (d.rewardCost) {
          const el = document.getElementById('donations');
          const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
          el.textContent = '$' + current.toFixed(2);
        }
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.src = BACKEND_URL + '/socket.io/socket.io.js';
      script.onload = cb;
      script.onerror = () => cb(new Error('load failed'));
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      if (!err) initSocket();
    });
  </script>
</body>
</html>
