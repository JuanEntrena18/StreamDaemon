<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Chat + Labels</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Inter', sans-serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --navy: #0a0e27;
  }

  /* ── Shield watermark ── */
  .shield-wm {
    position: absolute; width: 250px; height: 280px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.03;
    pointer-events: none;
  }
  .shield-wm svg { width: 100%; height: 100%; }

  /* ── Corner labels ── */
  .corner-label {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
    padding: 10px 18px;
    border-radius: 10px;
    background: rgba(10,14,39,0.45);
    border: 1px solid rgba(43,95,200,0.15);
    backdrop-filter: blur(6px);
    min-width: 90px;
  }
  .corner-label .ico { font-size: 1rem; }
  .corner-label .val { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.03em; }
  .corner-label .lbl { font-size: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); }
  .corner-label.cl-tl { top: 25px; left: 25px; }
  .corner-label.cl-tr { top: 25px; right: 25px; }
  .corner-label.cl-bl { bottom: 25px; left: 25px; }
  .corner-label.cl-br { bottom: 25px; right: 25px; }
  .corner-label:nth-child(1) .val { color: var(--lblue); }
  .corner-label:nth-child(2) .val { color: var(--gold); }
  .corner-label:nth-child(3) .val { color: var(--blue); }
  .corner-label:nth-child(4) .val { color: var(--gold); }

  /* ── Crown top center ── */
  #crown-deco {
    position: absolute; top: 15px; left: 50%;
    transform: translateX(-50%);
    font-size: 2rem; opacity: 0.12;
    filter: drop-shadow(0 0 15px rgba(255,200,0,0.2));
  }

  /* ── Chat ── */
  #chat {
    position: absolute;
    top: 0; bottom: 0; width: 400px;
    display: flex; flex-direction: column;
    padding: 18px 14px; gap: 6px;
    overflow: hidden;
  }
  #chat.left { left: 0; }
  #chat.right { right: 0; }

  #chat-header {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--gold);
    padding: 5px 14px; border-radius: 4px;
    background: rgba(10,14,39,0.5);
    border-left: 3px solid var(--gold);
    margin-bottom: 4px;
  }
  #chat.right #chat-header { border-right: 3px solid var(--gold); border-left: none; text-align: right; }

  .msg {
    display: flex; flex-direction: column;
    padding: 7px 12px; border-radius: 6px;
    background: rgba(10,14,39,0.55);
    border: 1px solid rgba(43,95,200,0.12);
    backdrop-filter: blur(4px);
    animation: msg-in 0.35s ease-out;
  }
  @keyframes msg-in {
    0% { opacity: 0; transform: translateY(10px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-user {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem; font-weight: 600;
    color: var(--gold); margin-bottom: 2px;
  }
  .msg-text {
    font-size: 0.78rem; font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.4; word-break: break-word;
  }
</style>
</head>
<body>
  <div class="shield-wm">
    <svg viewBox="0 0 100 110"><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="#2b5fc8" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
  </div>
  <div id="crown-deco">👑</div>

  <div class="corner-label cl-tl">
    <span class="ico">📺</span>
    <span class="val" id="followers">0</span>
    <span class="lbl">Seguidores</span>
  </div>
  <div class="corner-label cl-tr">
    <span class="ico">⭐</span>
    <span class="val" id="subs">0</span>
    <span class="lbl">Suscriptores</span>
  </div>
  <div class="corner-label cl-bl">
    <span class="ico">💰</span>
    <span class="val" id="donations">$0</span>
    <span class="lbl">Donaciones</span>
  </div>
  <div class="corner-label cl-br">
    <span class="ico">🎯</span>
    <span class="val" id="bits">0</span>
    <span class="lbl">Cheers</span>
  </div>

  <div id="chat" class="left">
    <div id="chat-header">💬 Chat de la Alianza</div>
    <div id="messages"></div>
  </div>
  <div id="chat" class="right">
    <div id="chat-header">Chat de la Alianza 💬</div>
    <div id="messages-right" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    const side = params.get('side') || 'left';
    document.body.dataset.side = side;
    document.title = `StreamForge – WoW Alianza Chat+Labels · ${username}`;

    if (side === 'right') {
      document.getElementById('chat').className = 'chat right';
    }

    const messages = document.getElementById('messages');
    const messagesRight = document.getElementById('messages-right');
    const MAX_MSGS = 50;

    function addMessage(user, text) {
      const msg = document.createElement('div'); msg.className = 'msg';
      msg.innerHTML = `<div class="msg-user">${user}</div><div class="msg-text">${text}</div>`;
      messages.appendChild(msg);
      const msgR = msg.cloneNode(true); msgR.className = 'msg';
      messagesRight.appendChild(msgR);
      if (messages.children.length > MAX_MSGS) messages.removeChild(messages.firstChild);
      if (messagesRight.children.length > MAX_MSGS) messagesRight.removeChild(messagesRight.firstChild);
      messages.scrollTop = messages.scrollHeight;
      messagesRight.parentElement.scrollTop = messagesRight.parentElement.scrollHeight;
    }

    const socket = io((params.get('backend') || 'http://localhost:3000').replace(/\/+$/, ''), { autoConnect: false });
    socket.connect();
    socket.on('connect', () => {
      const ch = params.get('channel');
      if (ch) socket.emit('join:channel', ch);
    });
    socket.on('hud:update', (d) => {
      if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
    });
    socket.on('channel:follow', () => {
      const el = document.getElementById('followers');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:subscribe', () => {
      const el = document.getElementById('subs');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:cheer', (d) => {
      const el = document.getElementById('bits');
      el.textContent = parseInt(el.textContent) + (d.bits || 0);
    });
    socket.on('channel:redemption', (d) => {
      if (d.rewardCost) {
        const el = document.getElementById('donations');
        const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
        el.textContent = '$' + current.toFixed(2);
      }
    });
    socket.on('chat:message', (d) => {
      addMessage(d.userDisplayName || d.userName || d.user || 'Anónimo', d.text || d.message || '');
    });
  </script>
  <script src="/socket.io/socket.io.js"></script>
</body>
</html>
