<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Fullscreen Gameplay Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: transparent;
            overflow: hidden; font-family: 'Press Start 2P', monospace; color: #ffffff;
            position: relative;
        }

        /* Efecto de pantalla retro arcade */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 6px; pointer-events: none; z-index: 100;
        }

        .pixel-box {
            position: absolute;
            background: rgba(15, 15, 15, 0.85);
            border: 4px solid #ffffff;
            box-shadow: 0px 0px 0px 4px #000000, inset 0px 0px 0px 4px #000000;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .box-header {
            background: #ff0055; color: #ffffff; padding: 10px;
            font-size: 12px; text-transform: uppercase; text-align: center;
            border-bottom: 4px solid #ffffff;
            text-shadow: 2px 2px #000;
        }

        /* Webcam Flotante Arriba a la Derecha */
        .floating-cam {
            top: 40px;
            right: 40px;
            width: 480px;
            height: 310px;
        }

        .cam-placeholder { flex: 1; background: transparent; }

        /* Contenedor React global */
        #overlay-root {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        #overlay-root > * { pointer-events: auto; }

    </style>
</head>
<body>
    <div class="scanlines"></div>

    <!-- CONTENEDOR REACT APP -->
    <div id="overlay-root"></div>

    <!-- Webcam Flotante -->
    <div class="pixel-box floating-cam">
        <div class="box-header">PLAYER_1 CAM</div>
        <div class="cam-placeholder"></div>
    </div>
    
    <!-- Script de Integración de React / Vite -->
    <script type="module" src="./src/overlay.tsx"></script>
</body>
</html>
