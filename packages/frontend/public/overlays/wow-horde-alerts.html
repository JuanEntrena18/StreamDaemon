<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Horda Alertas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --red: #cc0000;
    --gold: #ffc800;
    --dred: #700000;
    --dark: #0a0505;
    --green: #34d399;
    --orange: #fb923c;
    --pink: #f472b6;
  }

  #alert-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
    z-index: 10;
    min-width: 500px;
  }

  .alert-card {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 60px;
    border-radius: 14px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
    min-width: 460px;
    opacity: 0;
    transform: scale(0.4) translateY(30px);
  }
  .alert-card.visible {
    animation: alert-appear 0.7s cubic-bezier(0.175,0.885,0.32,1.4) forwards;
  }
  .alert-card.hiding {
    animation: alert-hide 0.5s ease-in forwards;
  }
  @keyframes alert-appear {
    0%   { opacity: 0; transform: scale(0.4) translateY(30px); }
    60%  { opacity: 1; transform: scale(1.06) translateY(-8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes alert-hide {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.7) translateY(-60px); }
  }

  .alert-crest {
    position: absolute;
    width: 90px; height: 100px;
    opacity: 0.15;
  }
  .alert-crest svg { width: 100%; height: 100%; }
  .alert-crest-tl { top: -18px; left: -18px; }
  .alert-crest-br { bottom: -18px; right: -18px; transform: rotate(180deg); }

  .alert-card {
    border: 2px solid rgba(204,0,0,0.15);
    background: rgba(10,5,5,0.85);
  }
  .alert-card::before {
    content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--red), var(--gold), var(--dred));
    background-size: 300% 300%;
    z-index: -1;
    animation: gradient-shift 4s ease infinite;
    opacity: 0.5;
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .alert-type {
    font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }
  .alert-type.follow  { color: var(--red); }
  .alert-type.sub     { color: var(--gold); }
  .alert-type.donate  { color: var(--red); }
  .alert-type.cheer   { color: var(--gold); }
  .alert-type.host    { color: var(--green); }
  .alert-type.raid    { color: var(--orange); }

  .alert-icon { font-size: 2rem; margin-bottom: 4px; }

  .alert-user {
    font-size: 2.2rem; font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px rgba(204,0,0,0.3), 0 2px 10px rgba(0,0,0,0.5);
    line-height: 1.1;
  }
  .alert-msg {
    font-size: 1rem; font-weight: 500;
    color: rgba(255,255,255,0.6);
    margin-top: 4px;
    font-family: 'Inter', sans-serif;
  }
  .alert-detail {
    font-size: 0.8rem; font-weight: 400;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
    font-family: 'Inter', sans-serif;
  }

  .alert-war {
    position: absolute;
    top: -8px;
    font-size: 1.3rem;
    opacity: 0.3;
  }

  .tier-badge {
    display: inline-block;
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 10px;
    border-radius: 99px;
    margin-top: 4px;
    letter-spacing: 0.05em;
    font-family: 'Inter', sans-serif;
  }
  .tier-badge.t1 { background: rgba(204,0,0,0.2); color: var(--red); border: 1px solid rgba(204,0,0,0.3); }
  .tier-badge.t2 { background: rgba(255,200,0,0.2); color: var(--gold); border: 1px solid rgba(255,200,0,0.3); }
  .tier-badge.t3 { background: rgba(112,0,0,0.2); color: var(--red); border: 1px solid rgba(112,0,0,0.3); }
  .wow-logo {
    position: absolute;
    width: 72px; height: 72px;
    bottom: 20px; right: 20px;
    z-index: 999;
    opacity: 0.2;
    animation: wowSpin 10s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.3));
    border-radius: 50%;
    object-fit: cover;
  }
  @keyframes wowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .horde-crest-watermark {
    position: absolute;
    width: 180px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 0;
    pointer-events: none;
    animation: crestPulse 5s ease-in-out infinite;
  }
  @keyframes crestPulse {
    0%, 100% { opacity: 0.05; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>
  <img class="horde-crest-watermark" src="horda_logo.png" alt="">
  <img class="wow-logo" src="world-of-warcraft-logo.png" alt="">
  <div id="alert-center"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Horda';
    const DURATION = parseInt(params.get('duration') || '8', 10) * 1000;
    document.title = `StreamForge – WoW Horda Alertas · ${username}`;

    const TYPES = {
      follow:  { icon: '📺', label: 'Nuevo Recluta', cls: 'follow' },
      sub:     { icon: '⭐', label: 'Nuevo Suscriptor', cls: 'sub' },
      donate:  { icon: '💰', label: 'Donación', cls: 'donate' },
      cheer:   { icon: '🎯', label: 'Cheer', cls: 'cheer' },
      host:    { icon: '🎪', label: 'Host', cls: 'host' },
      raid:    { icon: '🚀', label: 'Raid', cls: 'raid' },
    };

    let isShowing = false;
    const queue = [];

    function showAlert(type, data) {
      queue.push({ type, data });
      processQueue();
    }

    function processQueue() {
      if (isShowing || queue.length === 0) return;
      isShowing = true;
      const { type, data } = queue.shift();
      renderAlert(type, data);
    }

    function renderAlert(type, data) {
      const info = TYPES[type] || TYPES.follow;
      const container = document.getElementById('alert-center');
      container.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'alert-card';

      let msgHtml = '';
      let detailHtml = '';
      let tierHtml = '';

      if (type === 'follow') {
        msgHtml = '¡Bienvenido a la Horda!';
      } else if (type === 'sub') {
        const months = data.cumulativeMonths || 1;
        msgHtml = `¡${months} ${months === 1 ? 'mes' : 'meses'} de lealtad!`;
        const tierVal = data.tier || '1000';
        const tierNum = tierVal === '3000' ? 3 : tierVal === '2000' ? 2 : 1;
        const tierLabel = {1:'Tier 1',2:'Tier 2',3:'Tier 3'}[tierNum];
        const tierClass = {1:'t1',2:'t2',3:'t3'}[tierNum];
        tierHtml = `<div class="tier-badge ${tierClass}">${tierLabel}</div>`;
        if (data.isGift) msgHtml = '¡Suscripción regalada!';
      } else if (type === 'donate') {
        const amount = data.amount || data.rewardCost || 0;
        const formatted = typeof amount === 'number' ? '$' + (amount / 100).toFixed(2) : amount;
        msgHtml = formatted;
        detailHtml = data.message ? `<div class="alert-detail">"${data.message.substring(0, 100)}"</div>` : '';
      } else if (type === 'cheer') {
        const bits = data.bits || 0;
        msgHtml = `${bits} bits`;
        detailHtml = data.message ? `<div class="alert-detail">"${data.message.substring(0, 100)}"</div>` : '';
      } else if (type === 'host') {
        msgHtml = '¡Gracias por el host!';
      } else if (type === 'raid') {
        const viewers = data.viewers || 0;
        msgHtml = `¡Raid con ${viewers} ${viewers === 1 ? 'espectador' : 'espectadores'}!`;
      }

      card.innerHTML = `
        <div class="alert-war">⚔️</div>
        <div class="alert-crest alert-crest-tl">
          <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
        </div>
        <div class="alert-crest alert-crest-br">
          <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
        </div>
        <div class="alert-icon">${info.icon}</div>
        <div class="alert-type ${info.cls}">${info.label}</div>
        <div class="alert-user">${data.userDisplayName || data.userName || data.user || 'Alguien'}</div>
        <div class="alert-msg">${msgHtml}</div>
        ${tierHtml}
        ${detailHtml}
      `;

      container.appendChild(card);
      requestAnimationFrame(() => card.classList.add('visible'));

      setTimeout(() => {
        card.classList.remove('visible');
        card.classList.add('hiding');
        setTimeout(() => {
          isShowing = false;
          processQueue();
        }, 500);
      }, DURATION);
    }

    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');

    function initSocket() {
      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        if (CHANNEL) socket.emit('join:channel', CHANNEL);
      });
      socket.on('channel:follow', (d) => showAlert('follow', d));
      socket.on('channel:subscribe', (d) => showAlert('sub', d));
      socket.on('channel:subscription-message', (d) => showAlert('sub', d));
      socket.on('channel:cheer', (d) => showAlert('cheer', d));
      socket.on('channel:redemption', (d) => {
        showAlert('donate', { ...d, amount: d.rewardCost });
      });
      socket.on('channel:raid', (d) => {
        if (d) showAlert('raid', d);
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.src = BACKEND_URL + '/socket.io/socket.io.js';
      script.onload = cb;
      script.onerror = () => cb(new Error('load failed'));
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      if (!err) initSocket();
    });

    document.addEventListener('click', () => {
      const demos = [
        { type: 'follow', data: { userDisplayName: username } },
        { type: 'sub', data: { userDisplayName: username, cumulativeMonths: 6, tier: '1000' } },
        { type: 'donate', data: { userDisplayName: username, amount: 1500, message: '¡Por la Horda!' } },
        { type: 'cheer', data: { userDisplayName: username, bits: 500, message: 'Lok\'tar Ogar!' } },
        { type: 'host', data: { userDisplayName: 'OtroCanal' } },
        { type: 'raid', data: { userDisplayName: 'OtroCanal', viewers: 25 } },
      ];
      const idx = Math.floor(Math.random() * demos.length);
      showAlert(demos[idx].type, demos[idx].data);
    });
  </script>
</body>
</html>
