<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Raiders - Be Right Back</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@600;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px;
            background-color: #0b0c0e; overflow: hidden;
            font-family: 'Share Tech Mono', monospace; color: #ffffff;
            position: relative;
        }

        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 107, 0, 0.03), rgba(0, 242, 254, 0.02));
            background-size: 100% 4px, 6px 100%; z-index: 10; pointer-events: none;
        }

        .tactical-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 107, 0, 0.08) 1px, transparent 1px);
            background-size: 45px 45px; z-index: 1; opacity: 0.5;
        }

        .terminal-container {
            position: absolute; top: 50px; left: 50px; right: 50px; bottom: 50px;
            border: 2px solid #ff6b00; background: rgba(13, 14, 16, 0.9);
            clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 30px, 100% calc(100% - 30px), calc(100% - 30px) 100%, 30px 100%, 0 calc(100% - 30px), 0 30px);
            z-index: 5; display: grid; grid-template-columns: 2fr 1.2fr; padding: 45px;
            gap: 40px; box-shadow: 0 0 45px rgba(255, 107, 0, 0.15);
        }

        /* Izquierda: Mensaje y Animación */
        .status-panel {
            display: flex; flex-direction: column; justify-content: center;
            border-right: 1px solid rgba(255, 107, 0, 0.2); padding-right: 40px;
        }

        .warning-strip {
            width: 150px; height: 10px;
            background: repeating-linear-gradient(45deg, #ff6b00, #ff6b00 10px, #000 10px, #000 20px);
            margin-bottom: 25px;
        }

        .brb-title { font-family: 'Teko', sans-serif; font-size: 110px; color: #ff6b00; line-height: 0.9; margin-bottom: 10px; letter-spacing: 5px; }
        .brb-sub { font-size: 26px; color: #00f2fe; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 30px;}

        /* Radar animado */
        .radar-box { display: flex; align-items: center; gap: 20px; font-size: 18px; color: #888;}
        .radar-scanner {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00f2fe;
            position: relative; background: radial-gradient(circle, rgba(0,242,254,0.15) 0%, transparent 80%);
            box-shadow: 0 0 15px rgba(0,242,254,0.3); overflow: hidden;
        }
        .radar-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, #00f2fe, transparent 90deg);
            border-radius: 50%; animation: spinRadar 2.5s linear infinite;
        }
        @keyframes spinRadar { 100% { transform: rotate(360deg); } }

        /* Derecha: Chat del Stream */
        .chat-panel {
            display: flex; flex-direction: column; justify-content: flex-end; height: 100%;
        }

        .chat-header {
            font-family: 'Teko', sans-serif; font-size: 30px; letter-spacing: 3px; color: #ff6b00;
            border-bottom: 2px solid #ff6b00; padding-bottom: 10px; margin-bottom: 20px;
        }

        .chat-msgs-wrapper {
            flex: 1; display: flex; flex-direction: column; justify-content: flex-end; gap: 15px;
            overflow: hidden; padding-bottom: 10px;
        }

        .chat-msg {
            background: rgba(255, 107, 0, 0.05); border-left: 3px solid #ff6b00;
            padding: 12px 18px; font-size: 15px; color: #e0e0e0;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .chat-user { font-weight: bold; color: #00f2fe; margin-right: 10px; }

    </style>
</head>
<body>

    <div class="tactical-grid"></div>

    <div class="terminal-container">
        <div class="status-panel">
            <div class="warning-strip"></div>
            <div class="brb-title">EXTRACCIÓN<br>DE RECURSOS</div>
            <div class="brb-sub">Vuelvo en breve // Escuadrón en espera</div>
            <div class="radar-box">
                <div class="radar-scanner">
                    <div class="radar-line"></div>
                </div>
                <span>BUSCANDO COMPATIBILIDAD CON SERVIDOR ARC...</span>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">COMUNICACIÓN TÁCTICA ACTIVA</div>
            <div class="chat-msgs-wrapper" id="chatWrapper">
                <!-- Se inyecta dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 10;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#00f2fe';

            msgNode.innerHTML = `<span class="chat-user" style="color: ${finalColor}">[${safeUsername}]</span><span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        // Demostración
        setTimeout(() => appendMessage("Raider_Alpha", "Preparen los explosivos para el siguiente ARC!"), 1500);
        setTimeout(() => appendMessage("Dron_Tech", "Tengo el escudo al máximo de energía."), 3000);
    
        const BACKEND_URL = window.location.protocol + '//' + window.location.host;
        const CHANNEL = new URLSearchParams(window.location.search).get('channel') || 'default';
        let socket;

        function initSocket() {
            try {
                socket = io(BACKEND_URL, { transports: ['websocket'] });
                socket.on('connect', () => {
                    socket.emit('join:channel', CHANNEL);
                });

                socket.on('channel:follow', ({ userDisplayName }) => {
                    addLogMessage(`NUEVO RECLUTA: ${userDisplayName}`);
                });

                socket.on('channel:subscribe', ({ userDisplayName, tier, isGift }) => {
                    if (isGift) return;
                    addLogMessage(`SUSCRIPCIÓN CONFIRMADA: ${userDisplayName}`);
                });

                socket.on('channel:subscription-message', ({ userDisplayName, cumulativeMonths }) => {
                    addLogMessage(`RE-SUSCRIPCIÓN (${cumulativeMonths} meses): ${userDisplayName}`);
                });

                socket.on('channel:subgift', ({ gifterDisplayName, amount }) => {
                    addLogMessage(`ALERTA DE SUMINISTROS: ${gifterDisplayName} regaló ${amount} subs`);
                });

                socket.on('channel:cheer', ({ userDisplayName, bits }) => {
                    addLogMessage(`RECURSOS RECIBIDOS (${bits} bits): ${userDisplayName}`);
                });

                socket.on('channel:redemption', ({ userDisplayName, rewardTitle }) => {
                    appendMessage(rewardTitle, `por ${userDisplayName}`, '#ff6b00');
                });

                socket.on('chat:message', ({ username, message, color }) => {
                    appendMessage(username, message, color);
                });
            } catch(e) {
                console.error("Socket fallback", e);
            }
        }

        function addLogMessage(msg) {
            appendMessage('SYS', msg, '#888');
        }

        setTimeout(initSocket, 1000);
    </script>
    <script src="./js/socket.io.js"></script>
</body>
</html>
