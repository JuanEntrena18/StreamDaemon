<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Standalone Chat</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
        width: 100vw; height: 100vh; background-color: transparent;
        overflow: hidden; font-family: 'Press Start 2P', monospace; color: #ffffff;
    }

    .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 6px; pointer-events: none; z-index: 100;
        }

        .pixel-box {
            width: 100%; height: 100%; background: rgba(15, 15, 15, 0.9);
            border: 4px solid #ffffff;
            box-shadow: 0px 0px 0px 4px #000000, inset 0px 0px 0px 4px #000000;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .box-header {
            background: #ff0055; color: #ffffff; padding: 10px;
            font-size: 10px; text-transform: uppercase; text-align: center;
            border-bottom: 4px solid #ffffff;
            text-shadow: 2px 2px #000;
        }

        .chat-content { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }

        .chat-msg {
            margin-bottom: 12px; font-size: 8px; line-height: 1.5;
            animation: slideIn 0.2s steps(4) forwards;
            text-shadow: 1px 1px #000;
        }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .chat-user { color: #00ffff; font-weight: bold; }
        .chat-text { color: #ffffff; }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="pixel-box">
        <div class="box-header">LIVE CHAT 1P</div>
        <div class="chat-content" id="chatWrapper">
            <!-- Mensajes inyectados -->
        </div>
    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 12;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const userColor = color || '#00ffff';

            msgNode.innerHTML = `<span class="chat-user" style="color: ${userColor}">&lt;${safeUsername}&gt;</span> <span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
        const CHANNEL = params.get('channel');

        if (CHANNEL) {
            document.title = '8-Bit Chat · ' + CHANNEL;
        }

        function initSocket() {
            const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                if (CHANNEL) socket.emit('join:channel', CHANNEL);
            });
            socket.on('chat:message', (d) => {
                appendMessage(
                    d.user?.displayName || d.userDisplayName || d.userName || 'Anónimo',
                    d.text || '',
                    d.user?.color || '#00ffff'
                );
            });
            socket.on('channel:follow', (d) => {
                pushEvent('⭐ <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> follows!');
            });
            socket.on('channel:subscribe', (d) => {
                pushEvent('🎉 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> subscribed!');
            });
            socket.on('channel:cheer', (d) => {
                pushEvent('💎 <b>' + (d.userDisplayName || d.userName || 'Anónimo') + '</b> cheered ' + (d.bits || 0) + ' bits!');
            });
            socket.on('channel:redemption', (d) => {
                pushEvent('🎯 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> redeemed <b>' + (d.rewardTitle || '') + '</b>');
            });
        }

        function loadSocketIO(cb) {
            const script = document.createElement('script');
            script.src = BACKEND_URL + '/socket.io/socket.io.js';
            script.onload = cb;
            script.onerror = () => cb(new Error('load failed'));
            document.head.appendChild(script);
        }

        function pushEvent(html) {
            const node = document.createElement('div');
            node.className = 'chat-msg';
            node.innerHTML = html;
            chatWrapper.appendChild(node);
            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        loadSocketIO(function(err) {
            if (!err) initSocket();
        });

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });
    </script>
</body>
</html>
