<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Horda Webcam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --red: #cc0000;
    --dred: #700000;
    --gold: #ffc800;
    --dark: #0a0505;
    --glow-red: 0 0 25px rgba(204,0,0,0.5);
    --glow-gold: 0 0 20px rgba(255,200,0,0.3);
  }

  .horde-crest {
    position: absolute;
    width: 150px; height: 160px;
    opacity: 0.15;
  }
  .horde-crest svg { width: 100%; height: 100%; }
  .crest-tl { top: -15px; left: -15px; }
  .crest-br { bottom: -15px; right: -15px; transform: rotate(180deg); }

  #cam-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 640px; height: 480px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid rgba(204,0,0,0.35);
    box-shadow: 0 0 50px rgba(204,0,0,0.15), inset 0 0 80px rgba(0,0,0,0.3);
  }
  #cam-frame::before {
    content: '';
    position: absolute; top: -3px; left: -3px;
    right: -3px; bottom: -3px;
    border-radius: 15px;
    background: linear-gradient(135deg, var(--red), var(--gold), var(--dred), var(--red));
    background-size: 300% 300%;
    z-index: -1;
    animation: gradient-shift 5s ease infinite;
    opacity: 0.5;
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #cam-frame video, #cam-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  #war-icon {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 1.8rem;
    filter: drop-shadow(0 0 15px rgba(204,0,0,0.4));
    z-index: 2;
    opacity: 0.6;
  }

  #username {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(204,0,0,0.6), 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.12em;
    white-space: nowrap;
    padding: 6px 24px;
    border-radius: 99px;
    background: linear-gradient(135deg, rgba(204,0,0,0.2), rgba(112,0,0,0.15));
    border: 1px solid rgba(255,200,0,0.2);
    backdrop-filter: blur(8px);
    z-index: 5;
  }

  .corner {
    position: absolute;
    width: 45px; height: 45px;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 8px; left: 8px; }
  .corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner-br { bottom: 8px; right: 8px; transform: scale(-1, -1); }

  .skull {
    position: absolute;
    font-size: 2.5rem;
    opacity: 0.06;
    pointer-events: none;
  }
  .skull-tl { top: 45px; left: 35px; }
  .skull-br { bottom: 45px; right: 35px; }
  .wow-logo {
    position: absolute;
    width: 72px; height: 72px;
    bottom: 20px; right: 20px;
    z-index: 999;
    opacity: 0.2;
    animation: wowSpin 10s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.3));
    border-radius: 50%;
    object-fit: cover;
  }
  @keyframes wowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .horde-crest-watermark {
    position: absolute;
    width: 180px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 0;
    pointer-events: none;
    animation: crestPulse 5s ease-in-out infinite;
  }
  @keyframes crestPulse {
    0%, 100% { opacity: 0.05; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>
  <img class="horde-crest-watermark" src="horda_logo.png" alt="">
  <img class="wow-logo" src="world-of-warcraft-logo.png" alt="">
  <div class="horde-crest crest-tl">
    <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/><path d="M50 18 L65 30 L58 36 L50 50 L42 36 L35 30 Z" fill="none" stroke="#cc0000" stroke-width="1"/><path d="M30 40 L50 20 L70 40" fill="none" stroke="#ffc800" stroke-width="1"/><path d="M50 50 L50 85" fill="none" stroke="#cc0000" stroke-width="1.5"/></svg>
  </div>
  <div class="horde-crest crest-br">
    <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/><path d="M50 18 L65 30 L58 36 L50 50 L42 36 L35 30 Z" fill="none" stroke="#cc0000" stroke-width="1"/><path d="M30 40 L50 20 L70 40" fill="none" stroke="#ffc800" stroke-width="1"/><path d="M50 50 L50 85" fill="none" stroke="#cc0000" stroke-width="1.5"/></svg>
  </div>

  <div class="skull skull-tl">💀</div>
  <div class="skull skull-br">💀</div>

  <div id="cam-frame">
    <div id="war-icon">⚔️</div>
    <div id="username"><span id="name-text">Horda</span></div>
    <video id="webcam" autoplay muted playsinline></video>
    <svg class="corner corner-tl" viewBox="0 0 50 50"><path d="M2 2h46" stroke="#cc0000" stroke-width="3" fill="none"/><path d="M2 2v46" stroke="#cc0000" stroke-width="3" fill="none"/></svg>
    <svg class="corner corner-tr" viewBox="0 0 50 50"><path d="M2 2h46" stroke="#ffc800" stroke-width="3" fill="none"/><path d="M2 2v46" stroke="#ffc800" stroke-width="3" fill="none"/></svg>
    <svg class="corner corner-bl" viewBox="0 0 50 50"><path d="M2 2h46" stroke="#700000" stroke-width="3" fill="none"/><path d="M2 2v46" stroke="#700000" stroke-width="3" fill="none"/></svg>
    <svg class="corner corner-br" viewBox="0 0 50 50"><path d="M2 2h46" stroke="#cc0000" stroke-width="3" fill="none"/><path d="M2 2v46" stroke="#cc0000" stroke-width="3" fill="none"/></svg>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Horda';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Horda Webcam · ${username}`;

    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        document.getElementById('webcam').srcObject = stream;
      }).catch(() => {});
    }
  </script>
</body>
</html>
