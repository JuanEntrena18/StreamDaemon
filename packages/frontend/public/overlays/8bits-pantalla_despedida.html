<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Ending Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: #000000;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Efecto estrella estática clásica */
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        .title {
            font-size: 100px;
            color: #F8B800; /* Oro NES */
            text-shadow: 8px 8px 0px #E52521;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 30px;
            color: #7C7C7C;
            margin-bottom: 80px;
            letter-spacing: 5px;
        }

        /* Menú RPG de Redes Sociales */
        .social-menu {
            background-color: #000000;
            border: 8px solid #ffffff;
            box-shadow: inset -8px -8px 0px #5C5C5C, inset 8px 8px 0px #7C7C7C;
            padding: 50px;
            width: 800px;
            position: relative;
        }

        .social-menu::before {
            content: "SOCIAL LINKS";
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 0 20px;
            color: #004CE5;
            font-size: 24px;
        }

        .social-item {
            display: flex;
            align-items: center;
            font-size: 24px;
            margin-bottom: 30px;
            padding: 10px;
            transition: background 0.2s;
        }

        .social-item:last-child {
            margin-bottom: 0;
        }

        /* Iconos simulados con texto NES para mantener el estilo puro sin dependencias externas */
        .icon-box {
            width: 150px;
            color: #ffffff;
            font-weight: bold;
        }

        /* Colores retro para identificar plataformas */
        .twitch { color: #9146FF; } /* Morado adaptado */
        .x-com { color: #aaaaaa; }
        .youtube { color: #E52521; } /* Rojo NES perfecto para YT */
        .instagram { color: #F8B800; } /* Amarillo NES */
        .tiktok { color: #00E8D2; } /* Cyan 8 bits */

        .username {
            color: #ffffff;
            margin-left: 30px;
        }

        /* Cursor parpadeante retro */
        .cursor {
            color: #E52521;
            margin-right: 20px;
            animation: blink 1s step-end infinite;
            visibility: hidden; /* Oculto por defecto */
        }
        
        .social-item:hover .cursor {
            visibility: visible;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="title">STAGE CLEAR</div>
    <div class="subtitle">THANKS FOR PLAYING</div>

    <div class="social-menu" id="social-container"></div>

    <script>
        const SOCIAL_LABELS = {
            twitch:  { badge: '[TWITCH]',  cls: 'twitch' },
            x:       { badge: '[X.COM]',   cls: 'x-com' },
            youtube: { badge: '[YOUTUBE]', cls: 'youtube' },
            instagram: { badge: '[INSTA]',   cls: 'instagram' },
            tiktok:  { badge: '[TIKTOK]',  cls: 'tiktok' },
        };
        (function() {
            var p = new URLSearchParams(window.location.search);
            var raw = p.get('socials');
            if (!raw) {
                document.getElementById('social-container').innerHTML =
                    '<div class="social-item" style="color:#888;font-size:16px;justify-content:center;">Configura tus redes en el panel de OBS</div>';
                return;
            }
            var list;
            try { list = JSON.parse(raw); } catch(e) { return; }
            if (!list || !list.length) return;
            var html = '';
            for (var i = 0; i < list.length; i++) {
                var s = list[i];
                var info = SOCIAL_LABELS[s.p] || { badge: '['+s.p.toUpperCase()+']', cls: '' };
                html += '<div class="social-item">' +
                    '<span class="cursor">►</span>' +
                    '<span class="icon-box ' + info.cls + '">' + info.badge + '</span>' +
                    '<span class="username">@' + _e(s.u) + '</span>' +
                    '</div>';
            }
            document.getElementById('social-container').innerHTML = html;
        })();
        function _e(t) { return t.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    </script>
</body>
</html>
