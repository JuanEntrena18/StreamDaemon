<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Vertical Starting Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyber-yellow: #FCEE0A;
            --cyber-cyan: #00F0FF;
            --cyber-pink: #FF003C;
            --cyber-dark: #050505;
        }

        body, html {
            width: 1080px; height: 1920px; background-color: var(--cyber-dark);
            overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.15) 2px, transparent 2px);
            background-size: 60px 60px; z-index: 1;
            transform: perspective(600px) rotateX(60deg) translateY(100px) scale(3);
            animation: moveGrid 4s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 60px; }
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.5));
            background-size: 100% 8px; pointer-events: none; z-index: 100;
        }

        .cyber-container {
            position: relative; z-index: 10; width: 900px;
            background: rgba(5, 5, 5, 0.85);
            border: 4px solid var(--cyber-cyan);
            clip-path: polygon(60px 0, 100% 0, 100% calc(100% - 60px), calc(100% - 60px) 100%, 0 100%, 0 60px);
            padding: 80px 40px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
        }

        .cyber-container::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 120px; height: 120px; background: var(--cyber-yellow);
            clip-path: polygon(0 0, 100% 0, 0 100%); z-index: -1;
        }

        .glitch-title {
            font-size: 110px; color: var(--cyber-yellow);
            letter-spacing: 12px; text-transform: uppercase; margin-bottom: 20px;
            position: relative; display: inline-block;
            text-shadow: 4px 4px 0px var(--cyber-pink);
            animation: glitch-skew 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-5deg); text-shadow: -4px 4px 0px var(--cyber-cyan); }
            21% { transform: skew(0deg); text-shadow: 4px 4px 0px var(--cyber-pink); }
            60% { transform: skew(0deg); }
            61% { transform: skew(5deg); text-shadow: -4px -4px 0px var(--cyber-yellow); }
            62% { transform: skew(0deg); text-shadow: 4px 4px 0px var(--cyber-pink); }
            100% { transform: skew(0deg); }
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 35px; color: var(--cyber-cyan); letter-spacing: 5px;
            margin-bottom: 80px;
        }

        .timer {
            font-size: 220px; font-weight: 700; color: #fff;
            text-shadow: 0 0 30px var(--cyber-cyan), 8px 8px 0px var(--cyber-pink);
            line-height: 1; margin-bottom: 80px;
        }

        .progress-wrapper {
            width: 100%; height: 30px; background: #111;
            border: 3px solid var(--cyber-cyan);
            position: relative; overflow: hidden;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: repeating-linear-gradient(
                -45deg,
                var(--cyber-yellow),
                var(--cyber-yellow) 15px,
                #000 15px,
                #000 30px
            );
            transition: width 1s linear;
        }

    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanlines"></div>

    <div class="cyber-container">
        <div class="glitch-title">SYSTEM BOOT</div>
        <div class="subtitle">ESTABLISHING NEURAL LINK...</div>
        
        <div class="timer" id="timerDisplay">05:00</div>
        
        <div class="progress-wrapper">
            <div class="progress-bar" id="timerProgress"></div>
        </div>
    </div>

    <script>
        const TOTAL_MINUTES = 5;
        let totalSeconds = TOTAL_MINUTES * 60;
        const initialSeconds = totalSeconds;

        const displayEl = document.getElementById('timerDisplay');
        const progressEl = document.getElementById('timerProgress');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function engineTick() {
            displayEl.textContent = formatTime(totalSeconds);
            const percentage = ((initialSeconds - totalSeconds) / initialSeconds) * 100;
            progressEl.style.width = percentage + '%';

            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(engineTick, 1000);
            } else {
                displayEl.textContent = "00:00";
                displayEl.style.color = "var(--cyber-yellow)";
                document.querySelector('.subtitle').textContent = "NEURAL LINK ESTABLISHED. READY.";
                progressEl.style.width = '100%';
            }
        }
        engineTick();
    </script>
</body>
</html>
