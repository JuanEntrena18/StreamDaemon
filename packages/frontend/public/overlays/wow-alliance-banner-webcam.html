<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Banner Webcam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.3);
  }

  #banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 150px;
    background: linear-gradient(to right,
      rgba(10,14,39,0.95), rgba(20,30,60,0.96), rgba(10,14,39,0.95));
    border-top: 3px solid;
    border-image: linear-gradient(to right, var(--blue), var(--gold), var(--lblue), var(--silver)) 1;
    display: flex;
    align-items: center;
    padding: 0 240px 0 25px;
    overflow: hidden;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
  }
  #banner::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(200,212,232,0.008) 30px, rgba(200,212,232,0.008) 31px);
    pointer-events: none;
  }

  #cam-thumb {
    width: 110px; height: 110px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(200,212,232,0.2);
    flex-shrink: 0;
    margin-right: 18px;
    box-shadow: 0 0 25px rgba(43,95,200,0.15), inset 0 0 30px rgba(0,0,0,0.2);
  }
  #cam-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .info { flex: 1; display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 1; }
  .info-label {
    font-size: 0.55rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--gold);
    text-shadow: 0 0 15px var(--glow-gold);
  }
  .info-name {
    font-size: 2rem; font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px var(--glow), 0 2px 10px rgba(0,0,0,0.6);
    letter-spacing: 0.05em; line-height: 1;
  }

  .labels {
    display: flex; gap: 14px;
    margin-top: 3px;
  }
  .label-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.68rem; font-weight: 600;
    color: rgba(200,212,232,0.4);
  }
  .label-item .val { font-weight: 700; }
  .label-item:nth-child(1) .val { color: var(--lblue); }
  .label-item:nth-child(2) .val { color: var(--gold); }
  .label-item:nth-child(3) .val { color: var(--blue); }
  .label-item:nth-child(4) .val { color: var(--silver); }
  .label-item .ico { font-size: 0.72rem; }

  /* ── Crest ── */
  #crest-side {
    margin-left: auto;
    font-size: 2.2rem;
    opacity: 0.12;
    flex-shrink: 0;
    filter: drop-shadow(0 0 15px var(--glow-gold));
    animation: crest-pulse 3s ease-in-out infinite alternate;
  }
  @keyframes crest-pulse {
    0% { opacity: 0.08; filter: drop-shadow(0 0 10px var(--glow-gold)); }
    100% { opacity: 0.18; filter: drop-shadow(0 0 25px var(--glow-gold)); }
  }

  /* ── Rune accent ── */
  .rune-accent {
    font-family: 'Uncial Antiqua', serif;
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.08;
    position: absolute;
    bottom: 6px;
  }
  .rune-accent-l { left: 15px; }
  .rune-accent-r { right: 15px; }
</style>
</head>
<body>
  <div id="banner">
    <span class="rune-accent rune-accent-l">ᚨ ᛚ ᛁ ᚨ ᚾ ᛉ</span>
    <span class="rune-accent rune-accent-r">ᛗ ᛟ ᚱ ᛏ ᛖ</span>

    <div id="cam-thumb">
      <video id="webcam" autoplay muted playsinline></video>
    </div>
    <div class="info">
      <div class="info-label">👑 ahora al aire</div>
      <div class="info-name" id="name-text">Alianza</div>
      <div class="labels">
        <div class="label-item"><span class="ico">📺</span><span class="val" id="followers">0</span> seguidores</div>
        <div class="label-item"><span class="ico">⭐</span><span class="val" id="subs">0</span> suscriptores</div>
        <div class="label-item"><span class="ico">💰</span><span class="val" id="donations">$0</span> donado</div>
        <div class="label-item"><span class="ico">🎯</span><span class="val" id="bits">0</span> bits</div>
      </div>
    </div>
    <div id="crest-side">🦁</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Alianza Banner Webcam · ${username}`;

    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
        document.getElementById('webcam').srcObject = s;
      }).catch(() => {});
    }

    const socket = io((params.get('backend') || 'http://localhost:3000').replace(/\/+$/, ''), { autoConnect: false });
    socket.connect();
    socket.on('connect', () => {
      const ch = params.get('channel');
      if (ch) socket.emit('join:channel', ch);
    });
    socket.on('hud:update', (d) => {
      if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
    });
    socket.on('channel:follow', () => {
      const el = document.getElementById('followers');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:subscribe', () => {
      const el = document.getElementById('subs');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:cheer', (d) => {
      const el = document.getElementById('bits');
      el.textContent = parseInt(el.textContent) + (d.bits || 0);
    });
    socket.on('channel:redemption', (d) => {
      if (d.rewardCost) {
        const el = document.getElementById('donations');
        const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
        el.textContent = '$' + current.toFixed(2);
      }
    });
  </script>
  <script src="/socket.io/socket.io.js"></script>
</body>
</html>
