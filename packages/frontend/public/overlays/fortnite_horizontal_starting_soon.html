<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Horizontal Starting Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: #1a0033; /* Morado espacial Fortnite */
            overflow: hidden; font-family: 'Luckiest Guy', cursive; color: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Cielo estrellado / Fondo */
        .sky-bg {
            position: absolute; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at center, #3a0088 0%, #1a0033 100%);
        }

        .rift-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 1200px; z-index: 2;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.3) 0%, transparent 50%);
            filter: blur(20px); animation: pulseRift 4s ease-in-out infinite;
        }

        @keyframes pulseRift {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: blur(20px); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); filter: blur(30px); opacity: 0.8; background: radial-gradient(circle, rgba(255, 0, 255, 0.3) 0%, transparent 60%); }
        }

        .sunburst {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 3;
            background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 10deg, transparent 10deg 20deg);
            animation: spinBg 90s linear infinite;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .ui-container {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .matchmaking-banner {
            background: #ffea00; color: #000; padding: 15px 80px;
            transform: skewX(-15deg); margin-bottom: 40px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }
        
        .matchmaking-banner span { display: block; transform: skewX(15deg); font-size: 50px; letter-spacing: 5px; }

        @keyframes float {
            0%, 100% { transform: skewX(-15deg) translateY(0); }
            50% { transform: skewX(-15deg) translateY(-15px); }
        }

        .timer-title {
            font-size: 70px; letter-spacing: 5px;
            -webkit-text-stroke: 3px #000; text-shadow: 5px 5px 0 #000;
            color: #00ffff; margin-bottom: 10px;
        }

        .countdown-timer {
            font-size: 350px; font-weight: 900; line-height: 1;
            color: #ffffff; -webkit-text-stroke: 8px #000;
            text-shadow: 15px 15px 0 #000, 0 0 80px rgba(0, 255, 255, 0.6);
            letter-spacing: 20px; margin-bottom: 80px;
        }

        /* Barra de Carga panorámica */
        .loading-bar-wrapper {
            position: absolute; bottom: 100px;
            width: 70%; height: 50px; background: rgba(0,0,0,0.8);
            border: 6px solid #fff; border-radius: 25px; overflow: hidden;
            transform: skewX(-10deg); box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .loading-bar-fill {
            height: 100%; background: linear-gradient(90deg, #00d2ff, #0077ff);
            width: 0%; transition: width 1s linear;
        }

    </style>
</head>
<body>
    <div class="sky-bg"></div>
    <div class="rift-effect"></div>
    <div class="sunburst"></div>

    <div class="ui-container">
        <div class="matchmaking-banner">
            <span>BUSCANDO PARTIDA</span>
        </div>
        
        <div class="timer-title" id="statusText">EL AUTOBÚS DESPEGA EN</div>
        <div class="countdown-timer" id="timerDisplay">05:00</div>
        
        <div class="loading-bar-wrapper">
            <div class="loading-bar-fill" id="timerProgress"></div>
        </div>
    </div>

    <script>
        const TOTAL_MINUTES = 5;
        let totalSeconds = TOTAL_MINUTES * 60;
        const initialSeconds = totalSeconds;

        const displayEl = document.getElementById('timerDisplay');
        const progressEl = document.getElementById('timerProgress');
        const statusEl = document.getElementById('statusText');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function engineTick() {
            displayEl.textContent = formatTime(totalSeconds);
            const percentage = ((initialSeconds - totalSeconds) / initialSeconds) * 100;
            progressEl.style.width = percentage + '%';

            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(engineTick, 1000);
            } else {
                displayEl.textContent = "00:00";
                displayEl.style.color = "#ffea00";
                statusEl.textContent = "¡ATERRIZANDO!";
                progressEl.style.width = '100%';
            }
        }
        engineTick();
    </script>
</body>
</html>
