<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horde Fullscreen Gameplay Overlay</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px;
            height: 1080px;
            background-color: transparent; /* Pantalla completa transparente para el juego en OBS */
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            position: relative;
        }

        .horde-box {
            background: rgba(15, 5, 5, 0.85);
            border: 3px solid #4a0000;
            box-shadow: 
                0 0 15px rgba(255, 0, 0, 0.3), 
                inset 0 0 20px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Remaches de metal decorativos */
        .horde-box::before, .horde-box::after {
            content: ''; position: absolute; width: 8px; height: 8px; background: #555;
            border-radius: 50%; box-shadow: inset -1px -1px 3px #000, 1px 1px 2px rgba(255,0,0,0.5);
            z-index: 10;
        }
        .horde-box::before { top: 6px; left: 6px; }
        .horde-box::after { top: 6px; right: 6px; }

        .horde-header {
            font-family: 'Cinzel', serif;
            background: linear-gradient(to right, #4a0000, #8b0000, #4a0000);
            color: #fff;
            padding: 8px 15px;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid #ff1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 2px 2px 4px #000;
            position: relative;
        }

        /* Webcam Flotante Arriba a la Derecha */
        .floating-cam {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 480px;  /* Aspecto 16:9 aprox */
            height: 310px; /* Incluyendo la cabecera */
        }

        .webcam-content {
            flex-grow: 1;
            background-color: transparent; /* La cámara va aquí detrás en OBS */
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* Contenedor React global */
        #overlay-root {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite clicks a través de la capa de React */
            z-index: 1000; /* Asegura que los datos estén sobre el resto del diseño */
        }
        #overlay-root > * {
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <!-- CONTENEDOR REACT APP (Datos, Espectadores, Alertas) -->
    <div id="overlay-root"></div>

    <!-- Webcam Flotante -->
    <div class="horde-box floating-cam">
        <div class="horde-header">
            <img src="horda_logo.png" alt="Horda" style="height: 20px; margin-right: 10px; filter: drop-shadow(0 0 5px #ff0000);">
            Ojo de Kilrogg
        </div>
        <div class="webcam-content"></div>
        <div style="position: absolute; bottom: 6px; left: 6px; width: 8px; height: 8px; background: #555; border-radius: 50%; box-shadow: inset -1px -1px 3px #000;"></div>
        <div style="position: absolute; bottom: 6px; right: 6px; width: 8px; height: 8px; background: #555; border-radius: 50%; box-shadow: inset -1px -1px 3px #000;"></div>
    </div>

    <!-- Script de Integración de React / Vite -->
    <script type="module" src="./src/overlay.tsx"></script>
</body>
</html>
