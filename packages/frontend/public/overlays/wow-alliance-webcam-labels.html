<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Webcam + Labels</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.4);
  }

  #cam-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; height: 400px;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid rgba(200,212,232,0.18);
    box-shadow: 0 0 40px rgba(43,95,200,0.15), inset 0 0 60px rgba(0,0,0,0.3);
    background: var(--navy);
  }
  #cam-frame::before {
    content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--blue), var(--gold), var(--silver), var(--lblue));
    background-size: 400% 400%;
    z-index: 0;
    animation: border-shimmer 5s ease infinite;
    opacity: 0.55;
  }
  @keyframes border-shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #cam-frame video {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  #inner-glow {
    position: absolute; inset: 0; z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(43,95,200,0.12) 100%);
    mix-blend-mode: screen;
  }

  #light-streak {
    position: absolute;
    top: -50%; left: -20%;
    width: 40%; height: 200%;
    z-index: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(200,212,232,0.03) 40%, rgba(255,200,0,0.05) 50%, rgba(200,212,232,0.03) 60%, transparent 100%);
    transform: rotate(25deg);
    animation: streak-sweep 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes streak-sweep {
    0% { left: -30%; }
    50% { left: 110%; }
    100% { left: -30%; }
  }

  .shield-inner {
    position: absolute; z-index: 3;
    width: 55px; height: 62px;
    opacity: 0.18;
    filter: drop-shadow(0 0 6px var(--glow));
  }
  .shield-inner svg { width: 100%; height: 100%; }
  .shield-inner-tl { top: 5px; left: 5px; }
  .shield-inner-tr { top: 5px; right: 5px; transform: scaleX(-1); }
  .shield-inner-bl { bottom: 5px; left: 5px; transform: scaleY(-1); }
  .shield-inner-br { bottom: 5px; right: 5px; transform: scale(-1, -1); }

  #username {
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 0.95rem; font-weight: 700;
    color: var(--silver);
    text-shadow: 0 0 20px var(--glow), 0 2px 6px rgba(0,0,0,0.9);
    letter-spacing: 0.12em;
    padding: 3px 16px;
    border-radius: 99px;
    background: rgba(10,14,39,0.55);
    border: 1px solid rgba(200,212,232,0.12);
    backdrop-filter: blur(6px);
  }

  .labels {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 4;
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    background: linear-gradient(to top, rgba(10,14,39,0.92), transparent);
  }
  .label-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(200,212,232,0.04);
    border: 1px solid rgba(200,212,232,0.07);
    min-width: 68px;
  }
  .label-icon { font-size: 0.85rem; }
  .label-value { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.05em; }
  .label-title { font-size: 0.48rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(200,212,232,0.35); }
  .label-item:nth-child(1) .label-value { color: var(--lblue); }
  .label-item:nth-child(2) .label-value { color: var(--gold); }
  .label-item:nth-child(3) .label-value { color: var(--blue); }
  .label-item:nth-child(4) .label-value { color: var(--silver); }
</style>
</head>
<body>
  <div id="cam-frame">
    <div id="light-streak"></div>
    <div class="shield-inner shield-inner-tl">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2b5fc8"/><stop offset="50%" stop-color="#8ab4ff"/><stop offset="100%" stop-color="#c8d4e8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg1)" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
    </div>
    <div class="shield-inner shield-inner-tr">
      <svg viewBox="0 0 100 110"><defs><linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c8d4e8"/><stop offset="50%" stop-color="#ffc800"/><stop offset="100%" stop-color="#2b5fc8"/></linearGradient></defs><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="url(#sg2)" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
    </div>
    <div class="shield-inner shield-inner-bl"><svg viewBox="0 0 100 110"><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="#2b5fc8" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg></div>
    <div class="shield-inner shield-inner-br"><svg viewBox="0 0 100 110"><path d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z" fill="none" stroke="#2b5fc8" stroke-width="2"/><path d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg></div>

    <div id="username"><span id="name-text">Alianza</span></div>
    <video id="webcam" autoplay muted playsinline></video>
    <div id="inner-glow"></div>
    <div class="labels">
      <div class="label-item">
        <span class="label-icon">📺</span>
        <span class="label-value" id="followers">0</span>
        <span class="label-title">Seguidores</span>
      </div>
      <div class="label-item">
        <span class="label-icon">⭐</span>
        <span class="label-value" id="subs">0</span>
        <span class="label-title">Suscriptores</span>
      </div>
      <div class="label-item">
        <span class="label-icon">💰</span>
        <span class="label-value" id="donations">$0</span>
        <span class="label-title">Donaciones</span>
      </div>
      <div class="label-item">
        <span class="label-icon">🎯</span>
        <span class="label-value" id="bits">0</span>
        <span class="label-title">Bits</span>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Alianza Webcam+Labels · ${username}`;

    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
        document.getElementById('webcam').srcObject = s;
      }).catch(() => {});
    }

    const socket = io((params.get('backend') || 'http://localhost:3000').replace(/\/+$/, ''), { autoConnect: false });
    socket.connect();
    socket.on('connect', () => {
      const ch = params.get('channel');
      if (ch) socket.emit('join:channel', ch);
    });
    socket.on('hud:update', (d) => {
      if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
    });
    socket.on('channel:follow', () => {
      const el = document.getElementById('followers');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:subscribe', () => {
      const el = document.getElementById('subs');
      el.textContent = parseInt(el.textContent) + 1;
    });
    socket.on('channel:cheer', (d) => {
      const el = document.getElementById('bits');
      el.textContent = parseInt(el.textContent) + (d.bits || 0);
    });
    socket.on('channel:redemption', (d) => {
      if (d.rewardCost) {
        const el = document.getElementById('donations');
        const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
        el.textContent = '$' + current.toFixed(2);
      }
    });
  </script>
  <script src="/socket.io/socket.io.js"></script>
</body>
</html>
