<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Gameplay Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1280px 640px; 
            grid-template-rows: 1080px;
        }

        .game-monitor-area {
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
        }

        .crt-tv {
            flex-grow: 1;
            border: 24px solid #333;
            border-radius: 40px;
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.9),
                10px 10px 0px rgba(0,0,0,0.5);
            background-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .crt-tv::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .tv-label {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #7c7c7c;
            font-size: 10px;
            padding: 0 20px;
            letter-spacing: 2px;
        }

        .side-panel {
            display: grid;
            grid-template-rows: 360px 720px; 
            padding: 20px 20px 20px 0;
            box-sizing: border-box;
            gap: 20px;
        }

        .rpg-box {
            background-color: rgba(0, 0, 0, 0.85);
            border: 6px solid #ffffff;
            box-shadow: inset -6px -6px 0px #5C5C5C, inset 6px 6px 0px #7C7C7C;
            position: relative;
            color: #fff;
            box-sizing: border-box;
        }

        .box-title {
            position: absolute;
            top: -14px;
            left: 20px;
            background: #000;
            padding: 0 10px;
            color: #F8B800;
            font-size: 16px;
        }

        .webcam-area {
            background-color: transparent; 
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px 10px;
            overflow: hidden;
        }

        .chat-msg {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            word-wrap: break-word;
            animation: typeIn 0.1s steps(10, end) forwards;
        }

        .user { color: #004CE5; }
        .text { color: #ffffff; }

        .event-notif {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 6px 10px;
            background: rgba(248, 184, 0, 0.15);
            border-left: 4px solid #F8B800;
            animation: notif-in 0.4s ease-out;
        }
        @keyframes notif-in {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="game-monitor-area">
        <div class="crt-tv">
            <div class="tv-label">VIDEO 1</div>
        </div>
    </div>

    <div class="side-panel">
        
        <div class="rpg-box webcam-area">
            <div class="box-title">WEBCAM</div>
        </div>

        <div class="rpg-box chat-area" id="chatWrapper">
            <div class="box-title">CHAT_LOG</div>
        </div>

    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MSG = 8;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#004CE5';

            msgNode.innerHTML = `<span class="user" style="color: ${finalColor}">[${safeUsername}]</span> <span class="text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MSG + 1) {
                chatWrapper.removeChild(chatWrapper.children[1]);
            }
        }

        function pushEvent(html) {
            const node = document.createElement('div');
            node.className = 'event-notif';
            node.innerHTML = html;
            chatWrapper.appendChild(node);
            const total = chatWrapper.querySelectorAll('.event-notif').length;
            if (total > 3) {
                const first = chatWrapper.querySelector('.event-notif');
                if (first) first.remove();
            }
        }

        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
        const CHANNEL = params.get('channel');

        if (CHANNEL) {
            document.title = '8-Bit Gameplay · ' + CHANNEL;
        }

        function initSocket() {
            const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                if (CHANNEL) socket.emit('join:channel', CHANNEL);
            });
            socket.on('chat:message', (d) => {
                appendMessage(
                    d.user?.displayName || d.userDisplayName || d.userName || 'Anónimo',
                    d.text || '',
                    d.user?.color || '#004CE5'
                );
            });
            socket.on('channel:follow', (d) => {
                pushEvent('⭐ <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> nos sigue!');
            });
            socket.on('channel:subscribe', (d) => {
                pushEvent('🎉 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> se suscribió!');
            });
            socket.on('channel:cheer', (d) => {
                pushEvent('💎 <b>' + (d.userDisplayName || d.userName || 'Anónimo') + '</b> animó con ' + (d.bits || 0) + ' bits!');
            });
            socket.on('channel:redemption', (d) => {
                pushEvent('🎯 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> canjeó <b>' + (d.rewardTitle || '') + '</b>');
            });
        }

        function loadSocketIO(cb) {
            const script = document.createElement('script');
            script.src = BACKEND_URL + '/socket.io/socket.io.js';
            script.onload = cb;
            script.onerror = () => cb(new Error('load failed'));
            document.head.appendChild(script);
        }

        loadSocketIO(function(err) {
            if (!err) initSocket();
        });

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });
    </script>
</body>
</html>
