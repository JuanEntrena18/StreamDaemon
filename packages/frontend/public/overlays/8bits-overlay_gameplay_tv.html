<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Gameplay Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent; /* Transparente para OBS */
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            display: grid;
            /* Layout 3x3 conceptualizado: 1280px (2 cols) + 640px (1 col) */
            grid-template-columns: 1280px 640px; 
            grid-template-rows: 1080px;
        }

        /* ----- ZONA JUEGO (Monitor 2/3 pantalla) ----- */
        .game-monitor-area {
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
        }

        .crt-tv {
            flex-grow: 1;
            border: 24px solid #333; /* Carcasa de la TV */
            border-radius: 40px; /* Bordes redondeados de TV antigua */
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.9), /* Sombra interior profunda */
                10px 10px 0px rgba(0,0,0,0.5); /* Sombra exterior */
            background-color: transparent; /* El juego se ve aquí */
            position: relative;
            overflow: hidden;
        }

        /* Scanlines y efecto cristal curvo */
        .crt-tv::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none; /* Permite clicks a través si fuera necesario */
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5); /* Viñeta CRT */
        }

        .tv-label {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #7c7c7c;
            font-size: 10px;
            padding: 0 20px;
            letter-spacing: 2px;
        }

        /* ----- ZONA LATERAL (1/3 pantalla) ----- */
        .side-panel {
            display: grid;
            /* Fila 1: Webcam (360px alto), Filas 2-3: Chat (720px alto) */
            grid-template-rows: 360px 720px; 
            padding: 20px 20px 20px 0;
            box-sizing: border-box;
            gap: 20px;
        }

        /* Estilo general RPG Box para los paneles */
        .rpg-box {
            background-color: rgba(0, 0, 0, 0.85); /* Fondo negro semitransparente */
            border: 6px solid #ffffff;
            box-shadow: inset -6px -6px 0px #5C5C5C, inset 6px 6px 0px #7C7C7C;
            position: relative;
            color: #fff;
            box-sizing: border-box;
        }

        .box-title {
            position: absolute;
            top: -14px;
            left: 20px;
            background: #000;
            padding: 0 10px;
            color: #F8B800; /* Amarillo NES */
            font-size: 16px;
        }

        /* Webcam */
        .webcam-area {
            /* Dejar el interior transparente para la cámara en OBS */
            background-color: transparent; 
        }

        /* Chat */
        .chat-area {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px 10px;
            overflow: hidden;
        }

        .chat-msg {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            word-wrap: break-word;
            animation: typeIn 0.1s steps(10, end) forwards;
        }

        .user { color: #004CE5; /* Azul NES */ }
        .text { color: #ffffff; }

    </style>
</head>
<body>

    <!-- 2/3 Izquierda: Monitor del Juego -->
    <div class="game-monitor-area">
        <div class="crt-tv">
            <div class="tv-label">VIDEO 1</div>
        </div>
    </div>

    <!-- 1/3 Derecha: Webcam y Chat -->
    <div class="side-panel">
        
        <!-- Webcam Fila 1 -->
        <div class="rpg-box webcam-area">
            <div class="box-title">WEBCAM</div>
        </div>

        <!-- Chat Fila 2 y 3 -->
        <div class="rpg-box chat-area" id="chatWrapper">
            <div class="box-title">CHAT_LOG</div>
            <!-- Mensajes JS inyectados aquí -->
        </div>

    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MSG = 8;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#004CE5';

            msgNode.innerHTML = `<span class="user" style="color: ${finalColor}">[${safeUsername}]</span> <span class="text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MSG + 1) {
                chatWrapper.removeChild(chatWrapper.children[1]);
            }
        }

        // Listener del cliente propio
        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });

        // Test - Borrar en producción
        setTimeout(() => appendMessage("Navi", "Hey! Listen!", "#5CE430"), 1000);
        setTimeout(() => appendMessage("Link", "...", "#E52521"), 3000);
    </script>
</body>
</html>
