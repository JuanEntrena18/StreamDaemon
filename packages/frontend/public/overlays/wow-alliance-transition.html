<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Transición</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.4);
  }

  #stage {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(43,95,200,0.12), transparent 70%),
                linear-gradient(180deg, rgba(10,14,39,0.9) 0%, rgba(13,21,48,0.95) 50%, rgba(10,14,39,0.9) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
    overflow: hidden;
  }
  #stage.active { opacity: 1; }

  #grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,212,232,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,212,232,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #stage.active #grid { opacity: 1; }

  /* ── Light ray sweep ── */
  #light-ray {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(200,212,232,0.02) 20%,
      rgba(255,200,0,0.06) 45%,
      rgba(200,212,232,0.08) 50%,
      rgba(255,200,0,0.06) 55%,
      rgba(200,212,232,0.02) 80%,
      transparent 100%);
    transform: skewX(-15deg);
    opacity: 0;
    pointer-events: none;
  }
  #stage.active #light-ray {
    animation: ray-sweep 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes ray-sweep {
    0% { left: -100%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { left: 200%; opacity: 0; }
  }

  /* ── Divine glow behind shield ── */
  #divine-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,200,0,0.06) 0%, rgba(43,95,200,0.04) 40%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }
  #stage.active #divine-glow {
    animation: glow-in 0.8s ease 0.2s forwards, glow-pulse 2s ease-in-out 1s infinite alternate;
  }
  @keyframes glow-in { to { opacity: 1; } }
  @keyframes glow-pulse {
    0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
  }

  /* ── Shield emblem ── */
  #shield-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 380px; height: 420px;
    z-index: 2;
  }
  #shield {
    width: 100%; height: 100%;
    transform: scale(0);
    opacity: 0;
  }
  #stage.active #shield {
    animation: shield-in 0.8s cubic-bezier(0.175,0.885,0.32,1.4) forwards;
  }
  @keyframes shield-in {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    60%  { transform: scale(1.08) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  #shield svg { width: 100%; height: 100%; }
  #shield .shield-fill { fill: rgba(10,14,39,0.5); stroke: url(#sg); stroke-width: 3; }
  #shield .shield-gold { stroke: #ffc800; stroke-width: 2.5; fill: none; }
  #shield .shield-inner { stroke: url(#sg); stroke-width: 1.5; fill: none; }
  #shield .shield-glow { stroke: #ffc800; stroke-width: 2; fill: none; animation: shield-glow-pulse 2s ease-in-out infinite alternate; }
  @keyframes shield-glow-pulse {
    0% { opacity: 0.3; stroke-width: 2; }
    100% { opacity: 0.8; stroke-width: 3; filter: drop-shadow(0 0 15px var(--glow-gold)); }
  }

  /* ── Crown above ── */
  #crown-above {
    position: absolute;
    top: -20px; left: 50%;
    transform: translateX(-50%);
    font-size: 2.5rem;
    opacity: 0;
    z-index: 3;
    filter: drop-shadow(0 0 30px var(--glow-gold));
  }
  #stage.active #crown-above {
    animation: crown-in 0.5s ease 0.3s forwards;
  }
  @keyframes crown-in { to { opacity: 0.7; } }

  /* ── Text ── */
  #text-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    opacity: 0;
  }
  #stage.active #text-container {
    animation: text-in 0.6s ease 0.6s forwards;
  }
  @keyframes text-in { to { opacity: 1; } }

  #text-label {
    font-size: 0.65rem; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-shadow: 0 0 25px var(--glow-gold);
    margin-bottom: 6px;
  }
  #text-name {
    font-size: 2.8rem; font-weight: 900;
    color: #fff;
    text-shadow: 0 0 50px var(--glow), 0 0 100px rgba(43,95,200,0.2), 0 4px 20px rgba(0,0,0,0.6);
    letter-spacing: 0.1em;
    line-height: 1;
  }

  /* ── Particle burst ── */
  #particle-burst {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .burst-particle {
    position: absolute;
    border-radius: 50%;
    animation: burst-fly linear forwards;
  }
  @keyframes burst-fly {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* ── Bottom banner ── */
  #bottom-banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, var(--blue), var(--gold), var(--lblue), var(--silver));
    opacity: 0;
    transform: scaleX(0);
  }
  #stage.active #bottom-banner {
    animation: banner-in 0.8s ease 0.5s forwards;
  }
  @keyframes banner-in { to { opacity: 1; transform: scaleX(1); } }

  /* ── Rune ring (subtle) ── */
  #rune-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; height: 520px;
    border-radius: 50%;
    border: 1px solid rgba(255,200,0,0.04);
    opacity: 0;
    pointer-events: none;
  }
  #stage.active #rune-ring {
    animation: ring-in 1s ease 0.4s forwards, ring-spin 20s linear 1.4s infinite;
  }
  @keyframes ring-in { to { opacity: 0.3; } }
  @keyframes ring-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  #trigger {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    padding: 10px 28px;
    background: rgba(43,95,200,0.15);
    border: 1px solid rgba(43,95,200,0.3);
    border-radius: 99px;
    color: #fff;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s;
    letter-spacing: 0.1em;
    backdrop-filter: blur(8px);
  }
  #trigger:hover { background: rgba(43,95,200,0.25); box-shadow: 0 0 20px var(--glow); }
</style>
</head>
<body>
  <div id="stage">
    <div id="grid"></div>
    <div id="light-ray"></div>
    <div id="divine-glow"></div>
    <div id="rune-ring"></div>
    <div id="crown-above">👑</div>
    <div id="shield-container">
      <div id="shield">
        <svg viewBox="0 0 100 110">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2b5fc8"/>
              <stop offset="50%" stop-color="#8ab4ff"/>
              <stop offset="100%" stop-color="#c8d4e8"/>
            </linearGradient>
          </defs>
          <path class="shield-fill" d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z"/>
          <path class="shield-glow" d="M50 2 L90 25 L90 65 Q90 85 50 108 Q10 85 10 65 L10 25 Z"/>
          <path class="shield-gold" d="M50 10 L80 28 L80 60 Q80 78 50 100 Q20 78 20 60 L20 28 Z"/>
          <path class="shield-inner" d="M50 22 L63 37 L55 42 L50 55 L45 42 L37 37 Z"/>
          <line class="shield-gold" x1="50" y1="55" x2="50" y2="80" stroke-width="1.5"/>
          <line class="shield-gold" x1="35" y1="65" x2="65" y2="65" stroke-width="1.5"/>
          <line class="shield-gold" x1="30" y1="75" x2="70" y2="75" stroke-width="1.5"/>
        </svg>
      </div>
    </div>
    <div id="text-container">
      <div id="text-label">👑 por la Alianza</div>
      <div id="text-name"><span id="name-text">Alianza</span></div>
    </div>
    <div id="particle-burst"></div>
    <div id="bottom-banner"></div>
  </div>

  <button id="trigger">▶ Probar transición</button>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Alianza Transición · ${username}`;

    function createParticleBurst() {
      const container = document.getElementById('particle-burst');
      const cx = 960, cy = 540;
      const colors = ['#ffc800', '#c8d4e8', '#8ab4ff', '#2b5fc8', '#ffc800'];
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'burst-particle';
        const angle = (Math.PI * 2 * i) / 60 + (Math.random() - 0.5) * 0.3;
        const dist = 200 + Math.random() * 400;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.left = '960px';
        p.style.top = '540px';
        p.style.width = (2 + Math.random() * 5) + 'px';
        p.style.height = p.style.width;
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.boxShadow = `0 0 8px ${p.style.background}`;
        p.style.animationDuration = (1 + Math.random() * 1.5) + 's';
        p.style.animationDelay = (0.6 + Math.random() * 0.4) + 's';
        container.appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }
    }

    function triggerTransition() {
      const stage = document.getElementById('stage');
      stage.classList.add('active');
      createParticleBurst();
      setTimeout(() => createParticleBurst(), 800);
    }

    document.getElementById('trigger').addEventListener('click', triggerTransition);

    if (params.get('auto') === '1') {
      setTimeout(triggerTransition, 500);
    }
  </script>
</body>
</html>
