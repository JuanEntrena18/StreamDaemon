<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Start Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 1920px;
            height: 1080px;
            background-color: #008080; /* Clásico Teal de Win95 */
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
            -webkit-font-smoothing: none; /* Intenta forzar el renderizado sin antialiasing */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .win-window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            box-shadow: 1px 1px 0 #808080 inset, -1px -1px 0 #dfdfdf inset;
            width: 800px;
            padding: 3px;
        }

        .win-titlebar {
            background-color: #000080;
            color: #ffffff;
            padding: 4px 5px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 1px;
        }

        .win-buttons {
            display: flex;
            gap: 2px;
        }

        .win-btn {
            width: 24px;
            height: 24px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            font-weight: bold;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .win-content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-icon {
            width: 64px;
            height: 64px;
            background-color: transparent;
            margin-bottom: 20px;
            image-rendering: pixelated;
        }

        .message {
            font-size: 24px;
            margin-bottom: 40px;
            color: #000;
        }

        .progress-container {
            width: 100%;
            height: 40px;
            background-color: #fff;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080; /* Inset border */
            padding: 3px;
            display: flex;
            gap: 2px;
        }

        .progress-block {
            height: 100%;
            background-color: #000080;
            width: 0%;
            transition: width 1s linear;
        }

        .timer-text {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="win-window">
        <div class="win-titlebar">
            <span>Copiando Archivos del Stream...</span>
            <div class="win-buttons">
                <div class="win-btn">_</div>
                <div class="win-btn">◻</div>
                <div class="win-btn">X</div>
            </div>
        </div>
        
        <div class="win-content">
            <!-- Icono simulado de reloj de arena o disco -->
            <svg class="status-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="2" width="20" height="28" fill="#fff" stroke="#000" stroke-width="2"/>
                <rect x="8" y="4" width="16" height="12" fill="#000080"/>
                <rect x="14" y="22" width="4" height="4" fill="#808080"/>
            </svg>
            
            <div class="message" id="statusMessage">Iniciando sistema. Por favor, espere...</div>
            
            <div class="progress-container">
                <div class="progress-block" id="progressBar"></div>
            </div>
            
            <div class="timer-text" id="timerDisplay">Tiempo restante: 05:00</div>
        </div>
    </div>

    <script>
        const TOTAL_MINUTES = 5;
        let totalSeconds = TOTAL_MINUTES * 60;
        const initialSeconds = totalSeconds;

        const displayEl = document.getElementById('timerDisplay');
        const progressEl = document.getElementById('progressBar');
        const messageEl = document.getElementById('statusMessage');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function engineTick() {
            displayEl.textContent = "Tiempo restante: " + formatTime(totalSeconds);
            
            // Barra de progreso (0 a 100%)
            const percentage = ((initialSeconds - totalSeconds) / initialSeconds) * 100;
            progressEl.style.width = percentage + '%';

            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(engineTick, 1000);
            } else {
                displayEl.textContent = "Tiempo restante: 00:00";
                messageEl.textContent = "Carga completada. Ejecutando Stream.exe...";
                progressEl.style.width = '100%';
            }
        }
        engineTick();
    </script>
</body>
</html>
