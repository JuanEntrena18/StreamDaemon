<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Horda Banner Webcam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --red: #cc0000;
    --dred: #700000;
    --gold: #ffc800;
    --dark: #0a0505;
  }

  .horde-crest {
    position: absolute; width: 85px; height: 95px; opacity: 0.18;
  }
  .horde-crest svg { width: 100%; height: 100%; }
  .crest-l { bottom: 0; left: -18px; }
  .crest-r { bottom: 0; right: -18px; transform: scaleX(-1); }

  #banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 150px;
    background: linear-gradient(to right,
      rgba(10,5,5,0.93), rgba(30,10,10,0.95), rgba(10,5,5,0.93));
    border-top: 3px solid;
    border-image: linear-gradient(to right, var(--red), var(--gold), var(--dred)) 1;
    display: flex;
    align-items: center;
    padding: 0 220px 0 25px;
    overflow: hidden;
  }

  #cam-thumb {
    width: 110px; height: 110px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,200,0,0.3);
    flex-shrink: 0;
    margin-right: 18px;
    box-shadow: 0 0 20px rgba(204,0,0,0.15);
  }
  #cam-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--gold); text-shadow: 0 0 10px rgba(255,200,0,0.2); }
  .info-name { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(204,0,0,0.3), 0 2px 10px rgba(0,0,0,0.5); letter-spacing: 0.05em; line-height: 1; }

  .labels { display: flex; gap: 14px; margin-top: 4px; }
  .label-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.45); }
  .label-item .val { font-weight: 700; }
  .label-item:nth-child(1) .val { color: var(--red); }
  .label-item:nth-child(2) .val { color: var(--gold); }
  .label-item:nth-child(3) .val { color: var(--red); }
  .label-item:nth-child(4) .val { color: var(--gold); }
  .label-item .ico { font-size: 0.75rem; }

  #crest { margin-left: auto; font-size: 2.2rem; opacity: 0.2; flex-shrink: 0; }
  .wow-logo {
    position: absolute;
    width: 72px; height: 72px;
    bottom: 20px; right: 20px;
    z-index: 999;
    opacity: 0.2;
    animation: wowSpin 10s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.3));
    border-radius: 50%;
    object-fit: cover;
  }
  @keyframes wowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .horde-crest-watermark {
    position: absolute;
    width: 180px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 0;
    pointer-events: none;
    animation: crestPulse 5s ease-in-out infinite;
  }
  @keyframes crestPulse {
    0%, 100% { opacity: 0.05; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>
  <img class="horde-crest-watermark" src="horda_logo.png" alt="">
  <img class="wow-logo" src="world-of-warcraft-logo.png" alt="">
  <div class="horde-crest crest-l">
    <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
  </div>
  <div class="horde-crest crest-r">
    <svg viewBox="0 0 100 110"><path d="M50 0 L95 20 L95 55 Q95 80 50 108 Q5 80 5 55 L5 20 Z" fill="none" stroke="#cc0000" stroke-width="2"/><path d="M50 8 L85 24 L85 52 Q85 74 50 100 Q15 74 15 52 L15 24 Z" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
  </div>

  <div id="banner">
    <div id="cam-thumb">
      <video id="webcam" autoplay muted playsinline></video>
    </div>
    <div class="info">
      <div class="info-label">⚔️ ahora al aire</div>
      <div class="info-name" id="name-text">Horda</div>
      <div class="labels">
        <div class="label-item"><span class="ico">📺</span><span class="val" id="followers">0</span> seguidores</div>
        <div class="label-item"><span class="ico">⭐</span><span class="val" id="subs">0</span> suscriptores</div>
        <div class="label-item"><span class="ico">💰</span><span class="val" id="donations">$0</span> donado</div>
        <div class="label-item"><span class="ico">🎯</span><span class="val" id="bits">0</span> bits</div>
      </div>
    </div>
    <div id="crest">💀</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Horda';
    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Horda Banner Webcam · ${username}`;

    if (navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
        document.getElementById('webcam').srcObject = s;
      }).catch(() => {});
    }

    function applyHud(d) {
      console.log('[HUD] applyHud', d);
      if (d.followers !== undefined) document.getElementById('followers').textContent = Number(d.followers).toLocaleString();
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = Number(d.subscribers).toLocaleString();
    }

    function initSocket() {
      console.log('[HUD] initSocket, BACKEND_URL=' + BACKEND_URL + ', CHANNEL=' + CHANNEL);
      const socket = io(BACKEND_URL, { transports: ['websocket'] });
      socket.on('connect', () => {
        console.log('[HUD] socket connected');
        if (!CHANNEL) { console.warn('[HUD] no channel'); return; }
        socket.emit('join:channel', CHANNEL);
        console.log('[HUD] fetching initial data from', BACKEND_URL + '/hud/' + CHANNEL);
        fetch(BACKEND_URL + '/hud/' + CHANNEL)
          .then(r => { console.log('[HUD] initial fetch status', r.status); return r.ok ? r.json() : null; })
          .then(d => { console.log('[HUD] initial data', d); if (d) applyHud(d); })
          .catch(e => console.warn('[HUD] initial fetch error', e));
        console.log('[HUD] starting poll');
        fetch(BACKEND_URL + '/hud/start-poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: CHANNEL, interval: 10 })
        }).then(r => console.log('[HUD] poll start status', r.status)).catch(e => console.warn('[HUD] poll start error', e));
      });
      socket.on('connect_error', (e) => console.warn('[HUD] socket connect_error', e));
      socket.on('hud:update', (d) => { console.log('[HUD] hud:update event', d); applyHud(d); });
      socket.on('channel:follow', () => {
        const el = document.getElementById('followers');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + 1;
      });
      socket.on('channel:subscribe', () => {
        const el = document.getElementById('subs');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + 1;
      });
      socket.on('channel:cheer', (d) => {
        const el = document.getElementById('bits');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + (d.bits || 0);
      });
      socket.on('channel:redemption', (d) => {
        if (d.rewardCost) {
          const el = document.getElementById('donations');
          const current = parseFloat(el.textContent.replace('$','').replace(',','.')) + (d.rewardCost / 100);
          el.textContent = '$' + current.toFixed(2);
        }
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.onload = () => cb();
script.src = './js/socket.io.js';
      script.src = './js/socket.io.js';
script.src = './js/socket.io.js';
      script.onerror = () => { console.log('[HUD] socket.io.js loaded'); cb(); };
      script.onerror = () => { console.warn('[HUD] socket.io.js load failed'); cb(new Error('load failed')); };
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      console.log('[HUD] loadSocketIO callback err=', err);
      if (!err) initSocket();
    });
  </script>
</body>
</html>
