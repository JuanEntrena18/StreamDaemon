<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrowave BRB Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: #050210;
            overflow: hidden; font-family: 'Orbitron', sans-serif; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .vhs-scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(255, 0, 255, 0.05) 50%, rgba(255, 0, 255, 0.05));
            background-size: 100% 8px; pointer-events: none; z-index: 100;
        }

        .retro-sun {
            position: absolute; bottom: 40%; width: 500px; height: 500px;
            background: linear-gradient(to bottom, #ff00ff, #ffaa00); border-radius: 50%;
            mask-image: repeating-linear-gradient(to bottom, black 0%, black 6%, transparent 6%, transparent 8%);
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0%, black 6%, transparent 6%, transparent 8%);
            box-shadow: 0 0 100px #ff00ff; z-index: 1;
        }

        .grid-floor {
            position: absolute; bottom: -20%; left: -50%; width: 200%; height: 70%;
            background-image: 
                linear-gradient(transparent 95%, #00ffff 100%),
                linear-gradient(90deg, transparent 95%, #00ffff 100%);
            background-size: 80px 80px;
            transform: rotateX(75deg);
            animation: drive 2s linear infinite;
            box-shadow: inset 0 0 100px #00ffff; z-index: 2;
        }

        @keyframes drive {
            0% { background-position-y: 0; }
            100% { background-position-y: 80px; }
        }

        .text-container {
            position: relative; z-index: 10; text-align: center;
            margin-top: -100px;
        }

        .main-title {
            font-size: 140px; font-weight: 900; letter-spacing: 15px;
            background: linear-gradient(to bottom, #ffffff 30%, #ff00ff 70%);
            -webkit-background-clip: text; color: transparent;
            filter: drop-shadow(0 0 20px #ff00ff);
            margin-bottom: 10px;
            animation: glitch 3s infinite;
        }

        .sub-title {
            font-size: 40px; color: #00ffff; text-shadow: 0 0 20px #00ffff;
            letter-spacing: 10px; animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }
        
        @keyframes glitch {
            0%, 95%, 100% { transform: translate(0, 0); }
            96% { transform: translate(-5px, 5px); filter: drop-shadow(0 0 20px #00ffff); }
            98% { transform: translate(5px, -5px); filter: drop-shadow(0 0 20px #ff00ff); }
        }
    </style>
</head>
<body>
    <div class="vhs-scanlines"></div>
    <div class="retro-sun"></div>
    <div class="grid-floor"></div>

    <div class="text-container">
        <div class="main-title">AFK</div>
        <div class="sub-title">RECHARGING SYSTEMS...</div>
    </div>
</body>
</html>
