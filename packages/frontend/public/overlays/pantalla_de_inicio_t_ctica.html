<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSG Starting Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px;
            height: 1080px;
            background-color: #020302;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            color: #ffb300; /* Ámbar táctico */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Scanlines y ruido de monitor */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .crt-flicker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 179, 0, 0.02);
            animation: flicker 0.15s infinite;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes flicker {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.8; }
        }

        /* Estilo de panel octogonal BSG */
        .panel-outer {
            background: #ffb300;
            padding: 3px;
            clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 30px, 100% calc(100% - 30px), calc(100% - 30px) 100%, 30px 100%, 0 calc(100% - 30px), 0 30px);
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .panel-inner {
            background: #0a0d0a;
            padding: 50px 100px;
            clip-path: polygon(28px 0, calc(100% - 28px) 0, 100% 28px, 100% calc(100% - 28px), calc(100% - 28px) 100%, 28px 100%, 0 calc(100% - 28px), 0 28px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Radar DRADIS */
        .dradis-container {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid #4caf50;
            position: relative;
            margin-bottom: 40px;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.1) 0%, rgba(0,0,0,0) 70%);
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.2), inset 0 0 20px rgba(76, 175, 80, 0.3);
            overflow: hidden;
        }

        .dradis-grid {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(76, 175, 80, 0.3);
            background-image: 
                linear-gradient(0deg, transparent 49.5%, rgba(76, 175, 80, 0.5) 50%, transparent 50.5%),
                linear-gradient(90deg, transparent 49.5%, rgba(76, 175, 80, 0.5) 50%, transparent 50.5%);
        }

        .dradis-grid::before {
            content: ''; position: absolute; top: 25%; left: 25%; right: 25%; bottom: 25%;
            border: 1px solid rgba(76, 175, 80, 0.3); border-radius: 50%;
        }

        .dradis-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(76, 175, 80, 0.8) 0deg, transparent 60deg);
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep { 100% { transform: rotate(360deg); } }

        .dradis-contact {
            position: absolute; width: 6px; height: 6px; background: #ff4444; border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            top: 30%; left: 60%;
            animation: ping 4s infinite;
        }

        @keyframes ping { 0%, 10% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* Textos */
        .sys-text {
            font-size: 24px; color: #4caf50; letter-spacing: 5px; margin-bottom: 10px;
        }

        .title {
            font-size: 60px; font-weight: bold; letter-spacing: 10px; text-shadow: 0 0 15px rgba(255, 179, 0, 0.8);
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 90px; color: #f44336; text-shadow: 0 0 20px rgba(244, 67, 54, 0.8);
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <div class="panel-outer">
        <div class="panel-inner">
            <div class="dradis-container">
                <div class="dradis-grid"></div>
                <div class="dradis-sweep"></div>
                <div class="dradis-contact"></div>
            </div>
            
            <div class="sys-text">SISTEMAS ONLINE - CARGANDO MOTORES FTL</div>
            <div class="title">PREPARACIÓN DE SALTO</div>
            <div class="countdown" id="timerDisplay">05:00</div>
        </div>
    </div>

    <script>
        // Lógica de Cuenta Atrás
        let totalSeconds = 5 * 60;
        const displayEl = document.getElementById('timerDisplay');

        function engineTick() {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            displayEl.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(engineTick, 1000);
            } else {
                displayEl.textContent = "AUTORIZACIÓN CONCEDIDA";
                displayEl.style.fontSize = "50px";
                displayEl.style.color = "#4caf50";
            }
        }
        engineTick();
    </script>
</body>
</html>
