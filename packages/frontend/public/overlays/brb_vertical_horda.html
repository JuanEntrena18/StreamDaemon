<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horde Vertical BRB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1080px; height: 1920px; background-color: #050000;
            overflow: hidden; font-family: 'Cinzel', serif; color: #ffffff;
        }

        .environment {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #300000 0%, #050000 80%); z-index: 1;
        }

        .embers {
            position: absolute; width: 100%; height: 100%; z-index: 2;
            background-image: radial-gradient(#ff3300 4px, transparent 4px);
            background-size: 120px 120px; opacity: 0.2;
            animation: riseEmbers 10s linear infinite;
        }

        @keyframes riseEmbers {
            0% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
        }

        .ui-container {
            position: absolute; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 50px;
        }

        .shield-container {
            position: relative; margin-bottom: 80px;
            animation: hoverShield 6s ease-in-out infinite;
        }

        @keyframes hoverShield {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .horde-logo {
            width: 450px; filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
        }

        .brb-text {
            font-size: 110px; font-weight: 900; line-height: 1.1;
            color: #ffffff; text-shadow: 0 0 50px #ff0000, 5px 5px 15px #000;
            letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase;
        }

        .sub-text {
            font-size: 50px; color: #ff6666; letter-spacing: 8px;
            text-shadow: 2px 2px 10px #000;
        }

        .loading-dots::after { content: '.'; animation: dots 2s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { color: transparent; } 40% { color: #ff6666; } 60% { color: transparent; } 80%, 100% { color: #ff6666; } }
    </style>
</head>
<body>
    <div class="environment"></div>
    <div class="embers"></div>

    <div class="ui-container">
        <div class="shield-container">
            <img src="horda_logo.png" alt="Horda" class="horde-logo">
        </div>
        <div class="brb-text">AFILANDO<br>EL HACHA</div>
        <div class="sub-text">VOLVEMOS PRONTO<span class="loading-dots"></span></div>
    </div>
</body>
</html>
