<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Horizontal Ending</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:    #00d2ff;
            --blue-dark:#0077ff;
            --yellow:  #ffea00;
            --purple:  #b829ff;
            --dark:    rgba(26, 0, 51, 0.9);
            --panel:   rgba(10, 14, 26, 0.85);
            --stroke:  #ffffff;
        }

        body, html {
            width: 1920px; height: 1080px; background-color: #1a0033;
            overflow: hidden; font-family: 'Luckiest Guy', cursive; color: #ffffff;
        }

        .sky-bg {
            position: absolute; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(180deg, #00d2ff 0%, #1a0033 100%);
        }

        .sunburst {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 2;
            background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 10deg, transparent 10deg 20deg);
            animation: spinBg 90s linear infinite;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .unskew { transform: skewX(15deg); display: flex; flex-direction: column; width: 100%; height: 100%; }

        .layout-container {
            position: absolute; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: row; padding: 60px 80px; gap: 60px;
        }

        .left-col {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .victory-banner {
            background: var(--yellow); color: #000; padding: 25px 80px;
            transform: skewX(-15deg); border: 6px solid #fff;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
            margin-bottom: 80px;
            animation: bounceBanner 2s ease-in-out infinite alternate;
            text-align: center;
        }
        
        .victory-banner span { 
            display: block; transform: skewX(15deg); font-size: 110px; 
            letter-spacing: 5px; line-height: 0.95; -webkit-text-stroke: 3px #000;
            text-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }

        @keyframes bounceBanner { 
            0% { transform: skewX(-15deg) scale(1); } 
            100% { transform: skewX(-15deg) scale(1.03); } 
        }

        .social-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; max-width: 800px;
        }

        .social-box {
            background: rgba(0, 0, 0, 0.7); border: 4px solid var(--blue);
            padding: 20px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.6);
            transform: skewX(-15deg); transition: transform 0.2s, box-shadow 0.2s;
        }

        .social-box:hover {
            transform: skewX(-15deg) translateY(-8px);
            box-shadow: 12px 12px 0 rgba(0, 210, 255, 0.5);
        }

        .platform { 
            font-size: 26px; color: #ff0055; margin-bottom: 5px; letter-spacing: 3px; 
            -webkit-text-stroke: 1px #fff; text-shadow: 2px 2px 0 #000; text-align: center;
        }
        
        .username { 
            font-family: 'Roboto', sans-serif; font-size: 28px; color: #ffffff; 
            text-shadow: 2px 2px 0 #000; font-weight: 900; letter-spacing: 1px; text-align: center;
        }

        .right-col {
            flex: 1.2; display: flex; flex-direction: column;
        }

        .credits-panel {
            flex: 1; background: var(--panel); border: 6px solid var(--blue);
            transform: skewX(-10deg); box-shadow: -15px 15px 0px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; position: relative;
        }

        .credits-header {
            background: linear-gradient(90deg, var(--blue-dark), var(--blue));
            border-bottom: 6px solid var(--stroke);
            padding: 25px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .credits-header span {
            display: block; transform: skewX(10deg);
            font-size: 55px; letter-spacing: 4px; color: #fff;
            -webkit-text-stroke: 2px #000; text-shadow: 4px 4px 0 #000;
        }

        .credits-mask {
            flex: 1; overflow: hidden; position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            padding: 20px 40px;
        }

        .credits-scroll {
            display: flex; flex-direction: column; gap: 50px;
            animation: scrollCredits 25s linear infinite;
            padding-top: 100%;
            padding-bottom: 100%;
        }

        .credits-scroll:hover {
            animation-play-state: paused;
        }

        @keyframes scrollCredits {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }

        .credit-category {
            text-align: center; margin-bottom: 20px;
        }

        .category-title {
            display: inline-block; transform: skewX(10deg);
            font-size: 40px; color: var(--yellow); letter-spacing: 3px;
            -webkit-text-stroke: 1px #000; text-shadow: 3px 3px 0 #000;
            border-bottom: 4px dotted rgba(255,255,255,0.3); padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .credit-names {
            transform: skewX(10deg);
            font-family: 'Roboto', sans-serif; font-size: 28px; font-weight: 700;
            color: #ffffff; line-height: 1.6; text-align: center;
            text-shadow: 2px 2px 0px #000;
        }

        .cat-subs .category-title { color: var(--purple); }
        .cat-bits .category-title { color: #00ffff; }

        .empty-msg {
            font-family: 'Roboto', sans-serif; font-size: 24px; color: #888;
            text-align: center; margin: 40px 0;
        }
    </style>
</head>
<body>
    <div class="sky-bg"></div>
    <div class="sunburst"></div>

    <div class="layout-container">
        
        <div class="left-col">
            <div class="victory-banner">
                <span>FIN DE LA<br>TRANSMISIÓN</span>
            </div>

            <div class="social-grid" id="socialContainer"></div>
        </div>

        <div class="right-col">
            <div class="credits-panel">
                <div class="credits-header">
                    <span>HÉROES DEL ESCUADRÓN</span>
                </div>
                
                <div class="credits-mask">
                    <div class="credits-scroll" id="creditsContainer"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            var SOCIAL_INFO = {
                twitch:    { label: 'TWITCH' },
                x:         { label: 'X / TWITTER' },
                youtube:   { label: 'YOUTUBE' },
                instagram: { label: 'INSTAGRAM' },
                tiktok:    { label: 'TIKTOK' }
            };
            var p = new URLSearchParams(window.location.search);
            var channel = p.get('channel');
            var backend = p.get('backend') || 'http://localhost:3000';

            var raw = p.get('socials');
            if (raw) {
                try {
                    var list = JSON.parse(raw);
                    var map = {};
                    for (var i = 0; i < list.length; i++) map[list[i].p] = list[i].u;
                    var container = document.getElementById('socialContainer');
                    var html = '';
                    for (var key in SOCIAL_INFO) {
                        if (!SOCIAL_INFO.hasOwnProperty(key)) continue;
                        var username = map[key];
                        if (!username) continue;
                        html += '<div class="social-box"><div class="unskew" style="align-items:center;justify-content:center;">' +
                            '<div class="platform">' + SOCIAL_INFO[key].label + '</div>' +
                            '<div class="username">@' + esc(username) + '</div></div></div>';
                    }
                    if (html) container.innerHTML = html;
                } catch(e) {}
            }

            var data = {
                followers: [],
                subs: [],
                bits: [],
                raids: []
            };

            function esc(s) { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

            function fmtTime(ts) {
                var d = new Date(ts);
                var h = d.getHours().toString().padStart(2,'0');
                var m = d.getMinutes().toString().padStart(2,'0');
                return h + ':' + m;
            }

            function restartAnim(el) {
                el.style.animation = 'none';
                void el.offsetWidth;
                el.style.animation = 'scrollCredits 25s linear infinite';
            }

            function render() {
                var container = document.getElementById('creditsContainer');
                if (!container) return;
                var html = '';
                var f = data.followers;
                if (f.length) {
                    html += '<div class="credit-category"><div class="category-title">NUEVOS RECLUTAS (' + f.length + ')</div><div class="credit-names">';
                    for (var i = Math.max(0, f.length - 30); i < f.length; i++) {
                        html += esc(f[i].name) + ' <span style="font-size:16px;opacity:0.5">' + fmtTime(f[i].time) + '</span><br>';
                    }
                    html += '</div></div>';
                }
                var s = data.subs;
                if (s.length) {
                    html += '<div class="credit-category cat-subs"><div class="category-title">PASES DE BATALLA (SUBS) (' + s.length + ')</div><div class="credit-names">';
                    for (var i = Math.max(0, s.length - 30); i < s.length; i++) {
                        html += esc(s[i].name) + ' (' + esc(s[i].detail) + ') <span style="font-size:16px;opacity:0.5">' + fmtTime(s[i].time) + '</span><br>';
                    }
                    html += '</div></div>';
                }
                var b = data.bits;
                if (b.length) {
                    var total = 0;
                    for (var i = 0; i < b.length; i++) total += b[i].bits;
                    html += '<div class="credit-category cat-bits"><div class="category-title">ENTREGAS DE PAVOS (BITS) (' + total + ')</div><div class="credit-names">';
                    for (var i = Math.max(0, b.length - 30); i < b.length; i++) {
                        html += esc(b[i].name) + ' - ' + b[i].bits + ' Bits <span style="font-size:16px;opacity:0.5">' + fmtTime(b[i].time) + '</span><br>';
                    }
                    html += '</div></div>';
                }
                var r = data.raids;
                if (r.length) {
                    var totalViewers = 0;
                    for (var i = 0; i < r.length; i++) totalViewers += r[i].viewers;
                    html += '<div class="credit-category"><div class="category-title">EMBOSCADAS (RAIDS) (' + r.length + ')</div><div class="credit-names">';
                    for (var i = Math.max(0, r.length - 30); i < r.length; i++) {
                        html += esc(r[i].from) + ' (' + r[i].viewers + ' Viewers) <span style="font-size:16px;opacity:0.5">' + fmtTime(r[i].time) + '</span><br>';
                    }
                    html += '</div></div>';
                }
                if (!f.length && !s.length && !b.length && !r.length) {
                    html += '<div class="empty-msg">Esperando eventos en vivo...</div>';
                }
                html += '<div class="credit-category" style="margin-top:80px;"><div class="category-title" style="color:#fff;font-size:50px;border:none;">¡GRACIAS POR JUGAR!</div></div>';
                container.innerHTML = html;
                restartAnim(container);
            }

            render();

            if (channel && backend) {
                var script = document.createElement('script');
                script.src = backend + '/socket.io/socket.io.js';
                script.onload = function() {
                    var socket = io(backend, { transports: ['websocket', 'polling'] });
                    socket.emit('join', { channel: channel });
                    socket.on('channel:follow', function(ev) {
                        data.followers.push({ name: ev.userDisplayName, time: Date.now() });
                        render();
                    });
                    socket.on('channel:subscribe', function(ev) {
                        data.subs.push({ name: ev.userDisplayName, detail: 'Tier ' + ev.tier, time: Date.now() });
                        render();
                    });
                    socket.on('channel:subgift', function(ev) {
                        data.subs.push({ name: ev.gifterDisplayName, detail: 'Regalados x' + ev.amount, time: Date.now() });
                        render();
                    });
                    socket.on('channel:cheer', function(ev) {
                        data.bits.push({ name: ev.userDisplayName, bits: ev.bits, time: Date.now() });
                        render();
                    });
                    socket.on('channel:raid', function(ev) {
                        data.raids.push({ from: ev.fromDisplayName, viewers: ev.viewerCount, time: Date.now() });
                        render();
                    });
                };
                document.head.appendChild(script);
            }
        })();
    </script>
</body>
</html>
