<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Horizontal Ending</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: #1a0033;
            overflow: hidden; font-family: 'Luckiest Guy', cursive; color: #ffffff;
        }

        .sky-bg {
            position: absolute; width: 100%; height: 100%; z-index: 1;
            background: linear-gradient(180deg, #00d2ff 0%, #1a0033 100%);
        }

        .sunburst {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 2;
            background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 10deg, transparent 10deg 20deg);
            animation: spinBg 60s linear infinite;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .ui-container {
            position: absolute; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .victory-banner {
            background: #ffea00; color: #000; padding: 30px 100px;
            transform: skewX(-15deg); border: 8px solid #fff;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.5);
            margin-bottom: 150px;
            animation: bounceBanner 2s ease-in-out infinite alternate;
        }
        
        .victory-banner span { 
            display: block; transform: skewX(15deg); font-size: 130px; 
            letter-spacing: 8px; line-height: 1; -webkit-text-stroke: 3px #000;
        }

        @keyframes bounceBanner { 
            0% { transform: skewX(-15deg) scale(1); } 
            100% { transform: skewX(-15deg) scale(1.05); } 
        }

        .social-container {
            display: flex; flex-direction: row; gap: 40px; 
            width: 100%; max-width: 1700px; justify-content: center;
        }

        .social-box {
            background: rgba(0, 0, 0, 0.7); border: 6px solid #00ffff;
            border-radius: 20px; padding: 25px 40px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.8);
            transform: skewX(-10deg); transition: transform 0.2s, box-shadow 0.2s;
            flex: 1; /* Permite que las cajas se distribuyan uniformemente */
        }

        .social-box:hover {
            transform: skewX(-10deg) translateY(-10px);
            box-shadow: 15px 15px 0 rgba(0, 255, 255, 0.5);
        }

        .social-inner { 
            transform: skewX(10deg); display: flex; flex-direction: column; align-items: center; width: 100%; 
        }

        .platform { 
            font-size: 35px; color: #ff0055; margin-bottom: 10px; letter-spacing: 4px; 
            -webkit-text-stroke: 1px #fff; text-shadow: 3px 3px 0 #000; 
        }
        
        .username { 
            font-family: 'Roboto', sans-serif; font-size: 35px; color: #ffffff; 
            text-shadow: 3px 3px 0 #000; font-weight: 900; letter-spacing: 1px;
        }

    </style>
</head>
<body>
    <div class="sky-bg"></div>
    <div class="sunburst"></div>

    <div class="ui-container">
        <div class="victory-banner">
            <span>FIN DE LA<br>TRANSMISIÓN</span>
        </div>

        <!-- INSTRUCCIONES: Cambia '@tu_usuario' por tus datos reales -->
        <div class="social-container">
            <div class="social-box">
                <div class="social-inner">
                    <div class="platform">TWITCH</div>
                    <div class="username">@tu_usuario</div>
                </div>
            </div>
            <div class="social-box">
                <div class="social-inner">
                    <div class="platform">X / TWITTER</div>
                    <div class="username">@tu_usuario</div>
                </div>
            </div>
            <div class="social-box">
                <div class="social-inner">
                    <div class="platform">YOUTUBE</div>
                    <div class="username">@tu_canal</div>
                </div>
            </div>
            <div class="social-box">
                <div class="social-inner">
                    <div class="platform">INSTAGRAM</div>
                    <div class="username">@tu_usuario</div>
                </div>
            </div>
            <div class="social-box">
                <div class="social-inner">
                    <div class="platform">TIKTOK</div>
                    <div class="username">@tu_usuario</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
