<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Fullscreen Gameplay Overlay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: transparent;
            overflow: hidden; font-family: "Arial", sans-serif;
            position: relative;
        }

        /* Ventana clásica con bisel de Windows 95 */
        .win95-window {
            position: absolute;
            background: #c0c0c0;
            border: 3px outset #dfdfdf;
            box-shadow: 1px 1px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
            padding: 2px;
        }

        .title-bar {
            background: #000080; color: #ffffff; padding: 4px 6px;
            font-weight: bold; font-size: 14px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .title-text { display: flex; align-items: center; gap: 6px; }

        .win95-buttons {
            display: flex; gap: 2px;
        }

        .win95-btn {
            background: #c0c0c0; border: 2px outset #dfdfdf;
            width: 16px; height: 16px; font-size: 10px; font-weight: bold;
            color: #000000; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }

        .win95-btn:active {
            border: 2px inset #dfdfdf;
        }

        /* Webcam Flotante Arriba a la Derecha */
        .floating-cam {
            top: 40px;
            right: 40px;
            width: 480px;
            height: 310px;
        }

        .cam-placeholder { 
            flex: 1; background: transparent; 
            border: 3px inset #808080;
            margin: 4px;
        }

        /* Contenedor React global */
        #overlay-root {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        #overlay-root > * { pointer-events: auto; }

    </style>
</head>
<body>

    <!-- CONTENEDOR REACT APP -->
    <div id="overlay-root"></div>

    <!-- Webcam Flotante -->
    <div class="win95-window floating-cam">
        <div class="title-bar">
            <span class="title-text">📹 Camara_Directo.exe</span>
            <div class="win95-buttons">
                <div class="win95-btn">_</div>
                <div class="win95-btn">❐</div>
                <div class="win95-btn">X</div>
            </div>
        </div>
        <div class="cam-placeholder"></div>
    </div>
    
    <!-- Script de Integración de React / Vite -->
    <script type="module" src="./src/overlay.tsx"></script>
</body>
</html>
