<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – DJ Chroma</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: #00ff00;
    font-family: 'Barlow Condensed', sans-serif;
  }
  :root {
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --purple: #8b5cf6;
  }

  /* ── Corner DJ elements (invisible on green, visible on stream) ── */
  .dj-decor {
    position: absolute;
    pointer-events: none;
  }
  .vinyl {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a1a);
    border: 3px solid rgba(255,255,255,0.08);
    animation: spin 8s linear infinite;
  }
  .vinyl::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--cyan); transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(0,240,255,0.4);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .vinyl-tl { top: -40px; left: -40px; width: 130px; height: 130px; }
  .vinyl-tr { top: -40px; right: -40px; width: 130px; height: 130px; animation-direction: reverse; }
  .vinyl-bl { bottom: -40px; left: -40px; width: 130px; height: 130px; animation-direction: reverse; }
  .vinyl-br { bottom: -40px; right: -40px; width: 130px; height: 130px; }

  /* ── Chrome frame edges ── */
  .edge {
    position: absolute;
    background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--purple));
    background-size: 300% 300%;
    animation: gradient-shift 4s ease infinite;
    opacity: 0.3;
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .edge-top { top: 0; left: 0; right: 0; height: 3px; }
  .edge-bottom { bottom: 0; left: 0; right: 0; height: 3px; }
  .edge-left { top: 0; left: 0; bottom: 0; width: 3px; }
  .edge-right { top: 0; right: 0; bottom: 0; width: 3px; }

  /* ── Username top center ── */
  #username {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: 1.5rem; font-weight: 700;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,240,255,0.5), 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.2em;
    padding: 6px 28px;
    border-radius: 99px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(0,240,255,0.15);
    backdrop-filter: blur(4px);
  }

  /* ── EQ bars on edges (subtle) ── */
  .eq {
    position: absolute; display: flex; gap: 3px;
    align-items: flex-end;
  }
  .eq-bar {
    width: 5px; border-radius: 3px 3px 0 0;
    background: linear-gradient(to top, var(--cyan), var(--magenta));
    animation: eq-wave 0.8s ease-in-out infinite alternate;
  }
  @keyframes eq-wave {
    0% { height: 6px; }
    100% { height: 30px; }
  }
  .eq-left { top: 50%; left: 15px; transform: translateY(-50%); flex-direction: column-reverse; }
  .eq-right { top: 50%; right: 15px; transform: translateY(-50%); flex-direction: column-reverse; }
  .eq-bar:nth-child(1) { animation-delay: 0s; }
  .eq-bar:nth-child(2) { animation-delay: 0.1s; }
  .eq-bar:nth-child(3) { animation-delay: 0.2s; }
  .eq-bar:nth-child(4) { animation-delay: 0.3s; }
  .eq-bar:nth-child(5) { animation-delay: 0.15s; }
</style>
</head>
<body>
  <div class="edge edge-top"></div>
  <div class="edge edge-bottom"></div>
  <div class="edge edge-left"></div>
  <div class="edge edge-right"></div>

  <div class="vinyl vinyl-tl"></div>
  <div class="vinyl vinyl-tr"></div>
  <div class="vinyl vinyl-bl"></div>
  <div class="vinyl vinyl-br"></div>

  <div class="eq eq-left">
    <div class="eq-bar"></div>
    <div class="eq-bar" style="animation-delay:0.12s"></div>
    <div class="eq-bar" style="animation-delay:0.24s"></div>
    <div class="eq-bar" style="animation-delay:0.08s"></div>
    <div class="eq-bar" style="animation-delay:0.18s"></div>
  </div>
  <div class="eq eq-right">
    <div class="eq-bar"></div>
    <div class="eq-bar" style="animation-delay:0.15s"></div>
    <div class="eq-bar" style="animation-delay:0.3s"></div>
    <div class="eq-bar" style="animation-delay:0.05s"></div>
    <div class="eq-bar" style="animation-delay:0.25s"></div>
  </div>

  <div id="username">🎧 <span id="name-text">DJ</span></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'DJ';
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – DJ Chroma · ${username}`;
  </script>
</body>
</html>
