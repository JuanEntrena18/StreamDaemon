<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – DJ Banner Chroma</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: #00ff00;
    font-family: 'Barlow Condensed', sans-serif;
  }
  :root {
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --purple: #8b5cf6;
  }

  .vinyl {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a1a);
    border: 2px solid rgba(255,255,255,0.05);
    animation: spin 8s linear infinite;
    opacity: 0.4;
  }
  .vinyl::after { content: ''; position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border-radius: 50%; background: var(--cyan); transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,240,255,0.3); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .vinyl-l { bottom: 0; left: -25px; width: 90px; height: 90px; }
  .vinyl-r { bottom: 0; right: -25px; width: 90px; height: 90px; animation-direction: reverse; }

  #banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(to right, rgba(10,10,26,0.9), rgba(20,10,46,0.95), rgba(10,10,26,0.9));
    border-top: 2px solid;
    border-image: linear-gradient(to right, var(--cyan), var(--magenta), var(--purple)) 1;
    display: flex;
    align-items: center;
    padding: 0 240px 0 30px;
    overflow: hidden;
  }

  .info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--cyan); text-shadow: 0 0 10px rgba(0,240,255,0.3); }
  .info-name { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(0,240,255,0.3), 0 2px 10px rgba(0,0,0,0.5); letter-spacing: 0.05em; line-height: 1; }

  .eq { display: flex; gap: 3px; align-items: flex-end; margin-left: auto; flex-shrink: 0; }
  .eq-bar { width: 5px; border-radius: 3px 3px 0 0; background: linear-gradient(to top, var(--cyan), var(--magenta)); animation: eq-wave 0.6s ease-in-out infinite alternate; }
  @keyframes eq-wave { 0% { height: 8px; } 100% { height: 40px; } }
  .eq-bar:nth-child(1) { animation-delay: 0s; }
  .eq-bar:nth-child(2) { animation-delay: 0.08s; }
  .eq-bar:nth-child(3) { animation-delay: 0.16s; }
  .eq-bar:nth-child(4) { animation-delay: 0.24s; }
  .eq-bar:nth-child(5) { animation-delay: 0.12s; }
  .eq-bar:nth-child(6) { animation-delay: 0.2s; }
  .eq-bar:nth-child(7) { animation-delay: 0.04s; }

  .labels { display: flex; gap: 14px; margin-top: 4px; }
  .label-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.45); }
  .label-item .val { font-weight: 700; }
  .label-item:nth-child(1) .val { color: var(--cyan); }
  .label-item:nth-child(2) .val { color: var(--magenta); }
  .label-item:nth-child(3) .val { color: #fbbf24; }
  .label-item:nth-child(4) .val { color: var(--purple); }
  .label-item .ico { font-size: 0.75rem; }
</style>
</head>
<body>
  <div class="vinyl vinyl-l"></div>
  <div class="vinyl vinyl-r"></div>

  <div id="banner">
    <div class="info">
      <div class="info-label">🎧 ahora al aire</div>
      <div class="info-name" id="name-text">DJ</div>
      <div class="labels">
        <div class="label-item"><span class="ico">📺</span><span class="val" id="followers">0</span> seguidores</div>
        <div class="label-item"><span class="ico">⭐</span><span class="val" id="subs">0</span> suscriptores</div>
        <div class="label-item"><span class="ico">💰</span><span class="val" id="donations">$0</span> donado</div>
        <div class="label-item"><span class="ico">🎯</span><span class="val" id="bits">0</span> bits</div>
      </div>
    </div>
    <div class="eq">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'DJ';
    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – DJ Banner Chroma · ${username}`;

    function applyHud(d) {
      if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
    }

    function initSocket() {
      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        if (!CHANNEL) return;
        socket.emit('join:channel', CHANNEL);
        fetch(BACKEND_URL + '/hud/' + CHANNEL)
          .then(r => r.ok ? r.json() : null)
          .then(d => { if (d) applyHud(d); })
          .catch(() => {});
        fetch(BACKEND_URL + '/hud/start-poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: CHANNEL, interval: 10 })
        }).catch(() => {});
      });
      socket.on('hud:update', (d) => applyHud(d));
      socket.on('channel:follow', () => {
        const el = document.getElementById('followers');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:subscribe', () => {
        const el = document.getElementById('subs');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:cheer', (d) => {
        const el = document.getElementById('bits');
        el.textContent = parseInt(el.textContent) + (d.bits || 0);
      });
      socket.on('channel:redemption', (d) => {
        if (d.rewardCost) {
          const el = document.getElementById('donations');
          const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
          el.textContent = '$' + current.toFixed(2);
        }
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.src = BACKEND_URL + '/socket.io/socket.io.js';
      script.onload = cb;
      script.onerror = () => cb(new Error('load failed'));
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      if (!err) initSocket();
    });
  </script>
</body>
</html>
