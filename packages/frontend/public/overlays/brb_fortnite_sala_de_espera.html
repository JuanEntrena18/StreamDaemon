<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite BRB Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: #1a0033; /* Morado/Azul Fortnite */
            overflow: hidden; font-family: 'Luckiest Guy', cursive;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Efecto de rayos de fondo giratorios */
        .sunburst {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, #0077ff 0deg 10deg, #0055cc 10deg 20deg);
            z-index: 1; animation: spinBg 40s linear infinite; opacity: 0.6;
        }

        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .brb-container {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 50px 100px; border-radius: 20px;
            border: 6px solid #00ffff; box-shadow: 0 0 30px #00ffff, inset 0 0 20px #00ffff;
            transform: skewX(-10deg);
            text-align: center;
            animation: floatContainer 4s ease-in-out infinite;
        }

        @keyframes floatContainer {
            0%, 100% { transform: skewX(-10deg) translateY(0); }
            50% { transform: skewX(-10deg) translateY(-20px); }
        }

        .main-text {
            font-size: 100px; color: #fffb00; /* Amarillo V-Bucks */
            -webkit-text-stroke: 4px #000; text-shadow: 5px 5px 0 #000;
            letter-spacing: 5px; line-height: 1; margin-bottom: 20px;
        }

        .sub-text {
            font-size: 50px; color: #ffffff;
            text-shadow: 3px 3px 0 #000; letter-spacing: 3px;
        }

        /* Puntos de carga animados */
        .loading-dots::after {
            content: '.'; animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: transparent; text-shadow: none; }
            40% { color: #fff; text-shadow: 3px 3px 0 #000; }
            60% { color: transparent; text-shadow: none; }
            80%, 100% { color: #fff; text-shadow: 3px 3px 0 #000; }
        }
    </style>
</head>
<body>
    <div class="sunburst"></div>

    <div class="brb-container">
        <div class="main-text">EN LA SALA<br>DE ESPERA</div>
        <div class="sub-text">VOLVEMOS AL BUS<span class="loading-dots"></span></div>
    </div>
</body>
</html>
