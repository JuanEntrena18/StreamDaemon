<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Raiders - Gameplay Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@600;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px;
            background-color: transparent; overflow: hidden;
            font-family: 'Share Tech Mono', monospace; color: #ffffff;
            position: relative;
        }

        /* ─── HUD SUPERIOR IZQUIERDO: ESTADÍSTICAS DEL STREAM ─── */
        .stream-stats {
            position: absolute; top: 30px; left: 40px;
            display: flex; gap: 15px; z-index: 100;
        }

        .stat-block {
            background: rgba(13, 14, 16, 0.85); border: 1px solid rgba(255, 107, 0, 0.4);
            padding: 10px 20px; clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
            display: flex; flex-direction: column; min-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-label { font-size: 11px; color: #00f2fe; text-transform: uppercase; letter-spacing: 2px; }
        .stat-val { font-size: 24px; font-weight: bold; color: #ffffff; font-family: 'Teko', sans-serif; letter-spacing: 1px; }

        /* ─── CHAT FLOTANTE LATERAL IZQUIERDO ─── */
        /* Situado de forma segura entre Y:220px e Y:680px para no tapar el HUD de escuadrón (abajo izq) */
        .floating-chat {
            position: absolute; top: 220px; left: 40px; width: 420px; height: 460px;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: linear-gradient(180deg, rgba(13, 14, 16, 0) 0%, rgba(13, 14, 16, 0.8) 100%);
            border-left: 2px solid #ff6b00; padding: 15px; z-index: 100;
            overflow: hidden;
        }

        .chat-msg {
            background: rgba(0, 0, 0, 0.6); margin-top: 10px; padding: 10px 14px;
            border-radius: 0 8px 8px 0; border-left: 3px solid #00f2fe;
            animation: messageIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-size: 14px;
        }

        @keyframes messageIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        .chat-user { font-weight: bold; color: #ff6b00; margin-right: 8px; }

        /* ─── ANCLA REACT EN CAPA GLOBAL ─── */
        #overlay-root {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
        }
        #overlay-root > * { pointer-events: auto; }
    </style>
</head>
<body>

    

    <!-- HUD Estadísticas superiores -->
    <div class="stream-stats">
        <div class="stat-block">
            <span class="stat-label">SQUAD_VIEW</span>
            <span class="stat-val" id="val-viewers">2.4K</span>
        </div>
        <div class="stat-block">
            <span class="stat-label">RAIDERS_REC</span>
            <span class="stat-val" id="val-followers">12.5K</span>
        </div>
    </div>

    <!-- Chat Flotante Seguro -->
    <div class="floating-chat" id="chatWrapper">
        <!-- JS inyectará mensajes aquí -->
    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 6;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#ff6b00';

            msgNode.innerHTML = `<span class="chat-user" style="color: ${finalColor}">${safeUsername}:</span><span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        // Chat is now handled by WebSockets directly

        // Simulación de prueba para comprobar la transparencia en el navegador
        setTimeout(() => appendMessage("Zapper_PRO", "¡Cuidado con la patrulla ARC en el puente!", "#00f2fe"), 1500);
    
        const BACKEND_URL = window.location.protocol + '//' + window.location.host;
        const CHANNEL = new URLSearchParams(window.location.search).get('channel') || 'default';
        let socket;

        function initSocket() {
            try {
                socket = io(BACKEND_URL, { transports: ['websocket'] });
                socket.on('connect', () => {
                    socket.emit('join:channel', CHANNEL);
                });

                socket.on('chat:message', ({ user, text }) => {
                    appendMessage(user.displayName || user.username, text, user.color);
                });

                socket.on('hud:update', (data) => {
                    const viewersEl = document.getElementById('val-viewers');
                    const followersEl = document.getElementById('val-followers');
                    if(viewersEl && data.viewers !== undefined) viewersEl.textContent = data.viewers;
                    if(followersEl && data.followers !== undefined) followersEl.textContent = data.followers;
                });
            } catch(e) {}
        }
        setTimeout(initSocket, 1000);
    </script>
    <script src="./js/socket.io.js"></script>
</body>
</html>
