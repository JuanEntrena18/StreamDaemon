<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Just Chatting Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1280px 640px; 
            grid-template-rows: 1080px;
        }

        .rpg-box {
            background-color: rgba(0, 0, 0, 0.85);
            border: 8px solid #ffffff;
            box-shadow: inset -8px -8px 0px #5C5C5C, inset 8px 8px 0px #7C7C7C;
            position: relative;
            color: #fff;
            box-sizing: border-box;
        }

        .box-title {
            position: absolute;
            top: -18px;
            left: 30px;
            background: #000;
            padding: 0 15px;
            color: #E52521;
            font-size: 20px;
            border: 2px solid #fff;
        }

        .main-cam-container {
            padding: 20px;
            display: flex;
        }

        .main-cam {
            flex-grow: 1;
            background-color: transparent;
        }

        .side-panel {
            display: grid;
            grid-template-rows: 720px 360px;
            padding: 20px 20px 20px 0;
            gap: 20px;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 15px;
            overflow: hidden;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            color: #F8B800;
        }

        .user-logo-placeholder {
            width: 150px;
            height: 150px;
            background-image: url(''); 
            background-color: #222;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 4px dashed #7C7C7C;
            margin-bottom: 20px;
            image-rendering: pixelated;
        }

        .chat-msg {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .user { color: #E52521; }
        .text { color: #ffffff; }

        .event-notif {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            padding: 8px 12px;
            background: rgba(248, 184, 0, 0.15);
            border-left: 4px solid #F8B800;
            animation: notif-in 0.4s ease-out;
        }
        @keyframes notif-in {
            0% { opacity: 0; transform: translateX(20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="main-cam-container">
        <div class="rpg-box main-cam">
            <div class="box-title">PLAYER 1 CAM</div>
        </div>
    </div>

    <div class="side-panel">
        
        <div class="rpg-box chat-area" id="chatWrapper">
            <div class="box-title">WORLD CHAT</div>
        </div>

        <div class="rpg-box logo-area">
            <div class="user-logo-placeholder"></div>
            <div style="font-size: 14px; line-height: 1.5;">
                TRANSMISIÓN<br>EN DIRECTO
            </div>
        </div>

    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MSG = 10;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#E52521';

            msgNode.innerHTML = `<span class="user" style="color: ${finalColor}">[${safeUsername}]</span><br><span class="text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MSG + 1) {
                chatWrapper.removeChild(chatWrapper.children[1]);
            }
        }

        function pushEvent(html, msgCount) {
            const node = document.createElement('div');
            node.className = 'event-notif';
            node.innerHTML = html;
            chatWrapper.appendChild(node);
            const maxMsg = msgCount || 3;
            const total = chatWrapper.querySelectorAll('.event-notif').length;
            if (total > maxMsg) {
                const first = chatWrapper.querySelector('.event-notif');
                if (first) first.remove();
            }
        }

        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
        const CHANNEL = params.get('channel');

        if (CHANNEL) {
            document.title = '8-Bit Just Chatting · ' + CHANNEL;
        }

        function initSocket() {
            const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                if (CHANNEL) socket.emit('join:channel', CHANNEL);
            });
            socket.on('chat:message', (d) => {
                appendMessage(
                    d.user?.displayName || d.userDisplayName || d.userName || 'Anónimo',
                    d.text || '',
                    d.user?.color || '#E52521'
                );
            });
            socket.on('channel:follow', (d) => {
                pushEvent('⭐ <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> nos sigue!', 3);
            });
            socket.on('channel:subscribe', (d) => {
                pushEvent('🎉 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> se suscribió!', 3);
            });
            socket.on('channel:cheer', (d) => {
                pushEvent('💎 <b>' + (d.userDisplayName || d.userName || 'Anónimo') + '</b> animó con ' + (d.bits || 0) + ' bits!', 3);
            });
            socket.on('channel:redemption', (d) => {
                pushEvent('🎯 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> canjeó <b>' + (d.rewardTitle || '') + '</b>', 3);
            });
        }

        function loadSocketIO(cb) {
            const script = document.createElement('script');
            script.src = BACKEND_URL + '/socket.io/socket.io.js';
            script.onload = cb;
            script.onerror = () => cb(new Error('load failed'));
            document.head.appendChild(script);
        }

        loadSocketIO(function(err) {
            if (!err) initSocket();
        });

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });
    </script>
</body>
</html>
