<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamDaemon - Calendar Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sf-bg: #0a0a1a;
      --sf-bg-2: #0f0f23;
      --sf-surface: rgba(255,255,255,0.04);
      --sf-border: rgba(255,255,255,0.08);
      --sf-primary: #7c3aed;
      --sf-primary-light: #a855f7;
      --sf-primary-glow: rgba(124,58,237,0.35);
      --sf-teal: #06b6d4;
      --sf-success: #10b981;
      --sf-danger: #ef4444;
      --sf-warning: #f59e0b;
      --sf-text: #f8fafc;
      --sf-text-2: #94a3b8;
      --sf-text-3: #64748b;
      --sf-radius: 14px;
      --sf-radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: transparent;
      color: var(--sf-text);
      width: 600px;
      overflow: hidden;
      user-select: none;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .glass-card {
      background: var(--sf-surface);
      border: 1px solid var(--sf-border);
      border-radius: var(--sf-radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--sf-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--sf-teal);
      letter-spacing: 2px;
    }
    .header span {
      font-size: 0.7rem;
      color: var(--sf-text-3);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .event {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      align-items: flex-start;
      border-bottom: 1px solid var(--sf-border);
    }
    .event:last-child { border-bottom: none; }
    .event-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 44px;
    }
    .event-day {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .event-month {
      font-size: 0.6rem;
      text-transform: uppercase;
      color: var(--sf-text-3);
      letter-spacing: 0.06em;
    }
    .event-color-dot {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .event-body { flex: 1; min-width: 0; }
    .event-title {
      font-size: 0.9rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .event-game {
      font-size: 0.75rem;
      color: var(--sf-text-2);
      margin-top: 0.15rem;
    }
    .event-time {
      font-size: 0.7rem;
      color: var(--sf-text-3);
      margin-top: 0.25rem;
    }
    .event-time .font-mono {
      color: var(--sf-teal);
    }
    .empty {
      padding: 2rem 1.25rem;
      text-align: center;
      color: var(--sf-text-3);
      font-size: 0.8rem;
    }
    .loading {
      padding: 2rem;
      text-align: center;
      color: var(--sf-text-3);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="glass-card" id="app">
    <div class="header">
      <h2>&#x2B21; PR&#xD3;XIMOS DIRECTOS</h2>
      <span id="eventCount">0 eventos</span>
    </div>
    <div id="eventList">
      <div class="loading" id="loadingMsg">Cargando calendario...</div>
    </div>
  </div>

  <script>
    var CHANNEL = new URLSearchParams(location.search).get('channel') || '';
    var BACKEND_URL = new URLSearchParams(location.search).get('backend') || 'http://localhost:3000';
    var LIMIT = parseInt(new URLSearchParams(location.search).get('limit'), 10) || 10;
    var socketConnection = null;

    var MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    var DAYS = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

    function formatTime(hours, minutes) {
      return String(hours).padStart(2,'0') + ':' + String(minutes).padStart(2,'0');
    }

    function renderEvents(events) {
      var list = document.getElementById('eventList');
      if (!events || events.length === 0) {
        list.innerHTML = '<div class="empty">No hay pr&#xF3;ximos directos programados.</div>';
        document.getElementById('eventCount').textContent = '0 eventos';
        return;
      }

      var now = new Date();
      var upcoming = events
        .filter(function(e) {
          var d = new Date(e.date + 'T' + e.startTime);
          return d >= now;
        })
        .sort(function(a, b) {
          return new Date(a.date + 'T' + a.startTime) - new Date(b.date + 'T' + b.startTime);
        })
        .slice(0, LIMIT);

      if (upcoming.length === 0) {
        list.innerHTML = '<div class="empty">No hay pr&#xF3;ximos directos programados.</div>';
        document.getElementById('eventCount').textContent = '0 eventos';
        return;
      }

      document.getElementById('eventCount').textContent = upcoming.length + ' evento' + (upcoming.length !== 1 ? 's' : '');

      list.innerHTML = '';
      upcoming.forEach(function(e) {
        var d = new Date(e.date + 'T' + e.startTime);
        var day = d.getDate();
        var month = MONTHS[d.getMonth()];
        var dow = DAYS[d.getDay()];
        var timeStr = formatTime(d.getHours(), d.getMinutes());

        var minutes = e.duration || 60;
        var hours = Math.floor(minutes / 60);
        var mins = minutes % 60;
        var durStr = hours > 0 ? hours + 'h ' + mins + 'm' : mins + 'm';

        var color = e.color || '#7c3aed';
        var gameHtml = e.game ? '<div class="event-game">' + e.game + '</div>' : '';

        var row = document.createElement('div');
        row.className = 'event';
        row.innerHTML =
          '<div class="event-date">' +
            '<span class="event-day" style="color:' + color + '">' + day + '</span>' +
            '<span class="event-month">' + month + '</span>' +
          '</div>' +
          '<div class="event-color-dot" style="background:' + color + ';height:auto;align-self:stretch;"></div>' +
          '<div class="event-body">' +
            '<div class="event-title">' + e.title + '</div>' +
            gameHtml +
            '<div class="event-time">' +
              '<span class="font-mono">' + timeStr + '</span>' +
              ' &middot; ' + durStr +
            '</div>' +
          '</div>';
        list.appendChild(row);
      });
    }

    function fetchEvents() {
      if (!CHANNEL) return;
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/calendar/' + CHANNEL, true);
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            renderEvents(JSON.parse(xhr.responseText));
          } catch(e) { console.error(e); }
        }
      };
      xhr.send();
    }

    function initSocket() {
      try {
        socketConnection = io(BACKEND_URL, { transports: ['websocket'] });
      } catch(e) {
        console.warn('Socket.IO unavailable');
        return;
      }
      socketConnection.on('connect', function() {
        socketConnection.emit('join:channel', CHANNEL);
        socketConnection.emit('calendar:get-state', { channel: CHANNEL });
      });
      socketConnection.on('calendar:update', function(events) {
        if (events) renderEvents(events);
      });
    }

    function loadSocketIO(cb) {
      var script = document.createElement('script');
      script.onload = function() { cb(); };
      script.onerror = function() { cb(new Error('Socket.IO not found')); };
      script.src = './js/socket.io.js';
      document.head.appendChild(script);
    }

    window.onload = function() {
      fetchEvents();
      loadSocketIO(function(err) {
        if (!err) initSocket();
      });
      setInterval(fetchEvents, 60000);
    };
  </script>
</body>
</html>
