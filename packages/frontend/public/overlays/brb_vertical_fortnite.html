<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Vertical BRB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1080px; height: 1920px; background-color: #1a0033;
            overflow: hidden; font-family: 'Luckiest Guy', cursive; color: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .sunburst {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, #0077ff 0deg 10deg, #0055cc 10deg 20deg);
            z-index: 1; animation: spinBg 30s linear infinite; opacity: 0.8;
        }
        @keyframes spinBg { 100% { transform: rotate(360deg); } }

        .ui-container {
            position: relative; z-index: 10; width: 100%;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .brb-banner {
            background: #ffea00; color: #000; padding: 50px 80px;
            transform: skewX(-15deg); border: 8px solid #fff;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.6);
            animation: bounceBanner 2s ease-in-out infinite alternate;
            margin-bottom: 60px; width: 90%;
        }
        
        .brb-banner span { 
            display: block; transform: skewX(15deg); font-size: 130px; 
            letter-spacing: 5px; line-height: 1; -webkit-text-stroke: 2px #000;
        }

        @keyframes bounceBanner { 0% { transform: skewX(-15deg) scale(1); } 100% { transform: skewX(-15deg) scale(1.05); } }

        .sub-text {
            font-size: 70px; color: #00ffff; letter-spacing: 5px;
            -webkit-text-stroke: 3px #000; text-shadow: 8px 8px 0 #000;
        }

        .loading-dots::after { content: '.'; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { color: transparent; text-shadow: none; } 40% { color: #00ffff; text-shadow: 8px 8px 0 #000; } 60% { color: transparent; text-shadow: none; } 80%, 100% { color: #00ffff; text-shadow: 8px 8px 0 #000; } }
    </style>
</head>
<body>
    <div class="sunburst"></div>

    <div class="ui-container">
        <div class="brb-banner">
            <span>AFK EN<br>EL LOBBY</span>
        </div>
        <div class="sub-text">REGRESANDO<span class="loading-dots"></span></div>
    </div>
</body>
</html>
