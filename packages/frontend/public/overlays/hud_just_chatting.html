<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSG Just Chatting</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: transparent; 
            overflow: hidden; font-family: 'Share Tech Mono', monospace; color: #ffb300;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; pointer-events: none; z-index: 100;
        }

        .container {
            display: flex; width: 100%; height: 100%; padding: 30px; gap: 30px;
        }

        /* ---------------- WEBCAM PRINCIPAL (Visor) ---------------- */
        .webcam-main {
            flex: 2; position: relative; 
            background: rgba(5, 5, 5, 0.5); /* Fondo semitransparente para ver la cámara atrás */
            border: 3px solid rgba(76, 175, 80, 0.4);
            clip-path: polygon(50px 0, calc(100% - 50px) 0, 100% 50px, 100% calc(100% - 50px), calc(100% - 50px) 100%, 50px 100%, 0 calc(100% - 50px), 0 50px);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Elementos HUD en la Webcam principal */
        .hud-top-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            border-bottom: 2px solid #4caf50; padding: 0 50px 5px 50px;
            color: #4caf50; font-size: 20px; letter-spacing: 5px;
        }
        
        .hud-rec {
            position: absolute; top: 30px; right: 40px; color: #f44336; font-size: 24px;
            animation: blink 1s infinite; font-weight: bold;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ---------------- PANEL LATERAL ---------------- */
        .side-panel {
            flex: 1; display: flex; flex-direction: column; gap: 30px; align-items: center;
        }

        /* Parche de Misión (Logo) */
        .mission-patch {
            width: 250px; height: 250px; border-radius: 50%;
            background: rgba(10, 15, 10, 0.9);
            border: 4px dashed #ffb300;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255, 179, 0, 0.2), inset 0 0 20px rgba(255, 179, 0, 0.1);
            animation: rotateDash 20s linear infinite;
            position: relative;
        }
        @keyframes rotateDash { 100% { transform: rotate(360deg); } }

        .mission-patch-inner {
            position: absolute; width: 230px; height: 230px; border-radius: 50%;
            background-color: #000;
            background-image: url('horda_logo.png'); /* <--- CAMBIA ESTO POR TU LOGO (ej: horda_logo.png, alianza_logo.png) */
            background-size: cover; background-position: center;
            border: 2px solid #ffb300;
            animation: counterRotate 20s linear infinite; /* Para que el logo no gire */
        }
        @keyframes counterRotate { 100% { transform: rotate(-360deg); } }

        /* Caja de Chat Octogonal */
        .bsg-box {
            width: 100%; flex: 1; position: relative; background: rgba(10, 15, 10, 0.85);
            border: 2px solid #ffb300;
            clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .box-header {
            background: #ffb300; color: #000; padding: 10px 15px; font-weight: bold;
            font-size: 18px; text-transform: uppercase;
        }

        .chat-content { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }

        .chat-msg {
            margin-bottom: 10px; font-size: 16px; line-height: 1.4;
            border-bottom: 1px solid rgba(255, 179, 0, 0.2); padding-bottom: 5px;
            animation: slideIn 0.2s ease-out forwards;
        }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .chat-user { color: #4caf50; font-weight: bold; margin-right: 5px; }
        .chat-text { color: #e0e0e0; }

    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="container">
        <!-- WEBCAM PRINCIPAL -->
        <div class="webcam-main">
            <div class="hud-top-bar">ENLACE VISUAL SEGURO</div>
            <div class="hud-rec">● LIVE</div>
            <!-- Pon tu fuente de cámara en OBS por detrás de este bloque -->
        </div>

        <!-- PANEL LATERAL -->
        <div class="side-panel">
            <!-- LOGO PARCHE DE MISIÓN -->
            <!-- INSTRUCCIONES: Cambia la URL en la clase .mission-patch-inner del CSS -->
            <div class="mission-patch">
                <div class="mission-patch-inner"></div>
            </div>

            <!-- CHAT -->
            <div class="bsg-box">
                <div class="box-header">REGISTRO DE COMUNICACIONES</div>
                <div class="chat-content" id="chatWrapper">
                    <!-- JS inyecta mensajes aquí -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 20;

        function appendMessage(username, text) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            msgNode.innerHTML = `<span class="chat-user">${safeUsername}:</span><span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        function pushEvent(html) {
            const node = document.createElement('div');
            node.className = 'chat-msg';
            node.style.borderLeft = '4px solid #f44336';
            node.style.paddingLeft = '10px';
            node.innerHTML = html;
            chatWrapper.appendChild(node);
            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
        const CHANNEL = params.get('channel');

        if (CHANNEL) {
            document.title = 'BSG Just Chatting · ' + CHANNEL;
        }

        function initSocket() {
            const socket = io(BACKEND_URL, { transports: ['websocket'] });
            socket.on('connect', () => {

                if (CHANNEL) socket.emit('join:channel', CHANNEL);

            });

            socket.on('connect_error', (err) => {

                console.error('Socket connection error:', err.message);

            });
            socket.on('chat:message', (d) => {
                appendMessage(
                    d.user?.displayName || d.userDisplayName || d.userName || 'Anónimo',
                    d.text || ''
                );
            });
            socket.on('channel:follow', (d) => {
                pushEvent('⭐ <b style="color:#4caf50">' + (d.userDisplayName || d.userName || 'Alguien') + '</b> nos sigue!');
            });
            socket.on('channel:subscribe', (d) => {
                pushEvent('🎉 <b style="color:#4caf50">' + (d.userDisplayName || d.userName || 'Alguien') + '</b> se suscribió!');
            });
            socket.on('channel:cheer', (d) => {
                pushEvent('💎 <b style="color:#4caf50">' + (d.userDisplayName || d.userName || 'Anónimo') + '</b> animó con ' + (d.bits || 0) + ' bits!');
            });
            socket.on('channel:redemption', (d) => {
                pushEvent('🎯 <b style="color:#4caf50">' + (d.userDisplayName || d.userName || 'Alguien') + '</b> canjeó <b>' + (d.rewardTitle || '') + '</b>');
            });
        }

        function loadSocketIO(cb) {
            const script = document.createElement('script');
            script.onload = () => cb();  script.src = './js/socket.io.js';
            script.onerror = () => cb(new Error('load failed'));
            document.head.appendChild(script);
        }

        loadSocketIO(function(err) {
            if (!err) initSocket();
        });

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message);
            }
        });
    </script>
</body>
</html>
