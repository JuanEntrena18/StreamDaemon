<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – Win95 Vertical</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px; height: 1920px;
    overflow: hidden;
    background: transparent;
    font-family: 'Courier New', 'Segoe UI', Tahoma, sans-serif;
    -webkit-font-smoothing: none;
  }

  body {
    background: #008080;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 16px;
  }

  /* Desktop icon floor */
  #desktop-icons {
    position: absolute;
    top: 16px; right: 16px;
    display: flex; flex-direction: column;
    gap: 16px;
    z-index: 5;
    pointer-events: none;
  }

  .desk-icon {
    text-align: center;
    color: #fff;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    text-shadow: 1px 1px 0 #000;
    width: 64px;
  }

  .desk-icon .ico {
    width: 32px; height: 32px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  /* Windows */
  .win-window {
    background: #c0c0c0;
    border: 3px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    box-shadow: 2px 2px 0 #404040;
    display: flex;
    flex-direction: column;
    padding: 3px;
    position: relative;
  }

  .win-titlebar {
    background: #000080;
    color: #fff;
    padding: 4px 6px;
    font-weight: bold;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }

  .win-titlebar .title-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .win-buttons { display: flex; gap: 2px; flex-shrink: 0; }

  .win-btn {
    width: 22px; height: 22px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    font-weight: bold;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    cursor: default;
  }

  .win-btn.x { font-size: 11px; }

  .win-content {
    border: 2px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    background: #fff;
    flex: 1;
    overflow: hidden;
  }

  /* Top section - webcam window */
  #top-section {
    position: relative;
    height: 920px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
    z-index: 2;
  }

  #cam-window {
    width: 820px;
    height: 660px;
  }

  #cam-window .win-content {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Status bar inside cam window */
  #status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #c0c0c0;
    border-top: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 3px 8px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    color: #000;
    display: flex;
    gap: 16px;
  }

  #status-bar .stat-item { display: flex; align-items: center; gap: 4px; }
  #status-bar .stat-label { color: #808080; }
  #status-bar .stat-value { font-weight: bold; color: #000080; }

  /* Separator - classic raised bar */
  #separator {
    height: 4px;
    background: #c0c0c0;
    border-top: 2px solid #808080;
    border-bottom: 2px solid #ffffff;
    margin: 4px 0;
    flex-shrink: 0;
    z-index: 1;
  }

  /* Bottom section - chat window */
  #bottom-section {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 0 0;
    z-index: 2;
    overflow: hidden;
  }

  #stream-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 4px 8px;
    flex-shrink: 0;
  }

  #live-indicator-win {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: #ff0000;
  }

  #game-label-win {
    font-size: 12px; font-weight: bold;
    color: #000080;
    font-family: 'Courier New', monospace;
  }

  #title-text-win {
    font-size: 11px;
    color: #000;
    font-family: 'Courier New', monospace;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #chat-window {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  #chat-window .win-content {
    background: #fff;
    padding: 8px;
    display: flex;
    flex-direction: column;
  }

  #chat-msgs {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    color: #000;
    line-height: 1.4;
    padding: 2px;
  }

  #chat-msgs::-webkit-scrollbar {
    width: 16px;
    background: #c0c0c0;
    border-left: 2px solid #808080;
  }

  #chat-msgs::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
  }

  #chat-msgs::-webkit-scrollbar-button {
    display: block;
    height: 16px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
  }

  .chat-msg-win { padding: 2px 0; word-break: break-word; }
  .chat-msg-win .un { font-weight: bold; color: #000080; }
  .chat-msg-win .txt { color: #000; }

  .event-win {
    font-size: 12px;
    padding: 4px 8px;
    margin: 2px 0;
    background: #ffffcc;
    border: 1px solid #808080;
    color: #000;
  }

  /* Alert zone - classic Windows dialog */
  #alert-zone {
    position: absolute;
    top: 80px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 20;
    width: 70%;
  }

  .alert-dialog {
    background: #c0c0c0;
    border: 3px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
    padding: 18px 24px;
    text-align: center;
    min-width: 260px;
    animation: dialogIn 0.25s ease-out forwards,
               dialogOut 0.25s ease-in 4.75s forwards;
    position: relative;
  }

  @keyframes dialogIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes dialogOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.95); }
  }

  .alert-dialog-title {
    font-size: 12px; font-weight: bold;
    color: #000;
    margin-bottom: 2px;
  }

  .alert-dialog-icon {
    display: inline-block;
    width: 40px; height: 40px;
    background: #ffff00;
    border-radius: 50%;
    color: #000;
    font-size: 28px; font-weight: bold;
    line-height: 42px;
    text-align: center;
    border: 2px solid #000;
    margin-bottom: 8px;
  }

  .alert-dialog-user {
    font-size: 20px; font-weight: bold;
    color: #000080;
    margin-bottom: 4px;
  }

  .alert-dialog-detail {
    font-size: 13px;
    color: #000;
  }

  .alert-dialog-progress {
    width: 100%; height: 18px;
    border: 2px inset #dfdfdf;
    background: #fff;
    margin-top: 10px;
  }

  .alert-dialog-progress-bar {
    height: 100%;
    background: #000080;
    width: 0%;
    animation: fillBar 5s linear forwards;
  }

  @keyframes fillBar {
    to { width: 100%; }
  }

  #offline-notice {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #c0c0c0;
    border: 3px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 10px 20px;
    font-size: 13px; font-weight: bold;
    color: #ff0000;
    display: none;
    z-index: 50;
  }
  #offline-notice.show { display: block; }

  #demo-badge {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 3px 12px;
    font-size: 11px; font-weight: bold;
    color: #000080;
    display: none;
    z-index: 55;
  }
  #demo-badge.show { display: block; }
</style>
</head>
<body>

<div id="desktop-icons">
  <div class="desk-icon">
    <div class="ico">💻</div>
    My Computer
  </div>
  <div class="desk-icon">
    <div class="ico">🌐</div>
    Internet
  </div>
  <div class="desk-icon">
    <div class="ico">♻</div>
    Recycle Bin
  </div>
</div>

<div id="top-section">
  <div class="win-window" id="cam-window">
    <div class="win-titlebar">
      <span class="title-text">Microsoft_NetMeeting_Cam.exe</span>
      <div class="win-buttons">
        <div class="win-btn">_</div>
        <div class="win-btn">◻</div>
        <div class="win-btn x">X</div>
      </div>
    </div>
    <div class="win-content">
      <div id="status-bar">
        <div class="stat-item"><span class="stat-label">Viewers:</span><span class="stat-value" id="val-viewers">0</span></div>
        <div class="stat-item"><span class="stat-label">Follows:</span><span class="stat-value" id="val-followers">0</span></div>
        <div class="stat-item"><span class="stat-label">Subs:</span><span class="stat-value" id="val-subs">0</span></div>
      </div>
    </div>
  </div>
</div>

<div id="separator"></div>

<div id="bottom-section">
  <div id="stream-info">
    <div id="live-indicator-win">● LIVE</div>
    <div id="game-label-win">GAME</div>
    <div id="title-text-win">Connecting...</div>
  </div>

  <div class="win-window" id="chat-window">
    <div class="win-titlebar">
      <span class="title-text">mIRC32 - #channel</span>
      <div class="win-buttons">
        <div class="win-btn">X</div>
      </div>
    </div>
    <div class="win-content">
      <div id="chat-msgs"></div>
    </div>
  </div>

  <div id="alert-zone"></div>
</div>

<div id="offline-notice">Error: Connection lost to StreamForge</div>
<div id="demo-badge">Windows 95 - Preview Mode</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var CHANNEL = params.get('channel') || '';
  var BACKEND_URL = params.get('backend') || 'http://localhost:3000';
  var DEMO_MODE = params.get('demo') === 'true';

  if (CHANNEL) {
    document.querySelector('#chat-window .title-text').textContent = 'mIRC32 - #' + CHANNEL;
  }

  function fmtNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  function applyHud(data) {
    document.getElementById('val-viewers').textContent = fmtNum(data.viewers ?? 0);
    document.getElementById('val-followers').textContent = fmtNum(data.followers ?? 0);
    document.getElementById('val-subs').textContent = fmtNum(data.subscribers ?? 0);
    var titleEl = document.getElementById('title-text-win');
    if (data.streamTitle) titleEl.textContent = data.streamTitle;
    if (data.gameName) document.getElementById('game-label-win').textContent = data.gameName;
  }

  var alertQueue = [];
  var alertBusy = false;
  var ALERT_DURATION = 5200;

  function enqueueAlert(cfg) {
    alertQueue.push(cfg);
    if (!alertBusy) processAlertQueue();
  }

  function processAlertQueue() {
    if (!alertQueue.length) { alertBusy = false; return; }
    alertBusy = true;
    var cfg = alertQueue.shift();
    showAlert(cfg);
    setTimeout(processAlertQueue, ALERT_DURATION + 300);
  }

  function showAlert(_a) {
    var type = _a.type, user = _a.user, detail = _a.detail, msg = _a.msg;
    var zone = document.getElementById('alert-zone');
    var dialog = document.createElement('div');
    dialog.className = 'alert-dialog';
    var typeLabels = { follow: 'New Follower Detected', sub: 'Subscription Installed', bits: 'Data Packet Received', cheer: 'Data Packet Received', redemption: 'Redemption Complete' };
    dialog.innerHTML =
      '<div class="alert-dialog-icon">!</div>' +
      '<div class="alert-dialog-title">' + (typeLabels[type] || type.toUpperCase()) + '</div>' +
      '<div class="alert-dialog-user">' + escHtml(user) + '</div>' +
      (detail ? '<div class="alert-dialog-detail">' + escHtml(detail) + '</div>' : '') +
      (msg ? '<div class="alert-dialog-detail" style="margin-top:4px;font-style:italic;">' + escHtml(msg) + '</div>' : '') +
      '<div class="alert-dialog-progress"><div class="alert-dialog-progress-bar"></div></div>';
    zone.appendChild(dialog);
    setTimeout(function() { if (dialog.parentNode) dialog.parentNode.removeChild(dialog); }, ALERT_DURATION + 100);
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var MAX_CHAT_MSGS = 30;

  function addChatMessage(displayName, text) {
    var container = document.getElementById('chat-msgs');
    if (!container) return;
    var row = document.createElement('div');
    row.className = 'chat-msg-win';
    row.innerHTML = '<span class="un">&lt;' + escHtml(displayName) + '&gt;</span> <span class="txt">' + escHtml(text) + '</span>';
    container.appendChild(row);
    if (container.children.length > MAX_CHAT_MSGS) container.removeChild(container.firstChild);
    container.scrollTop = container.scrollHeight;
  }

  function pushEvent(html) {
    var container = document.getElementById('chat-msgs');
    if (!container) return;
    var node = document.createElement('div');
    node.className = 'event-win';
    node.innerHTML = html;
    container.appendChild(node);
    container.scrollTop = container.scrollHeight;
  }

  function initSocket() {
    var socket;
    try {
      socket = io(BACKEND_URL, { transports: ['websocket'] });
    } catch (e) {
      document.getElementById('offline-notice').classList.add('show');
      return;
    }
    socket.on('connect', function() {
      document.getElementById('offline-notice').classList.remove('show');
      if (CHANNEL) socket.emit('join:channel', CHANNEL);
      fetch(BACKEND_URL + '/hud/' + CHANNEL)
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) { if (d) applyHud(d); })
        .catch(function() {});
    });
    socket.on('connect_error', function() {
      document.getElementById('offline-notice').classList.add('show');
    });
    socket.on('disconnect', function() {
      document.getElementById('offline-notice').classList.add('show');
    });
    socket.on('hud:update', applyHud);
    socket.on('channel:chat', function(d) {
      addChatMessage(d.user?.displayName || d.userDisplayName || 'Anonimo', d.text || '');
    });
    socket.on('chat:message', function(d) {
      addChatMessage(d.user?.displayName || 'Anonimo', d.text || '');
    });
    socket.on('channel:follow', function(d) {
      var name = d.userDisplayName || d.userName || 'Someone';
      pushEvent('* ' + escHtml(name) + ' followed the channel!');
      enqueueAlert({ type: 'follow', user: name });
    });
    socket.on('channel:subscribe', function(d) {
      if (d.isGift) return;
      var name = d.userDisplayName || d.userName || 'Someone';
      var tier = d.tier === '1000' ? 'Tier 1' : d.tier === '2000' ? 'Tier 2' : 'Tier 3';
      pushEvent('* ' + escHtml(name) + ' subscribed! (' + tier + ')');
      enqueueAlert({ type: 'sub', user: name, detail: tier });
    });
    socket.on('channel:cheer', function(d) {
      var name = d.userDisplayName || d.userName || 'Someone';
      pushEvent('* ' + escHtml(name) + ' cheered x' + (d.bits || 0) + '!');
      enqueueAlert({ type: 'bits', user: name, detail: (d.bits || 0) + ' bits' });
    });
  }

  function startDemo() {
    applyHud({ viewers: 42, followers: 891, subscribers: 33, streamTitle: 'Win95 Stream Test', gameName: 'Solitaire' });
    document.getElementById('game-label-win').textContent = 'Solitaire';
    setTimeout(function() { addChatMessage('User123', 'Hey, nice stream!'); }, 3000);
    setTimeout(function() { addChatMessage('WinFan', 'love the retro vibes'); }, 7000);
    setTimeout(function() { enqueueAlert({ type: 'follow', user: 'User123' }); }, 2500);
    setTimeout(function() { enqueueAlert({ type: 'sub', user: 'WinFan', detail: 'Tier 1' }); }, 8000);
    setTimeout(function() { enqueueAlert({ type: 'bits', user: 'RetroGamer', detail: '200 bits' }); }, 14000);
  }

  function loadSocketIO(cb) {
    var script = document.createElement('script');
    script.onload = function() { cb(); };
    script.onerror = function() { setTimeout(function() { loadSocketIO(cb); }, 2000); };
    script.src = './js/socket.io.js';
    document.head.appendChild(script);
  }

  loadSocketIO(function() { initSocket(); });

  if (DEMO_MODE) {
    document.getElementById('demo-badge').classList.add('show');
    startDemo();
  }
})();
</script>
</body>
</html>
