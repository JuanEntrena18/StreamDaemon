<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Inter', sans-serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --stone: #1a1a2e;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.3);
  }

  /* ── Stone frame ── */
  #stone-frame {
    position: absolute;
    top: 0; bottom: 0;
    width: 440px;
    background:
      linear-gradient(135deg, rgba(26,26,46,0.88), rgba(10,14,39,0.92));
    border: 2px solid rgba(200,212,232,0.08);
    box-shadow: inset 0 0 60px rgba(0,0,0,0.4), 0 0 30px rgba(43,95,200,0.08);
    overflow: hidden;
  }
  #stone-frame.left { left: 0; border-radius: 0 12px 12px 0; border-left: 3px solid var(--blue); }
  #stone-frame.right { right: 0; border-radius: 12px 0 0 12px; border-right: 3px solid var(--blue); }

  /* ── Stone texture overlay ── */
  #stone-frame::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,212,232,0.02) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(200,212,232,0.015) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(200,212,232,0.008) 40px, rgba(200,212,232,0.008) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(200,212,232,0.008) 40px, rgba(200,212,232,0.008) 41px);
    pointer-events: none;
  }

  /* ── Rune column ── */
  #rune-col {
    position: absolute;
    top: 0; bottom: 0;
    width: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 20px 0;
    background: linear-gradient(to bottom, transparent, rgba(255,200,0,0.04), transparent);
  }
  #stone-frame.left #rune-col { right: 0; }
  #stone-frame.right #rune-col { left: 0; }
  .rune-char {
    font-family: 'Uncial Antiqua', serif;
    font-size: 1.1rem;
    color: var(--gold);
    opacity: 0.13;
    text-shadow: 0 0 10px var(--glow-gold);
  }

  /* ── Chat ── */
  #chat-inner {
    position: absolute;
    top: 0; bottom: 0; left: 16px; right: 56px;
    display: flex; flex-direction: column;
    padding: 18px 0;
    gap: 6px;
    overflow: hidden;
  }
  #stone-frame.right #chat-inner { left: 56px; right: 16px; }

  #chat-header {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.22em;
    color: var(--gold);
    padding: 5px 12px;
    border-radius: 4px;
    background: rgba(43,95,200,0.1);
    border-left: 3px solid var(--gold);
    margin-bottom: 4px;
    text-shadow: 0 0 10px var(--glow-gold);
  }
  #stone-frame.right #chat-header { border-right: 3px solid var(--gold); border-left: none; text-align: right; }

  .msg {
    display: flex; flex-direction: column;
    padding: 7px 12px;
    border-radius: 6px;
    background: rgba(10,14,39,0.5);
    border: 1px solid rgba(200,212,232,0.06);
    box-shadow: inset 0 1px 0 rgba(200,212,232,0.03);
    backdrop-filter: blur(4px);
    animation: msg-in 0.35s ease-out;
  }
  #stone-frame.right .msg { align-items: flex-end; }
  @keyframes msg-in {
    0% { opacity: 0; transform: translateY(10px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-user {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem; font-weight: 600;
    color: var(--gold); margin-bottom: 2px;
  }
  .msg-text {
    font-size: 0.78rem; font-weight: 400;
    color: var(--silver);
    line-height: 1.4; word-break: break-word;
  }

  .msg-time {
    font-size: 0.5rem; font-weight: 400;
    color: rgba(200,212,232,0.25);
    margin-top: 2px;
  }

  /* ── Crown top ── */
  #crown-top {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    font-size: 1.2rem;
    opacity: 0.15;
    filter: drop-shadow(0 0 12px var(--glow-gold));
  }
</style>
</head>
<body>
  <div id="stone-frame" class="left">
    <div id="crown-top">👑</div>
    <div id="rune-col">
      <span class="rune-char">ᚱ</span>
      <span class="rune-char">ᚨ</span>
      <span class="rune-char">ᛚ</span>
      <span class="rune-char">ᛖ</span>
      <span class="rune-char">ᛗ</span>
      <span class="rune-char">ᛟ</span>
    </div>
    <div id="chat-inner">
      <div id="chat-header">💬 Chat de la Alianza</div>
      <div id="messages"></div>
    </div>
  </div>

  <div id="stone-frame" class="right">
    <div id="crown-top">👑</div>
    <div id="rune-col">
      <span class="rune-char">ᛖ</span>
      <span class="rune-char">ᛚ</span>
      <span class="rune-char">ᚨ</span>
      <span class="rune-char">ᚱ</span>
      <span class="rune-char">ᛟ</span>
      <span class="rune-char">ᛗ</span>
    </div>
    <div id="chat-inner">
      <div id="chat-header">Chat de la Alianza 💬</div>
      <div id="messages-right" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    const side = params.get('side') || 'left';

    if (side === 'right') {
      document.getElementById('stone-frame').classList.remove('left');
      document.getElementById('stone-frame').classList.add('right');
    } else {
      document.querySelectorAll('#stone-frame')[1].style.display = 'none';
    }
    document.title = `StreamForge – WoW Alianza Chat · ${username}`;

    const messagesContainer = document.getElementById('messages');
    const messagesRight = document.getElementById('messages-right');
    const MAX_MSGS = 50;

    function addMessage(user, text) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const msg = document.createElement('div');
      msg.className = 'msg';
      msg.innerHTML = `<div class="msg-user">${user}</div><div class="msg-text">${text}</div><div class="msg-time">${time}</div>`;
      messagesContainer.appendChild(msg);
      const msgR = msg.cloneNode(true);
      msgR.className = 'msg';
      messagesRight.appendChild(msgR);
      if (messagesContainer.children.length > MAX_MSGS) messagesContainer.removeChild(messagesContainer.firstChild);
      if (messagesRight.children.length > MAX_MSGS) messagesRight.removeChild(messagesRight.firstChild);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      messagesRight.parentElement.scrollTop = messagesRight.parentElement.scrollHeight;
    }

    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.title = document.title.replace(/·.*/, '') + '· ' + username;

    function initSocket() {
      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        if (CHANNEL) socket.emit('join:channel', CHANNEL);
      });
      socket.on('chat:message', (d) => {
        addMessage(d.userDisplayName || d.userName || d.user || 'Anónimo', d.text || d.message || '');
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.src = BACKEND_URL + '/socket.io/socket.io.js';
      script.onload = cb;
      script.onerror = () => cb(new Error('load failed'));
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      if (!err) initSocket();
    });
  </script>
</body>
</html>
