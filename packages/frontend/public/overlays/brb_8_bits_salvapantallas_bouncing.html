<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit BRB Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px; background-color: #0a0a0a;
            overflow: hidden; font-family: 'Press Start 2P', monospace;
            position: relative;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.4));
            background-size: 100% 8px; pointer-events: none; z-index: 100;
        }

        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(#1a1a1a 2px, transparent 2px),
                linear-gradient(90deg, #1a1a1a 2px, transparent 2px);
            background-size: 100px 100px; z-index: 1;
        }

        #bouncing-box {
            position: absolute; z-index: 10;
            background: #000; border: 6px solid #fff;
            box-shadow: 10px 10px 0 #ff0055, -10px -10px 0 #00ffff;
            padding: 30px 40px; text-align: center;
            width: 600px;
        }

        .title {
            font-size: 40px; color: #ffff00; margin-bottom: 20px;
            animation: colorCycle 4s infinite;
        }

        .subtitle {
            font-size: 20px; color: #fff; line-height: 1.5;
        }

        @keyframes colorCycle {
            0% { color: #ffff00; } 25% { color: #ff0055; }
            50% { color: #00ffff; } 75% { color: #00ff00; } 100% { color: #ffff00; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanlines"></div>

    <div id="bouncing-box">
        <div class="title">GAME PAUSED</div>
        <div class="subtitle">PLAYER 1 AFK<br><br>PLEASE STAND BY...</div>
    </div>

    <script>
        const box = document.getElementById('bouncing-box');
        
        // Posiciones y velocidades iniciales
        let x = 100; let y = 100;
        let dx = 3; let dy = 3;
        
        // Dimensiones
        const screenW = 1920; const screenH = 1080;
        let boxW = 600; let boxH = 200; // Aproximado, se recalcula

        // Iniciar animación
        window.onload = () => {
            boxW = box.offsetWidth;
            boxH = box.offsetHeight;
            requestAnimationFrame(animateBox);
        }

        function animateBox() {
            x += dx;
            y += dy;

            // Colisiones con los bordes (Efecto DVD Logo)
            if (x + boxW >= screenW || x <= 0) dx = -dx;
            if (y + boxH >= screenH || y <= 0) dy = -dy;

            box.style.left = x + 'px';
            box.style.top = y + 'px';

            requestAnimationFrame(animateBox);
        }
    </script>
</body>
</html>
