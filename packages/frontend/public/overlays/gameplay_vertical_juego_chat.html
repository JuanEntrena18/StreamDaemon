<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horde Vertical Gameplay (No Cam)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1080px; height: 1920px; background-color: transparent;
            overflow: hidden; position: relative;
        }

        /* Área de Juego (Transparente para OBS) */
        .game-area {
            width: 1080px; height: 1450px; /* ~75% de la pantalla vertical */
            background-color: transparent;
            position: relative;
            /* Borde superior decorativo */
            border-top: 8px solid #4a0000;
            border-left: 8px solid #4a0000;
            border-right: 8px solid #4a0000;
            box-shadow: inset 0 0 50px rgba(255,0,0,0.2);
        }

        /* Panel Inferior (Chat) */
        .bottom-panel {
            width: 1080px; height: 470px;
            background: linear-gradient(to bottom, #1a0000, #050000);
            border-top: 6px solid #ff0000;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        /* Textura de Fragua en el panel inferior */
        .bottom-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1.5" fill="%23300000"/></svg>');
            opacity: 0.5; pointer-events: none; z-index: 0;
        }

        .panel-header {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; background: rgba(0,0,0,0.6);
            border-bottom: 2px solid #5a0000; z-index: 1;
        }

        .panel-logo { width: 50px; filter: drop-shadow(0 0 10px #ff0000); margin-right: 20px; }
        .panel-title { font-family: 'Cinzel', serif; color: #fff; font-size: 30px; letter-spacing: 5px; text-shadow: 2px 2px 5px #000; }

        /* Contenedor del Chat */
        .chat-container {
            flex: 1; padding: 20px 40px; display: flex; flex-direction: column;
            justify-content: flex-end; overflow: hidden; z-index: 1;
            font-family: 'Roboto', sans-serif;
        }

        .chat-msg {
            background: rgba(40, 0, 0, 0.7); border-left: 4px solid #ff0000;
            padding: 15px 20px; margin-top: 15px; border-radius: 0 10px 10px 0;
            font-size: 24px; color: #e0e0e0; line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }

        .chat-user { font-weight: 700; color: #ff4444; margin-right: 10px; font-size: 26px; }

        /* Ancla React */
        #overlay-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #overlay-root > * { pointer-events: auto; }

    </style>
</head>
<body>

    <!-- Capa para Alertas React -->
    <div id="overlay-root"></div>

    <!-- Zona de Juego -->
    <div class="game-area"></div>

    <!-- Panel de Chat Inferior -->
    <div class="bottom-panel">
        <div class="panel-header">
            <img src="horda_logo.png" class="panel-logo" alt="Horda">
            <span class="panel-title">COMUNICACIONES DE GUERRA</span>
        </div>
        <div class="chat-container" id="chatWrapper">
            <!-- JS inyecta mensajes aquí -->
        </div>
    </div>

    <!-- Lógica de Chat Integrada -->
    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 6; // Menos mensajes porque la fuente es muy grande para móvil

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const finalColor = color || '#ff4444';

            msgNode.innerHTML = `<span class="chat-user" style="color: ${finalColor}">${safeUsername}:</span><span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });
    </script>
    
    <!-- Script de React -->
    <script type="module" src="./src/overlay.tsx"></script>
</body>
</html>
