<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Start Screen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: #000000;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
                linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }

        .title {
            font-size: 80px;
            color: #E52521; /* NES Red */
            text-shadow: 6px 6px 0px #7C7C7C;
            margin-bottom: 50px;
            text-align: center;
            line-height: 1.5;
        }

        .timer-container {
            border: 8px solid #ffffff;
            padding: 40px 60px;
            background-color: #000000;
            box-shadow: inset 8px 8px 0px #5C5C5C, 12px 12px 0px #004CE5; /* NES Blue drop shadow */
            margin-bottom: 60px;
        }

        .timer {
            font-size: 120px;
            color: #F8B800; /* NES Gold/Yellow */
            text-shadow: 6px 6px 0px #E52521;
        }

        .insert-coin {
            font-size: 40px;
            color: #ffffff;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="title">PLAYER 1<br>GET READY</div>
    
    <div class="timer-container">
        <div class="timer" id="timerDisplay">05:00</div>
    </div>

    <div class="insert-coin">INSERT COIN ...</div>

    <script>
        const TOTAL_MINUTES = 5;
        let totalSeconds = TOTAL_MINUTES * 60;
        const displayEl = document.getElementById('timerDisplay');
        const insertCoinEl = document.querySelector('.insert-coin');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function engineTick() {
            displayEl.textContent = formatTime(totalSeconds);
            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(engineTick, 1000);
            } else {
                displayEl.textContent = "00:00";
                insertCoinEl.textContent = "PRESS START!";
                insertCoinEl.style.color = "#E52521";
                insertCoinEl.style.animation = "blink 0.2s step-end infinite";
            }
        }
        engineTick();
    </script>
</body>
</html>
