<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – DJ Fullscreen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
  }
  :root {
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --purple: #8b5cf6;
    --yellow: #fbbf24;
  }

  /* ── Background gradient ── */
  #bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(139,92,246,0.08), transparent 60%),
                radial-gradient(ellipse at 50% 20%, rgba(0,240,255,0.05), transparent 50%),
                linear-gradient(180deg, #0a0a1a 0%, #0d0d24 50%, #0a0a1a 100%);
  }

  /* ── Grid pattern ── */
  #grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── Vinyl records (decorative) ── */
  .vinyl {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a1a);
    border: 3px solid rgba(255,255,255,0.03);
    animation: spin 10s linear infinite;
  }
  .vinyl::after { content: ''; position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; border-radius: 50%; background: var(--cyan); transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(0,240,255,0.3); }
  .vinyl::before { content: ''; position: absolute; top: 50%; left: 50%; width: 160px; height: 160px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.02); transform: translate(-50%, -50%); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .vinyl-1 { bottom: -60px; left: -60px; width: 220px; height: 220px; }
  .vinyl-2 { top: -60px; right: -60px; width: 180px; height: 180px; animation-direction: reverse; }

  /* ── Center DJ deck ── */
  #center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  #deck-icon {
    font-size: 4rem;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0,240,255,0.3));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  #username-display {
    font-size: 4.5rem; font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,240,255,0.3), 0 0 80px rgba(0,240,255,0.1), 0 4px 20px rgba(0,0,0,0.5);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  #tagline {
    font-size: 1.1rem; font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ── Equalizer full width ── */
  #eq-container {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    display: flex;
    align-items: flex-end;
    padding: 0 40px;
    gap: 4px;
  }
  .eq-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(to top, var(--cyan), var(--magenta), var(--purple));
    animation: eq-wave 0.7s ease-in-out infinite alternate;
    opacity: 0.6;
  }
  @keyframes eq-wave {
    0% { height: 5px; }
    100% { height: 100px; }
  }
  .eq-bar:nth-child(odd) { animation-delay: 0.1s; }
  .eq-bar:nth-child(3n) { animation-delay: 0.2s; }
  .eq-bar:nth-child(5n+2) { animation-delay: 0.3s; }

  /* ── Corner labels ── */
  .corner-label {
    position: absolute;
    display: flex; flex-direction: column;
    gap: 2px;
    padding: 12px 20px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.04);
    backdrop-filter: blur(6px);
    min-width: 110px;
  }
  .corner-label .ico { font-size: 1.2rem; }
  .corner-label .val { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.03em; }
  .corner-label .lbl { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); }

  .corner-label.cl-tl { top: 30px; left: 30px; }
  .corner-label.cl-tr { top: 30px; right: 30px; }
  .corner-label.cl-bl { bottom: 140px; left: 30px; }
  .corner-label.cl-br { bottom: 140px; right: 30px; }

  .corner-label:nth-child(1) .val { color: var(--cyan); }
  .corner-label:nth-child(2) .val { color: var(--magenta); }
  .corner-label:nth-child(3) .val { color: var(--yellow); }
  .corner-label:nth-child(4) .val { color: var(--purple); }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="grid"></div>

  <div class="vinyl vinyl-1"></div>
  <div class="vinyl vinyl-2"></div>

  <div id="center">
    <span id="deck-icon">🎧</span>
    <div id="username-display"><span id="name-text">DJ</span></div>
    <div id="tagline">en vivo · live</div>
  </div>

  <div class="corner-label cl-tl">
    <span class="ico">📺</span>
    <span class="val" id="followers">0</span>
    <span class="lbl">Seguidores</span>
  </div>
  <div class="corner-label cl-tr">
    <span class="ico">⭐</span>
    <span class="val" id="subs">0</span>
    <span class="lbl">Suscriptores</span>
  </div>
  <div class="corner-label cl-bl">
    <span class="ico">💰</span>
    <span class="val" id="donations">$0</span>
    <span class="lbl">Donaciones</span>
  </div>
  <div class="corner-label cl-br">
    <span class="ico">🎯</span>
    <span class="val" id="bits">0</span>
    <span class="lbl">Bits</span>
  </div>

  <div id="eq-container">
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'DJ';
    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – DJ Fullscreen · ${username}`;

    function initSocket() {
      const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
      socket.on('connect', () => {
        if (CHANNEL) socket.emit('join:channel', CHANNEL);
      });
      socket.on('hud:update', (d) => {
        if (d.followers !== undefined) document.getElementById('followers').textContent = d.followers;
        if (d.subscribers !== undefined) document.getElementById('subs').textContent = d.subscribers;
      });
      socket.on('channel:follow', () => {
        const el = document.getElementById('followers');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:subscribe', () => {
        const el = document.getElementById('subs');
        el.textContent = parseInt(el.textContent) + 1;
      });
      socket.on('channel:cheer', (d) => {
        const el = document.getElementById('bits');
        el.textContent = parseInt(el.textContent) + (d.bits || 0);
      });
      socket.on('channel:redemption', (d) => {
        if (d.rewardCost) {
          const el = document.getElementById('donations');
          const current = parseFloat(el.textContent.replace('$','')) + (d.rewardCost / 100);
          el.textContent = '$' + current.toFixed(2);
        }
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.src = BACKEND_URL + '/socket.io/socket.io.js';
      script.onload = cb;
      script.onerror = () => cb(new Error('load failed'));
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      if (!err) initSocket();
    });
  </script>
</body>
</html>
