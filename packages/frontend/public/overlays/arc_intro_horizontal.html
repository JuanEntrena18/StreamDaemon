<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Raiders - Starting Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@600;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px; height: 1080px;
            background-color: #0b0c0e; overflow: hidden;
            font-family: 'Share Tech Mono', monospace; color: #ffffff;
            position: relative;
        }

        /* Rejilla y líneas de escaneo analógicas */
        body::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), 
                        linear-gradient(90deg, rgba(255, 107, 0, 0.03), rgba(0, 242, 254, 0.02));
            background-size: 100% 4px, 6px 100%; z-index: 10; pointer-events: none;
        }

        /* Fondo dinámico con partículas de rejilla táctica */
        .tactical-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 107, 0, 0.1) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 1; opacity: 0.5;
        }

        /* Contenedor Principal de la Interfaz Táctica */
        .terminal-container {
            position: absolute; top: 50px; left: 50px; right: 50px; bottom: 50px;
            border: 2px solid #ff6b00; background: rgba(13, 14, 16, 0.9);
            clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 30px, 100% calc(100% - 30px), calc(100% - 30px) 100%, 30px 100%, 0 calc(100% - 30px), 0 30px);
            z-index: 5; display: flex; flex-direction: column; padding: 40px;
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.15), inset 0 0 30px rgba(255, 107, 0, 0.05);
        }

        /* Remaches metálicos en las esquinas */
        .rivet {
            position: absolute; width: 12px; height: 12px; background: #555;
            border-radius: 50%; border: 1px solid #111; box-shadow: inset -2px -2px 3px #000;
        }
        .r-tl { top: 15px; left: 15px; } .r-tr { top: 15px; right: 15px; }
        .r-bl { bottom: 15px; left: 15px; } .r-br { bottom: 15px; right: 15px; }

        /* Cabecera */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(255, 107, 0, 0.3); padding-bottom: 20px;
        }

        .system-status { display: flex; align-items: center; gap: 15px; }
        .status-light {
            width: 15px; height: 15px; background-color: #00f2fe; border-radius: 50%;
            box-shadow: 0 0 10px #00f2fe; animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { to { opacity: 0.4; } }

        .system-title { font-family: 'Teko', sans-serif; font-size: 35px; letter-spacing: 3px; color: #00f2fe; }

        /* Contenido del Centro */
        .main-content {
            flex: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; margin-top: 40px;
        }

        /* Lado Izquierdo: Cuenta Atrás */
        .countdown-section {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 1px dashed rgba(255, 107, 0, 0.3); background: rgba(0,0,0,0.4);
            position: relative;
        }

        .alert-tape {
            position: absolute; top: 0; left: 0; width: 100%; height: 8px;
            background: repeating-linear-gradient(45deg, #ff6b00, #ff6b00 10px, #000 10px, #000 20px);
        }

        .countdown-title { font-family: 'Teko', sans-serif; font-size: 60px; color: #ff6b00; letter-spacing: 6px; }
        .timer { font-size: 150px; font-weight: 900; letter-spacing: 8px; color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* Barra de progreso de extracción */
        .extraction-progress { width: 80%; height: 15px; background: #111; border: 1px solid #ff6b00; margin-top: 20px; position: relative; }
        .progress-bar { height: 100%; width: 100%; background: #ff6b00; box-shadow: 0 0 10px #ff6b00; transition: width 1s linear; }

        /* Lado Derecho: Logging Táctico */
        .log-section {
            border-left: 2px solid rgba(255, 107, 0, 0.3); padding-left: 30px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .log-title { font-size: 20px; color: #00f2fe; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 242, 254, 0.2); padding-bottom: 5px;}
        .log-messages { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 10px; font-size: 14px; color: #888; }
        .log-msg { border-left: 2px solid #ff6b00; padding-left: 8px; animation: textFadeIn 0.3s ease-out; }
        @keyframes textFadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .system-footer { margin-top: 30px; font-size: 12px; color: #555; text-align: right; }
    </style>
</head>
<body>

    <div class="tactical-grid"></div>

    <div class="terminal-container">
        <div class="rivet r-tl"></div><div class="rivet r-tr"></div>
        <div class="rivet r-bl"></div><div class="rivet r-br"></div>

        <div class="header">
            <div class="system-title">ARC TERMINAL v4.12 // PROTOCOLO DE INCURSIÓN</div>
            <div class="system-status">
                <div class="status-light"></div>
                <span>SISTEMA DE ENLACE ACTIVO</span>
            </div>
        </div>

        <div class="main-content">
            <div class="countdown-section">
                <div class="alert-tape"></div>
                <div class="countdown-title">COMIENZO DE LA TRANSMISIÓN</div>
                <div class="timer" id="timerDisplay">05:00</div>
                <div class="extraction-progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <div class="log-section">
                <div>
                    <div class="log-title">> CONSOLE_LOGS</div>
                    <div class="log-messages" id="logBox">
                        <div class="log-msg">[SYS] Estableciendo conexión neural...</div>
                        <div class="log-msg">[SYS] Detección de señales ARC en cuadrante 9...</div>
                        <div class="log-msg">[SYS] Cargando telemetría del escuadrón...</div>
                    </div>
                </div>
                <div class="system-footer">SECURE LINE // NO INTERCEPTABLE</div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_MINUTES = 5;
        let totalSeconds = TOTAL_MINUTES * 60;
        const initialSeconds = totalSeconds;

        const timerEl = document.getElementById('timerDisplay');
        const progressEl = document.getElementById('progressBar');
        const logBox = document.getElementById('logBox');

        const sysLogs = [
            "Escaneando superficie terrestre...",
            "Comprobando integridad de munición...",
            "Señal del dron de reabastecimiento detectada",
            "Advertencia: Patrulla mecanizada ARC aproximándose",
            "Filtros de radiación optimizados al 98%",
            "Armamento secundario cargado y verificado",
            "Baliza de extracción lista en coordenadas primarias"
        ];

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function addRandomLog() {
            if (sysLogs.length === 0) return;
            const logMsg = sysLogs.shift();
            const logNode = document.createElement('div');
            logNode.className = 'log-msg';
            logNode.textContent = `[SYS] ${logMsg}`;
            logBox.appendChild(logNode);
            if (logBox.children.length > 8) {
                logBox.removeChild(logBox.firstChild);
            }
        }

        function tick() {
            timerEl.textContent = formatTime(totalSeconds);
            const percent = (totalSeconds / initialSeconds) * 100;
            progressEl.style.width = percent + '%';

            // Eventos dinámicos en logBox ahora controlados por websockets

            if (totalSeconds > 0) {
                totalSeconds--;
                setTimeout(tick, 1000);
            } else {
                timerEl.textContent = "INCURSIÓN LISTA";
                timerEl.style.color = "#00f2fe";
            }
        }
        tick();

        const BACKEND_URL = window.location.protocol + '//' + window.location.host;
        const CHANNEL = new URLSearchParams(window.location.search).get('channel') || 'default';
        let socket;

        function initSocket() {
            try {
                socket = io(BACKEND_URL, { transports: ['websocket'] });
                socket.on('connect', () => {
                    socket.emit('join:channel', CHANNEL);
                });

                socket.on('channel:follow', ({ userDisplayName }) => {
                    addLogMessage(`NUEVO RECLUTA: ${userDisplayName}`);
                });

                socket.on('channel:subscribe', ({ userDisplayName, tier, isGift }) => {
                    if (isGift) return;
                    addLogMessage(`SUSCRIPCIÓN CONFIRMADA: ${userDisplayName}`);
                });

                socket.on('channel:subscription-message', ({ userDisplayName, cumulativeMonths }) => {
                    addLogMessage(`RE-SUSCRIPCIÓN (${cumulativeMonths} meses): ${userDisplayName}`);
                });

                socket.on('channel:subgift', ({ gifterDisplayName, amount }) => {
                    addLogMessage(`ALERTA DE SUMINISTROS: ${gifterDisplayName} regaló ${amount} subs`);
                });

                socket.on('channel:cheer', ({ userDisplayName, bits }) => {
                    addLogMessage(`RECURSOS RECIBIDOS (${bits} bits): ${userDisplayName}`);
                });

                socket.on('channel:redemption', ({ userDisplayName, rewardTitle }) => {
                    addLogMessage(`PROTOCOLO ACTIVADO: ${rewardTitle} por ${userDisplayName}`);
                });

                socket.on('chat:message', ({ username, message, color }) => {
                    addLogMessage(`${username}: ${message}`);
                });
            } catch(e) {
                console.error("Socket fallback", e);
            }
        }

        function addLogMessage(msg) {
            if (!logBox) return;
            const logNode = document.createElement('div');
            logNode.className = 'log-msg';
            logNode.textContent = `[SYS] ${msg}`;
            logBox.appendChild(logNode);
            if (logBox.children.length > 8) {
                logBox.removeChild(logBox.firstChild);
            }
        }

        setTimeout(initSocket, 1000);
    </script>
    <script src="./js/socket.io.js"></script>
</body>
</html>
