<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Gameplay Overlay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 1920px;
            height: 1080px;
            background-color: transparent; /* Transparente para OBS */
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
            -webkit-font-smoothing: none;
            overflow: hidden;
            display: grid;
            padding: 20px;
            gap: 20px;
            grid-template-columns: 1260px 600px; /* 2/3 y 1/3 exactos considerando padding */
            grid-template-rows: 1040px; /* 1080 - 40 de padding vertical */
        }

        .win-window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            box-shadow: 1px 1px 0 #808080 inset, -1px -1px 0 #dfdfdf inset;
            display: flex;
            flex-direction: column;
            padding: 3px;
        }

        .win-titlebar {
            background-color: #000080;
            color: #ffffff;
            padding: 4px 5px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-text { display: flex; align-items: center; gap: 8px; }

        .win-buttons { display: flex; gap: 2px; }
        .win-btn {
            width: 20px; height: 20px;
            background-color: #c0c0c0;
            border: 2px solid; border-color: #ffffff #000000 #000000 #ffffff;
            font-weight: bold; color: #000;
            display: flex; justify-content: center; align-items: center; font-size: 12px;
        }

        .game-area {
            height: 100%;
        }

        .game-content {
            flex-grow: 1;
            background-color: transparent; /* AQUÍ SE VERÁ EL JUEGO EN OBS */
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080; /* Borde interior hundido */
        }

        .side-panel {
            display: grid;
            grid-template-rows: 340px 680px; /* Webcam arriba, Chat abajo */
            gap: 20px;
        }

        .webcam-area .win-content {
            flex-grow: 1;
            background-color: transparent; /* AQUÍ SE VERÁ LA WEBCAM EN OBS */
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }

        .chat-area .win-content {
            flex-grow: 1;
            background-color: #ffffff;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .chat-msg {
            font-size: 16px;
            margin-bottom: 8px;
            line-height: 1.3;
            color: #000;
            border-bottom: 1px dotted #c0c0c0;
            padding-bottom: 4px;
        }

        .user { font-weight: bold; color: #000080; }

    </style>
</head>
<body>

    <!-- Monitor Izquierdo (Juego) -->
    <div class="win-window game-area">
        <div class="win-titlebar">
            <div class="title-text"><span>C:\Juegos\DirectX_Game.exe</span></div>
            <div class="win-buttons">
                <div class="win-btn">_</div><div class="win-btn">◻</div><div class="win-btn">X</div>
            </div>
        </div>
        <div class="game-content"></div>
    </div>

    <!-- Panel Derecho -->
    <div class="side-panel">
        
        <!-- Webcam -->
        <div class="win-window webcam-area">
            <div class="win-titlebar">
                <div class="title-text"><span>Webcam.dll</span></div>
                <div class="win-buttons"><div class="win-btn">X</div></div>
            </div>
            <div class="win-content"></div>
        </div>

        <!-- Chat -->
        <div class="win-window chat-area">
            <div class="win-titlebar">
                <div class="title-text"><span>MSN_Chat_Log.txt - Bloc de notas</span></div>
                <div class="win-buttons">
                    <div class="win-btn">_</div><div class="win-btn">◻</div><div class="win-btn">X</div>
                </div>
            </div>
            <div class="win-content" id="chatWrapper">
                <!-- Mensajes inyectados por JS -->
            </div>
        </div>

    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MSG = 18;

        function appendMessage(username, text) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Estilo clásico sin colores personalizados por usuario, puro Win95
            msgNode.innerHTML = `<span class="user">&lt;${safeUsername}&gt;</span> ${safeText}`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MSG) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message);
            }
        });
    </script>
</body>
</html>
