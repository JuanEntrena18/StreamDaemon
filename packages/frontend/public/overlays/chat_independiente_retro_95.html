<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 95 Standalone Chat</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
        width: 100vw; height: 100vh; background-color: transparent;
        overflow: hidden; font-family: "Arial", sans-serif; color: #000000;
    }

    .win95-window {
            width: 100%; height: 100%; background: #c0c0c0;
            border: 3px outset #dfdfdf;
            display: flex; flex-direction: column; overflow: hidden;
            padding: 2px;
        }

        .title-bar {
            background: #000080; color: #ffffff; padding: 4px 6px;
            font-weight: bold; font-size: 14px; display: flex;
            justify-content: space-between; align-items: center;
        }

        .title-text { display: flex; align-items: center; gap: 6px; }

        .win95-buttons { display: flex; gap: 2px; }

        .win95-btn {
            background: #c0c0c0; border: 2px outset #dfdfdf;
            width: 16px; height: 16px; font-size: 10px; font-weight: bold;
            color: #000000; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }

        .chat-content { 
            flex: 1; background: #ffffff; 
            border: 3px inset #808080;
            margin: 4px; padding: 10px;
            display: flex; flex-direction: column; justify-content: flex-end; 
            overflow: hidden; 
        }

        .chat-msg {
            margin-bottom: 6px; font-size: 13px; line-height: 1.4;
            animation: winFadeIn 0.1s ease-out forwards;
        }
        @keyframes winFadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .chat-user { color: #0000ff; font-weight: bold; }
        .chat-text { color: #000000; }
    </style>
</head>
<body>

    <div class="win95-window">
        <div class="title-bar">
            <span class="title-text">💬 chat_room.exe</span>
            <div class="win95-buttons">
                <div class="win95-btn">_</div>
                <div class="win95-btn">❐</div>
                <div class="win95-btn">X</div>
            </div>
        </div>
        <div class="chat-content" id="chatWrapper">
            <!-- Mensajes inyectados -->
        </div>
    </div>

    <script>
        const chatWrapper = document.getElementById('chatWrapper');
        const MAX_MESSAGES = 18;

        function appendMessage(username, text, color) {
            const msgNode = document.createElement('div');
            msgNode.className = 'chat-msg';
            const safeUsername = username.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const userColor = color || '#0000ff';

            msgNode.innerHTML = `<span class="chat-user" style="color: ${userColor}">&lt;${safeUsername}&gt;</span> <span class="chat-text">${safeText}</span>`;
            chatWrapper.appendChild(msgNode);

            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        const params = new URLSearchParams(window.location.search);
        const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
        const CHANNEL = params.get('channel');

        if (CHANNEL) {
            document.title = 'Win95 Chat · ' + CHANNEL;
        }

        function initSocket() {
            const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                if (CHANNEL) socket.emit('join:channel', CHANNEL);
            });
            socket.on('chat:message', (d) => {
                appendMessage(
                    d.user?.displayName || d.userDisplayName || d.userName || 'Anónimo',
                    d.text || '',
                    d.user?.color || '#0000ff'
                );
            });
            socket.on('channel:follow', (d) => {
                pushEvent('⭐ <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> nos sigue!');
            });
            socket.on('channel:subscribe', (d) => {
                pushEvent('🎉 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> se suscribió!');
            });
            socket.on('channel:cheer', (d) => {
                pushEvent('💎 <b>' + (d.userDisplayName || d.userName || 'Anónimo') + '</b> animó con ' + (d.bits || 0) + ' bits!');
            });
            socket.on('channel:redemption', (d) => {
                pushEvent('🎯 <b>' + (d.userDisplayName || d.userName || 'Alguien') + '</b> canjeó <b>' + (d.rewardTitle || '') + '</b>');
            });
        }

        function loadSocketIO(cb) {
            const script = document.createElement('script');
            script.src = BACKEND_URL + '/socket.io/socket.io.js';
            script.onload = cb;
            script.onerror = () => cb(new Error('load failed'));
            document.head.appendChild(script);
        }

        function pushEvent(html) {
            const node = document.createElement('div');
            node.className = 'chat-msg';
            node.innerHTML = html;
            chatWrapper.appendChild(node);
            if (chatWrapper.children.length > MAX_MESSAGES) {
                chatWrapper.removeChild(chatWrapper.firstChild);
            }
        }

        loadSocketIO(function(err) {
            if (!err) initSocket();
        });

        window.addEventListener('message', (event) => {
            const payload = event.data;
            if (payload && payload.type === 'NEW_CHAT_MESSAGE') {
                appendMessage(payload.username, payload.message, payload.color);
            }
        });
    </script>
</body>
</html>
