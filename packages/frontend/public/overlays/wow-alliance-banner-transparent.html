<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – WoW Alianza Banner Transparente</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Uncial+Antiqua&family=Inter:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Cinzel', serif;
  }
  :root {
    --blue: #2b5fc8;
    --gold: #ffc800;
    --lblue: #8ab4ff;
    --silver: #c8d4e8;
    --navy: #0a0e27;
    --glow: rgba(43,95,200,0.6);
    --glow-gold: rgba(255,200,0,0.3);
  }

  #banner {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to right,
      rgba(10,14,39,0.9), rgba(20,30,60,0.93), rgba(10,14,39,0.9));
    border-top: 2px solid;
    border-image: linear-gradient(to right, var(--blue), var(--gold), var(--lblue)) 1;
    display: flex;
    align-items: center;
    padding: 0 200px 0 25px;
    overflow: hidden;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
  }
  #banner::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(200,212,232,0.006) 30px, rgba(200,212,232,0.006) 31px);
    pointer-events: none;
  }

  .info { flex: 1; display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 1; }
  .info-label { font-size: 0.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--gold); text-shadow: 0 0 12px var(--glow-gold); }
  .info-name { font-size: 1.7rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--glow), 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 0.05em; line-height: 1; }

  .labels { display: flex; gap: 12px; margin-top: 3px; }
  .label-item { display: flex; align-items: center; gap: 4px; font-size: 0.62rem; font-weight: 600; color: rgba(200,212,232,0.38); }
  .label-item .val { font-weight: 700; }
  .label-item:nth-child(1) .val { color: var(--lblue); }
  .label-item:nth-child(2) .val { color: var(--gold); }
  .label-item:nth-child(3) .val { color: var(--blue); }
  .label-item:nth-child(4) .val { color: var(--silver); }
  .label-item .ico { font-size: 0.68rem; }

  #crest-side { margin-left: auto; font-size: 1.8rem; opacity: 0.1; flex-shrink: 0; filter: drop-shadow(0 0 12px var(--glow-gold)); }

  .rune-accent { font-family: 'Uncial Antiqua', serif; font-size: 0.55rem; color: var(--gold); opacity: 0.06; position: absolute; bottom: 5px; }
  .rune-accent-l { left: 12px; }
  .rune-accent-r { right: 12px; }
  .wow-logo {
    position: absolute;
    width: 72px; height: 72px;
    bottom: 20px; right: 20px;
    z-index: 999;
    opacity: 0.2;
    animation: wowSpin 10s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.3));
    border-radius: 50%;
    object-fit: cover;
  }
  @keyframes wowSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .alliance-crest-watermark {
    position: absolute;
    width: 180px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.05;
    z-index: 0;
    pointer-events: none;
    animation: crestPulse 5s ease-in-out infinite;
  }
  @keyframes crestPulse {
    0%, 100% { opacity: 0.05; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.1; transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>
  <div id="banner">
    <span class="rune-accent rune-accent-l">ᚨ ᛚ ᛁ ᚨ ᚾ ᛉ</span>
    <span class="rune-accent rune-accent-r">ᛗ ᛟ ᚱ ᛏ ᛖ</span>
    <div class="info">
      <div class="info-label">👑 ahora al aire</div>
      <div class="info-name" id="name-text">Alianza</div>
      <div class="labels">
        <div class="label-item"><span class="ico">📺</span><span class="val" id="followers">0</span> seguidores</div>
        <div class="label-item"><span class="ico">⭐</span><span class="val" id="subs">0</span> suscriptores</div>
        <div class="label-item"><span class="ico">💰</span><span class="val" id="donations">$0</span> donado</div>
        <div class="label-item"><span class="ico">🎯</span><span class="val" id="bits">0</span> bits</div>
      </div>
    </div>
    <div id="crest-side">🦁</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get('username') || 'Alianza';
    const BACKEND_URL = (params.get('backend') || 'http://localhost:3000').replace(/\/+$/, '');
    const CHANNEL = params.get('channel');
    document.getElementById('name-text').textContent = username;
    document.title = `StreamForge – WoW Alianza Banner Transparente · ${username}`;

    function applyHud(d) {
      console.log('[HUD] applyHud', d);
      if (d.followers !== undefined) document.getElementById('followers').textContent = Number(d.followers).toLocaleString();
      if (d.subscribers !== undefined) document.getElementById('subs').textContent = Number(d.subscribers).toLocaleString();
    }

    function initSocket() {
      console.log('[HUD] initSocket, BACKEND_URL=' + BACKEND_URL + ', CHANNEL=' + CHANNEL);
      const socket = io(BACKEND_URL, { transports: ['websocket'] });
      socket.on('connect', () => {
        console.log('[HUD] socket connected');
        if (!CHANNEL) { console.warn('[HUD] no channel'); return; }
        socket.emit('join:channel', CHANNEL);
        console.log('[HUD] fetching initial data from', BACKEND_URL + '/hud/' + CHANNEL);
        fetch(BACKEND_URL + '/hud/' + CHANNEL)
          .then(r => { console.log('[HUD] initial fetch status', r.status); return r.ok ? r.json() : null; })
          .then(d => { console.log('[HUD] initial data', d); if (d) applyHud(d); })
          .catch(e => console.warn('[HUD] initial fetch error', e));
        console.log('[HUD] starting poll');
        fetch(BACKEND_URL + '/hud/start-poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: CHANNEL, interval: 10 })
        }).then(r => console.log('[HUD] poll start status', r.status)).catch(e => console.warn('[HUD] poll start error', e));
      });
      socket.on('connect_error', (e) => console.warn('[HUD] socket connect_error', e));
      socket.on('hud:update', (d) => { console.log('[HUD] hud:update event', d); applyHud(d); });
      socket.on('channel:follow', () => {
        const el = document.getElementById('followers');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + 1;
      });
      socket.on('channel:subscribe', () => {
        const el = document.getElementById('subs');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + 1;
      });
      socket.on('channel:cheer', (d) => {
        const el = document.getElementById('bits');
        el.textContent = Number(el.textContent.replace(/\D/g,'') || 0) + (d.bits || 0);
      });
      socket.on('channel:redemption', (d) => {
        if (d.rewardCost) {
          const el = document.getElementById('donations');
          const current = parseFloat(el.textContent.replace('$','').replace(',','.')) + (d.rewardCost / 100);
          el.textContent = '$' + current.toFixed(2);
        }
      });
    }

    function loadSocketIO(cb) {
      const script = document.createElement('script');
      script.onload = () => cb();
script.src = './js/socket.io.js';
      script.src = './js/socket.io.js';
script.src = './js/socket.io.js';
      script.onerror = () => { console.log('[HUD] socket.io.js loaded'); cb(); };
      script.onerror = () => { console.warn('[HUD] socket.io.js load failed'); cb(new Error('load failed')); };
      document.head.appendChild(script);
    }

    loadSocketIO(function(err) {
      console.log('[HUD] loadSocketIO callback err=', err);
      if (!err) initSocket();
    });
  </script>
  <img class="alliance-crest-watermark" src="alianza_logo.png" alt="">
  <img class="wow-logo" src="world-of-warcraft-logo.png" alt="">
</body>
</html>
