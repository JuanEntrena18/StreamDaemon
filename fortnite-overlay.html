<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamForge – Fortnite Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue:    #00D4FF;
    --yellow:  #FFD700;
    --purple:  #C84BFF;
    --dark:    #0A0E1A;
    --panel:   rgba(10, 14, 26, 0.82);
    --stroke:  rgba(0, 212, 255, 0.35);
  }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ──────────────────────────────────── CANVAS DE PARTÍCULAS */
  #particles {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ──────────────────────────────────── HUD ESQUINA SUPERIOR IZQUIERDA */
  #hud {
    position: absolute;
    top: 28px; left: 28px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .stat-row {
    display: flex; align-items: center; gap: 0;
    position: relative;
  }

  .stat-icon-wrap {
    width: 46px; height: 46px;
    background: var(--blue);
    clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative; z-index: 2;
  }
  .stat-icon-wrap.yellow { background: var(--yellow); }
  .stat-icon-wrap.purple { background: var(--purple); }

  .stat-icon-wrap svg {
    width: 22px; height: 22px;
    fill: var(--dark);
  }

  .stat-body {
    background: var(--panel);
    border: 1px solid var(--stroke);
    border-left: none;
    padding: 5px 18px 5px 14px;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 94% 100%, 0 100%);
    min-width: 120px;
    position: relative;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    line-height: 1;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    color: #ffffff;
    line-height: 1.05;
    letter-spacing: 1px;
    transition: all 0.3s ease;
  }

  .stat-value.blue  { color: var(--blue); }
  .stat-value.yellow{ color: var(--yellow); }
  .stat-value.purple{ color: var(--purple); }

  /* ──────────────────────────────────── UPTIME ESQUINA SUPERIOR DERECHA */
  #uptime-block {
    position: absolute;
    top: 28px; right: 28px;
    background: var(--panel);
    border: 1px solid var(--stroke);
    padding: 10px 22px;
    clip-path: polygon(6% 0, 100% 0, 100% 80%, 94% 100%, 0 100%, 0 20%);
    text-align: center;
    min-width: 160px;
  }

  .uptime-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--blue);
    line-height: 1;
    margin-bottom: 4px;
  }

  .uptime-value {
    font-size: 38px; font-weight: 900;
    color: #ffffff;
    letter-spacing: 3px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* ──────────────────────────────────── TÍTULO STREAM – BARRA INFERIOR */
  #stream-title-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(90deg, var(--dark) 0%, rgba(10,14,26,0.92) 60%, transparent 100%);
    border-top: 2px solid var(--blue);
    display: flex; align-items: center; gap: 16px;
    padding: 0 32px;
    overflow: hidden;
  }

  #live-badge {
    background: #FF3B3B;
    padding: 4px 12px;
    font-size: 13px; font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
    flex-shrink: 0;
    animation: pulse-live 1.8s ease-in-out infinite;
  }

  @keyframes pulse-live {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.65; }
  }

  #game-label {
    font-size: 13px; font-weight: 700;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  #title-sep { color: rgba(255,255,255,0.3); font-size: 18px; flex-shrink: 0; }

  #title-text {
    font-family: 'Barlow', sans-serif;
    font-size: 14px; font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Separador decorativo azul pulsante */
  #title-deco {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,212,255,0.4) 0%, transparent 100%);
    margin: 0 16px;
  }

  /* ──────────────────────────────────── ALERTAS */
  #alert-zone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    pointer-events: none;
  }

  .alert-card {
    background: var(--panel);
    border: 2px solid var(--blue);
    padding: 18px 40px;
    clip-path: polygon(0 0, 97% 0, 100% 10%, 100% 100%, 3% 100%, 0 90%);
    text-align: center;
    min-width: 420px;
    animation: alert-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
               alert-out 0.4s ease-in 4.6s forwards;
    position: relative;
    overflow: hidden;
  }

  .alert-card::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.08), transparent);
    animation: shimmer 2s 0.4s ease-in-out infinite;
  }

  .alert-card.sub   { border-color: var(--purple); }
  .alert-card.sub::before { background: linear-gradient(90deg, transparent, rgba(200,75,255,0.1), transparent); }
  .alert-card.bits  { border-color: var(--yellow); }
  .alert-card.bits::before { background: linear-gradient(90deg, transparent, rgba(255,215,0,0.1), transparent); }
  .alert-card.cheer { border-color: var(--yellow); }

  @keyframes shimmer {
    0%   { left: -60%; }
    100% { left: 160%; }
  }

  @keyframes alert-in {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes alert-out {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to   { opacity: 0; transform: scale(0.8) translateY(-20px); }
  }

  .alert-type {
    font-size: 11px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--blue); margin-bottom: 4px;
  }
  .alert-card.sub   .alert-type { color: var(--purple); }
  .alert-card.bits  .alert-type { color: var(--yellow); }
  .alert-card.cheer .alert-type { color: var(--yellow); }

  .alert-user {
    font-size: 36px; font-weight: 900;
    color: #fff; line-height: 1;
    letter-spacing: 1px;
  }

  .alert-detail {
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.65);
    margin-top: 6px; letter-spacing: 1px;
  }

  .alert-msg {
    font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    font-style: italic;
  }

  /* ──────────────────────────────────── RECUADRO ESQUINA INF DERECHA – ÚLTIMO FOLLOW */
  #recent-follow {
    position: absolute;
    bottom: 72px; right: 28px;
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 8px 16px;
    clip-path: polygon(4% 0, 100% 0, 100% 82%, 96% 100%, 0 100%, 0 18%);
    min-width: 220px; max-width: 280px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #recent-follow.visible { opacity: 1; }

  .rf-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--blue); margin-bottom: 2px;
  }
  .rf-name {
    font-size: 22px; font-weight: 900;
    color: #fff;
  }

  /* ──────────────────────────────────── ESCANER DE LÍNEA DECORATIVA */
  .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--blue) 50%, transparent 100%);
    opacity: 0.18;
    animation: scan 8s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    from { top: 0; }
    to   { top: 1080px; }
  }

  /* ──────────────────────────────────── CORNER DECORATIONS */
  .corner {
    position: absolute;
    width: 40px; height: 40px;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 0; left: 0; }
  .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner.br { bottom: 60px; right: 0; transform: scale(-1,-1); }

  /* ──────────────────────────────────── MODO OFFLINE */
  #offline-notice {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(255,59,59,0.15);
    border: 1px solid rgba(255,59,59,0.4);
    padding: 6px 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,120,120,0.85);
    display: none;
  }
  #offline-notice.show { display: block; }
</style>
</head>
<body>

<!-- Canvas partículas -->
<canvas id="particles"></canvas>

<!-- Línea de escaneo -->
<div class="scan-line"></div>

<!-- Decoraciones de esquina -->
<div class="corner tl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,40 0,0 40,0" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <polyline points="0,32 0,0 32,0" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  </svg>
</div>
<div class="corner tr">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,40 0,0 40,0" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <polyline points="0,32 0,0 32,0" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  </svg>
</div>
<div class="corner bl">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,40 0,0 40,0" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <polyline points="0,32 0,0 32,0" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  </svg>
</div>
<div class="corner br">
  <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,40 0,0 40,0" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <polyline points="0,32 0,0 32,0" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  </svg>
</div>

<!-- HUD Stats – esquina superior izquierda -->
<div id="hud">
  <!-- Espectadores -->
  <div class="stat-row">
    <div class="stat-icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Viewers</div>
      <div class="stat-value blue" id="val-viewers">–</div>
    </div>
  </div>

  <!-- Seguidores -->
  <div class="stat-row">
    <div class="stat-icon-wrap yellow">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Followers</div>
      <div class="stat-value yellow" id="val-followers">–</div>
    </div>
  </div>

  <!-- Suscriptores -->
  <div class="stat-row">
    <div class="stat-icon-wrap purple">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/>
      </svg>
    </div>
    <div class="stat-body">
      <div class="stat-label">Subs</div>
      <div class="stat-value purple" id="val-subs">–</div>
    </div>
  </div>
</div>

<!-- Uptime – esquina superior derecha -->
<div id="uptime-block">
  <div class="uptime-label">En directo</div>
  <div class="uptime-value" id="val-uptime">00:00:00</div>
</div>

<!-- Último follow – esquina inferior derecha -->
<div id="recent-follow">
  <div class="rf-label">Último follow</div>
  <div class="rf-name" id="last-follow-name">–</div>
</div>

<!-- Barra inferior de título -->
<div id="stream-title-bar">
  <div id="live-badge">Live</div>
  <div id="game-label">Fortnite</div>
  <div id="title-sep">◆</div>
  <div id="title-text" id="val-title">Conectando…</div>
  <div id="title-deco"></div>
</div>

<!-- Zona de alertas central -->
<div id="alert-zone"></div>

<!-- Aviso offline -->
<div id="offline-notice" id="offline-bar">⚡ Sin conexión con StreamForge</div>

<!-- Socket.IO desde backend local -->
<script src="http://localhost:3001/socket.io/socket.io.js"></script>

<script>
/* ──────────────────────────────────────────────────────────
   CONFIGURACIÓN
   Edita CHANNEL con tu nombre de canal Twitch
────────────────────────────────────────────────────────── */
const CHANNEL     = 'TU_CANAL_AQUI';   // ← pon aquí tu canal
const BACKEND_URL = 'http://localhost:3001';

/* ──────────────────────────────────────────────────────────
   ESTADO LOCAL
────────────────────────────────────────────────────────── */
let uptimeSeconds = 0;
let uptimeInterval = null;

/* ──────────────────────────────────────────────────────────
   FORMATTERS
────────────────────────────────────────────────────────── */
function fmtNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
  return String(n);
}

function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(v => String(v).padStart(2,'0')).join(':');
}

/* ──────────────────────────────────────────────────────────
   HUD UPDATE
────────────────────────────────────────────────────────── */
function applyHud(data) {
  document.getElementById('val-viewers').textContent   = fmtNum(data.viewers   ?? 0);
  document.getElementById('val-followers').textContent = fmtNum(data.followers ?? 0);
  document.getElementById('val-subs').textContent      = fmtNum(data.subscribers ?? 0);

  const titleEl = document.getElementById('title-text');
  if (data.streamTitle) titleEl.textContent = data.streamTitle;
  if (data.gameName) {
    const gl = document.getElementById('game-label');
    if (data.gameName) gl.textContent = data.gameName;
  }

  if (data.uptimeSeconds != null) {
    uptimeSeconds = data.uptimeSeconds;
    document.getElementById('val-uptime').textContent = fmtTime(uptimeSeconds);
  }

  if (!uptimeInterval && data.isLive) {
    uptimeInterval = setInterval(() => {
      uptimeSeconds++;
      document.getElementById('val-uptime').textContent = fmtTime(uptimeSeconds);
    }, 1000);
  }
}

/* ──────────────────────────────────────────────────────────
   COLA DE ALERTAS
────────────────────────────────────────────────────────── */
const alertQueue = [];
let alertBusy = false;
const ALERT_DURATION = 5200; // ms

function enqueueAlert(cfg) {
  alertQueue.push(cfg);
  if (!alertBusy) processAlertQueue();
}

function processAlertQueue() {
  if (!alertQueue.length) { alertBusy = false; return; }
  alertBusy = true;
  const cfg = alertQueue.shift();
  showAlert(cfg);
  setTimeout(processAlertQueue, ALERT_DURATION + 300);
}

function showAlert({ type, user, detail, msg }) {
  const zone = document.getElementById('alert-zone');
  const card = document.createElement('div');
  card.className = `alert-card ${type}`;

  const typeLabels = {
    follow: '✦ NUEVO FOLLOWER ✦',
    sub:    '★ NUEVO SUB ★',
    resub:  '★ RESUB ★',
    subgift:'★ GIFTED SUB ★',
    bits:   '💎 BITS 💎',
    cheer:  '💎 CHEER 💎',
    redemption: '⚡ CANJEO ⚡',
  };

  card.innerHTML = `
    <div class="alert-type">${typeLabels[type] ?? type.toUpperCase()}</div>
    <div class="alert-user">${escHtml(user)}</div>
    ${detail ? `<div class="alert-detail">${escHtml(detail)}</div>` : ''}
    ${msg    ? `<div class="alert-msg">${escHtml(msg)}</div>` : ''}
  `;

  zone.appendChild(card);
  setTimeout(() => { if (card.parentNode) card.parentNode.removeChild(card); }, ALERT_DURATION + 100);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ──────────────────────────────────────────────────────────
   ÚLTIMO FOLLOW INDICATOR
────────────────────────────────────────────────────────── */
function showLastFollow(name) {
  const el = document.getElementById('recent-follow');
  document.getElementById('last-follow-name').textContent = name;
  el.classList.add('visible');
}

/* ──────────────────────────────────────────────────────────
   SOCKET.IO
────────────────────────────────────────────────────────── */
function initSocket() {
  let socket;
  try {
    socket = io(BACKEND_URL, { transports: ['websocket'] });
  } catch(e) {
    document.getElementById('offline-notice').classList.add('show');
    return;
  }

  socket.on('connect', () => {
    document.getElementById('offline-notice').classList.remove('show');
    socket.emit('join:channel', CHANNEL);

    fetch(`${BACKEND_URL}/hud/start-poll`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel: CHANNEL, interval: 10 })
    }).catch(() => {});

    fetch(`${BACKEND_URL}/hud/${CHANNEL}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) applyHud(d); })
      .catch(() => {});
  });

  socket.on('disconnect', () => {
    document.getElementById('offline-notice').classList.add('show');
  });

  /* HUD en vivo */
  socket.on('hud:update', applyHud);

  /* Follows */
  socket.on('channel:follow', ({ userDisplayName }) => {
    showLastFollow(userDisplayName);
    enqueueAlert({ type: 'follow', user: userDisplayName });
  });

  /* Subs */
  socket.on('channel:subscribe', ({ userDisplayName, tier, isGift }) => {
    if (isGift) return;
    const tierLabel = tier === '1000' ? 'Tier 1' : tier === '2000' ? 'Tier 2' : 'Tier 3';
    enqueueAlert({ type: 'sub', user: userDisplayName, detail: tierLabel });
  });

  /* Resubs */
  socket.on('channel:subscription-message', ({ userDisplayName, tier, cumulativeMonths, messageText }) => {
    const tierLabel = tier === '1000' ? 'Tier 1' : tier === '2000' ? 'Tier 2' : 'Tier 3';
    enqueueAlert({
      type: 'resub',
      user: userDisplayName,
      detail: `${cumulativeMonths} meses · ${tierLabel}`,
      msg: messageText || undefined,
    });
  });

  /* Sub gift */
  socket.on('channel:subgift', ({ gifterDisplayName, amount, tier }) => {
    const tierLabel = tier === '1000' ? 'Tier 1' : tier === '2000' ? 'Tier 2' : 'Tier 3';
    enqueueAlert({
      type: 'subgift',
      user: gifterDisplayName,
      detail: `× ${amount} subs · ${tierLabel}`,
    });
  });

  /* Bits / Cheers */
  socket.on('channel:cheer', ({ userDisplayName, bits, message }) => {
    enqueueAlert({
      type: 'bits',
      user: userDisplayName,
      detail: `${bits.toLocaleString()} bits`,
      msg: message || undefined,
    });
  });

  /* Redemptions */
  socket.on('channel:redemption', ({ userDisplayName, rewardTitle }) => {
    enqueueAlert({ type: 'redemption', user: userDisplayName, detail: rewardTitle });
  });
}

/* ──────────────────────────────────────────────────────────
   PARTÍCULAS DE FONDO
────────────────────────────────────────────────────────── */
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width  = 1920;
  canvas.height = 1080;

  const COUNT = 55;
  const colors = ['#00D4FF', '#C84BFF', '#FFD700'];

  const particles = Array.from({ length: COUNT }, () => ({
    x: Math.random() * 1920,
    y: Math.random() * 1080,
    r: Math.random() * 1.4 + 0.3,
    vx: (Math.random() - 0.5) * 0.35,
    vy: (Math.random() - 0.5) * 0.35,
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: Math.random() * 0.45 + 0.1,
  }));

  /* Líneas de cuadrícula tenue */
  function drawGrid() {
    ctx.strokeStyle = 'rgba(0,212,255,0.035)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= 1920; x += 80) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,1080); ctx.stroke();
    }
    for (let y = 0; y <= 1080; y += 80) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1920,y); ctx.stroke();
    }
  }

  function tick() {
    ctx.clearRect(0, 0, 1920, 1080);
    drawGrid();

    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0)    p.x = 1920;
      if (p.x > 1920) p.x = 0;
      if (p.y < 0)    p.y = 1080;
      if (p.y > 1080) p.y = 0;

      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
})();
