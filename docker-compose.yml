services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twitch_overlay}
      POSTGRES_USER: ${POSTGRES_USER:-overlay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-overlay_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
